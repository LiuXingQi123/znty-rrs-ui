<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禁投池历史查询</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui@2.15.14/lib/theme-chalk/index.css">
    <script src="https://unpkg.com/vue@2.5.16/dist/vue.min.js"></script>
    <script src="https://unpkg.com/element-ui@2.15.14/lib/index.js"></script>
    <script src="https://unpkg.com/axios@1.7.9/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        #forbidden_pool_history {
            --color-primary: #2743A4;
            --color-primary-hover: #1F3683;
            --color-primary-light: #E9ECF6;
            --color-bg-page: #F7F8FA;
            --color-bg-panel: #FFFFFF;
            --color-text-primary: #242933;
            --color-text-regular: #3F485A;
            --color-text-secondary: #707783;
            --color-text-placeholder: #9199BD;
            --color-border: #E5E5E5;
            --color-border-hover: #CCCCCC;
            --color-success: #06C687;
            --color-success-light: #E7F9F3;
            --color-warning-light: #FFF4CC;
            --color-danger: #FF4542;
            --color-danger-light: #FFEDEC;
            --radius-base: 4px;

            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background: var(--color-bg-page);
            color: var(--color-text-regular);
            font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
            font-size: 13px;
        }

        #forbidden_pool_history .topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            height: 52px;
            padding: 0 24px;
            background: var(--color-bg-panel);
            border-bottom: 1px solid var(--color-border);
            flex-shrink: 0;
        }

        #forbidden_pool_history .topbar-brand { display: flex; align-items: center; gap: 8px; }

        #forbidden_pool_history .topbar-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border: 1px solid var(--color-primary-light);
            border-radius: var(--radius-base);
            background: var(--color-primary-light);
            color: var(--color-primary);
        }

        #forbidden_pool_history .topbar-icon svg { width: 16px; height: 16px; fill: currentColor; }

        #forbidden_pool_history .topbar h2 {
            color: var(--color-text-primary);
            font-size: 20px;
            font-weight: 600;
            line-height: 28px;
        }

        #forbidden_pool_history .topbar-sep { width: 1px; height: 18px; background: var(--color-border); }
        #forbidden_pool_history .topbar-sys { color: var(--color-text-secondary); font-size: 12px; line-height: 20px; }
        #forbidden_pool_history .topbar-meta { margin-left: auto; }

        #forbidden_pool_history .topbar-date-badge {
            display: inline-flex;
            align-items: center;
            height: 24px;
            padding: 0 8px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-base);
            background: var(--color-bg-page);
            color: var(--color-text-secondary);
            font-size: 12px;
        }

        #forbidden_pool_history .list-body { flex: 1; overflow-y: auto; padding: 20px 24px; }

        #forbidden_pool_history .search-panel {
            padding: 16px 20px;
            margin-bottom: 12px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-base);
            background: var(--color-bg-panel);
        }

        #forbidden_pool_history .search-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px 12px;
        }

        #forbidden_pool_history .search-row + .search-row { margin-top: 12px; }

        #forbidden_pool_history .search-label {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            min-width: 54px;
            height: 32px;
            color: var(--color-text-regular);
            font-size: 13px;
            font-weight: 400;
        }

        #forbidden_pool_history .search-label .el-icon-search { color: var(--color-text-placeholder); font-size: 14px; }

        #forbidden_pool_history .total-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            height: 24px;
            margin-left: auto;
            padding: 0 8px;
            border-radius: var(--radius-base);
            background: var(--color-primary-light);
            color: var(--color-primary);
            font-size: 12px;
            line-height: 20px;
        }

        #forbidden_pool_history .table-card {
            overflow: hidden;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-base);
            background: var(--color-bg-panel);
        }

        #forbidden_pool_history .pagination-wrap {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            min-height: 64px;
            padding: 12px 20px;
            border-top: 1px solid var(--color-border);
            background: var(--color-bg-panel);
        }

        #forbidden_pool_history .el-table { color: var(--color-text-regular); font-size: 13px; }

        #forbidden_pool_history .el-table th.el-table__cell {
            padding: 8px 0;
            border-bottom: 1px solid var(--color-border);
            background: var(--color-bg-page);
            color: var(--color-text-primary);
            font-size: 13px;
            font-weight: 600;
            line-height: 22px;
        }

        #forbidden_pool_history .el-table td.el-table__cell {
            padding: 8px 0;
            border-bottom-color: var(--color-border);
            color: var(--color-text-regular);
            font-size: 13px;
            line-height: 22px;
        }

        #forbidden_pool_history .el-table--border,
        #forbidden_pool_history .el-table--group { border-color: var(--color-border); }
        #forbidden_pool_history .el-table--border th.el-table__cell,
        #forbidden_pool_history .el-table--border td.el-table__cell { border-right-color: var(--color-border); }
        #forbidden_pool_history .el-table--striped .el-table__body tr.el-table__row--striped td.el-table__cell { background: #FAFAFA; }
        #forbidden_pool_history .el-table__body tr:hover > td { background: var(--color-bg-page) !important; }

        #forbidden_pool_history .el-input--small .el-input__inner,
        #forbidden_pool_history .el-select .el-input__inner,
        #forbidden_pool_history .el-date-editor--daterange.el-input__inner {
            height: 32px;
            border-color: var(--color-border);
            border-radius: var(--radius-base);
            color: var(--color-text-regular);
            font-size: 13px;
            line-height: 32px;
        }

        #forbidden_pool_history .el-input--small .el-input__inner::placeholder { color: var(--color-text-placeholder); }
        #forbidden_pool_history .el-input--small .el-input__inner:hover,
        #forbidden_pool_history .el-select .el-input__inner:hover,
        #forbidden_pool_history .el-date-editor--daterange.el-input__inner:hover { border-color: var(--color-border-hover); }
        #forbidden_pool_history .el-input--small .el-input__inner:focus,
        #forbidden_pool_history .el-select .el-input.is-focus .el-input__inner,
        #forbidden_pool_history .el-date-editor--daterange.el-input__inner.is-active { border-color: var(--color-primary); }

        #forbidden_pool_history .el-date-editor.el-range-editor .el-range-separator {
            min-width: 24px;
            width: 24px;
            padding: 0;
            color: var(--color-text-secondary);
            font-size: 13px;
            line-height: 24px;
            text-align: center;
        }

        #forbidden_pool_history .el-date-editor .el-range__icon,
        #forbidden_pool_history .el-date-editor .el-range__close-icon { line-height: 24px; }

        #forbidden_pool_history .el-button--small {
            height: 32px;
            padding: 0 12px;
            border-radius: var(--radius-base);
            font-size: 13px;
            font-weight: 500;
        }

        #forbidden_pool_history .el-button--primary {
            border-color: var(--color-primary);
            background: var(--color-primary);
            color: #FFFFFF;
        }

        #forbidden_pool_history .el-button--primary:hover,
        #forbidden_pool_history .el-button--primary:focus {
            border-color: var(--color-primary-hover);
            background: var(--color-primary-hover);
            color: #FFFFFF;
        }

        #forbidden_pool_history .el-button--default {
            border-color: var(--color-border);
            background: var(--color-bg-panel);
            color: var(--color-text-regular);
            font-weight: 500;
        }

        #forbidden_pool_history .el-button--default:hover,
        #forbidden_pool_history .el-button--default:focus {
            border-color: var(--color-primary);
            background: var(--color-bg-panel);
            color: var(--color-primary);
        }

        #forbidden_pool_history .el-tag--mini {
            height: 22px;
            border-radius: 2px;
            font-size: 12px;
            font-weight: 400;
            line-height: 20px;
        }

        #forbidden_pool_history .el-tag--success { background: var(--color-success-light); border-color: var(--color-success-light); color: var(--color-success); }
        #forbidden_pool_history .el-tag--warning { background: var(--color-warning-light); border-color: var(--color-warning-light); color: #A7865F; }
        #forbidden_pool_history .el-tag--danger { background: var(--color-danger-light); border-color: var(--color-danger-light); color: var(--color-danger); }
        #forbidden_pool_history .el-tag--info { background: var(--color-bg-page); border-color: var(--color-bg-page); color: var(--color-text-secondary); }

        #forbidden_pool_history .el-pagination {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            color: var(--color-text-regular);
            font-size: 13px;
            font-weight: 400;
            line-height: 28px;
        }
        #forbidden_pool_history .el-pager li.active { color: var(--color-primary); font-weight: 600; }
        #forbidden_pool_history .el-pagination .el-pagination__total,
        #forbidden_pool_history .el-pagination .el-pagination__sizes,
        #forbidden_pool_history .el-pagination .el-pagination__jump,
        #forbidden_pool_history .el-pagination .el-pager {
            display: inline-flex;
            align-items: center;
            height: 28px;
            margin: 0;
            line-height: 28px;
        }
        #forbidden_pool_history .el-pagination .btn-next,
        #forbidden_pool_history .el-pagination .btn-prev,
        #forbidden_pool_history .el-pagination .el-pager li {
            min-width: 28px;
            height: 28px;
            margin: 0;
            border-radius: var(--radius-base);
            line-height: 28px;
        }
        #forbidden_pool_history .el-pagination .el-pager li.active { color: var(--color-primary); }
        #forbidden_pool_history .el-pagination.is-small .el-select .el-input { width: 100px !important; }
        #forbidden_pool_history .el-pagination .el-input__inner {
            height: 28px;
            line-height: 28px;
        }
        #forbidden_pool_history .el-pagination__jump .el-input {
            display: inline-flex;
            align-items: center;
            height: 28px;
            width: 48px;
            margin: 0 6px;
            line-height: 28px;
            vertical-align: top;
        }
    </style>
</head>
<body>
<div id="forbidden_pool_history">
    <div class="topbar">
        <div class="topbar-brand">
            <div class="topbar-icon">
                <svg width="18" height="18" viewBox="0 0 24 24"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
            </div>
            <h2>禁投池历史查询</h2>
        </div>
        <div class="topbar-sep"></div>
        <span class="topbar-sys">证券投资管理系统</span>
        <div class="topbar-meta"><span class="topbar-date-badge">{{ today }}</span></div>
    </div>

    <div class="list-body">
        <div class="search-panel">
            <div class="search-row">
                <span class="search-label"><i class="el-icon-search"></i>筛选</span>
                <el-input v-model="searchForm.companyCode" placeholder="主体代码" clearable size="small" style="width:130px;" @keyup.enter.native="handleSearch"></el-input>
                <el-input v-model="searchForm.companyName" placeholder="主体名称" clearable size="small" style="width:150px;" @keyup.enter.native="handleSearch"></el-input>
                <el-input v-model="searchForm.securityCode" placeholder="证券代码" clearable size="small" style="width:130px;" @keyup.enter.native="handleSearch"></el-input>
                <el-input v-model="searchForm.securityShortName" placeholder="证券名称" clearable size="small" style="width:150px;" @keyup.enter.native="handleSearch"></el-input>
                <el-date-picker
                    v-model="searchForm.adjustTimeRange"
                    type="daterange"
                    range-separator="至"
                    start-placeholder="调整开始"
                    end-placeholder="调整结束"
                    size="small"
                    style="width:240px;"
                    value-format="yyyy-MM-dd">
                </el-date-picker>
            </div>
            <div class="search-row">
                <span class="search-label" style="visibility:hidden;"><i class="el-icon-search"></i>筛选</span>
                <el-input v-model="searchForm.adjusterName" placeholder="调整人" clearable size="small" style="width:130px;" @keyup.enter.native="handleSearch"></el-input>
                <el-select v-model="searchForm.adjustMode" placeholder="调整方向" clearable size="small" style="width:120px;">
                    <el-option v-for="m in adjustModeOptions" :key="m.value" :label="m.label" :value="m.value"></el-option>
                </el-select>
                <el-select v-model="searchForm.auditStatus" placeholder="调整状态" clearable size="small" style="width:140px;">
                    <el-option v-for="s in auditStatusOptions" :key="s.value" :label="s.label" :value="s.value"></el-option>
                </el-select>
                <el-button type="primary" size="small" icon="el-icon-search" @click="handleSearch">查询</el-button>
                <el-button size="small" icon="el-icon-refresh" @click="handleReset">重置</el-button>
                <div class="total-badge"><i class="el-icon-data-line"></i> 共 {{ pagination.total }} 条记录</div>
            </div>
        </div>

        <div class="table-card">
            <el-table :data="tableData" v-loading="loading" stripe border size="small" style="width:100%;">
                <el-table-column prop="adjusterName" label="调整人" min-width="90"></el-table-column>
                <el-table-column label="提交时间" min-width="140">
                    <template slot-scope="{ row }">{{ formatDate(row.submitTime) }}</template>
                </el-table-column>
                <el-table-column prop="securityShortName" label="证券名称" min-width="150" show-overflow-tooltip></el-table-column>
                <el-table-column prop="securityCode" label="证券代码" min-width="120"></el-table-column>
                <el-table-column prop="issuer" label="发行主体" min-width="180" show-overflow-tooltip></el-table-column>
                <el-table-column prop="adjustType" label="调整类型" min-width="110"></el-table-column>
                <el-table-column label="调整方向" min-width="90">
                    <template slot-scope="{ row }">
                        <el-tag v-if="row.adjustMode === '调入'" type="success" size="mini">调入</el-tag>
                        <el-tag v-else-if="row.adjustMode === '调出'" type="danger" size="mini">调出</el-tag>
                    </template>
                </el-table-column>
                <el-table-column prop="targetPoolName" label="投资池名称" min-width="170" show-overflow-tooltip></el-table-column>
                <el-table-column label="审批状态" min-width="120">
                    <template slot-scope="{ row }">
                        <el-tag :type="auditStatusType(row.auditStatus)" size="mini" v-if="row.auditStatus != null">
                            {{ auditStatusLabel(row.auditStatus) }}
                        </el-tag>
                    </template>
                </el-table-column>
            </el-table>
            <div class="pagination-wrap">
                <el-pagination
                    :total="pagination.total"
                    :current-page="pagination.pageIndex"
                    :page-size="pagination.pageSize"
                    :page-sizes="[10, 20, 50, 100]"
                    layout="total, sizes, prev, pager, next, jumper"
                    small
                    @current-change="handlePageChange"
                    @size-change="handleSizeChange">
                </el-pagination>
            </div>
        </div>
    </div>
</div>

<script>
new Vue({
    el: '#forbidden_pool_history',
    data() {
        return {
            today: moment().format('YYYY年MM月DD日'), // 顶栏日期
            searchForm: {
                companyCode: '',        // 主体代码
                companyName: '',        // 主体名称
                securityCode: '',       // 证券代码
                securityShortName: '',  // 证券名称
                adjustTimeRange: null,  // 调整日期范围
                adjusterName: '',       // 调整人
                adjustMode: '',         // 调整方向
                auditStatus: '',        // 调整状态
            },
            adjustModeOptions: [
                { value: '调入', label: '调入' },
                { value: '调出', label: '调出' },
            ],
            auditStatusOptions: [
                { value: '-1', label: '无效调整' },
                { value: '00', label: '已提交待审核' },
                { value: '10', label: '审核通过待审批' },
                { value: '11', label: '驳回待修改' },
                { value: '20', label: '审批通过' },
                { value: '21', label: '审批驳回' },
                { value: '32', label: 'O32自动审批' },
                { value: '99', label: '发起人已撤回' },
            ],
            tableData: [],              // 表格数据
            loading: false,             // 加载状态
            pagination: {
                pageIndex: 1,           // 当前页
                pageSize: 20,           // 每页条数
                total: 0,               // 总数
            },
        };
    },
    mounted() {
        axios.defaults.baseURL = 'http://localhost:18090';
        this.loadList();
    },
    methods: {
        // API 请求封装
        async apiPost(path, body) {
            const resp = await axios.post(path, body || {});
            const json = resp.data;
            if (json.code !== 0) {
                this.$message.error(json.message || '接口异常');
                throw new Error(json.message || '接口异常');
            }
            return json.data;
        },

        // 审批状态名称
        auditStatusLabel(code) {
            const map = {
                '-1': '无效调整', '00': '已提交待审核', '10': '审核通过待审批',
                '11': '驳回待修改', '20': '审批通过', '21': '审批驳回',
                '32': 'O32自动审批', '99': '发起人已撤回'
            };
            return map[String(code)] || code || '';
        },

        // 审批状态样式
        auditStatusType(code) {
            const map = {
                '20': 'success', '10': 'success', '32': 'success',
                '21': 'danger', '-1': 'danger',
                '00': 'warning', '11': 'warning', '99': 'info'
            };
            return map[String(code)] || 'info';
        },

        // 格式化日期
        formatDate(value) {
            return value ? moment(value).format('YYYY-MM-DD HH:mm') : '';
        },

        // 加载列表
        async loadList() {
            this.loading = true;
            try {
                const params = {
                    companyCode: this.searchForm.companyCode || null,
                    companyName: this.searchForm.companyName || null,
                    securityCode: this.searchForm.securityCode || null,
                    securityShortName: this.searchForm.securityShortName || null,
                    adjustTimeStart: this.searchForm.adjustTimeRange ? this.searchForm.adjustTimeRange[0] : null,
                    adjustTimeEnd: this.searchForm.adjustTimeRange ? this.searchForm.adjustTimeRange[1] : null,
                    adjusterName: this.searchForm.adjusterName || null,
                    adjustMode: this.searchForm.adjustMode || null,
                    auditStatus: this.searchForm.auditStatus || null,
                    pageIndex: this.pagination.pageIndex,
                    pageSize: this.pagination.pageSize,
                };
                const data = await this.apiPost('/api/v1/forbiddenPoolHistory/queryForbiddenPoolHistoryPage', params);
                this.tableData = data.records || [];
                this.pagination.total = data.total || 0;
            } catch (e) {}
            this.loading = false;
        },

        // 查询
        handleSearch() {
            this.pagination.pageIndex = 1;
            this.loadList();
        },

        // 重置
        handleReset() {
            this.searchForm = {
                companyCode: '',
                companyName: '',
                securityCode: '',
                securityShortName: '',
                adjustTimeRange: null,
                adjusterName: '',
                adjustMode: '',
                auditStatus: '',
            };
            this.pagination.pageIndex = 1;
            this.loadList();
        },

        // 切换页码
        handlePageChange(page) {
            this.pagination.pageIndex = page;
            this.loadList();
        },

        // 切换每页条数
        handleSizeChange(size) {
            this.pagination.pageSize = size;
            this.pagination.pageIndex = 1;
            this.loadList();
        },
    }
});
</script>
</body>
</html>
