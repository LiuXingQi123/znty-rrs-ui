<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>业务字典总览</title>
    <style>
        #dictionary_values {
            --c-bg: #F7F8FA;
            --c-surface: #FFFFFF;
            --c-surface-2: #F7F8FA;
            --c-primary: #2743A4;
            --c-primary-dark: #1F3683;
            --c-primary-soft: #E9ECF6;
            --c-gold: #D1A777;
            --c-gold-text: #A7865F;
            --c-border: #E5E5E5;
            --c-border-strong: #DCE3F0;
            --c-text: #242933;
            --c-subtext: #707783;
            --c-muted: #9199BD;
            --c-success: #06C687;
            --c-danger: #FF4542;
            min-height: 100vh;
            box-sizing: border-box;
            padding: 20px;
            background: var(--c-bg);
            color: var(--c-text);
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        }

        #dictionary_values * {
            box-sizing: border-box;
        }

        #dictionary_values .dict-hero {
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(360px, 0.8fr);
            gap: 18px;
            padding: 22px;
            border: 1px solid var(--c-border-strong);
            border-radius: 4px;
            background: linear-gradient(135deg, #FFFFFF 0%, #F4F7FF 100%);
            box-shadow: 0 8px 20px rgba(31, 42, 68, 0.06);
        }

        #dictionary_values .dict-kicker {
            margin: 0 0 6px;
            color: var(--c-primary);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.14em;
        }

        #dictionary_values h1 {
            margin: 0;
            font-size: 26px;
            line-height: 1.35;
        }

        #dictionary_values .dict-desc {
            max-width: 860px;
            margin: 10px 0 0;
            color: var(--c-subtext);
            font-size: 13px;
            line-height: 1.7;
        }

        #dictionary_values .hero-metrics {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        #dictionary_values .metric-card {
            padding: 14px;
            border: 1px solid #D8E1F2;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.78);
        }

        #dictionary_values .metric-card strong {
            display: block;
            color: var(--c-primary);
            font-size: 24px;
            line-height: 1.2;
        }

        #dictionary_values .metric-card span {
            display: block;
            margin-top: 4px;
            color: var(--c-subtext);
            font-size: 12px;
        }

        #dictionary_values .toolbar {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin: 14px 0;
            padding: 12px;
            border: 1px solid var(--c-border);
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 4px 12px rgba(31, 42, 68, 0.05);
            backdrop-filter: blur(8px);
        }

        #dictionary_values .search-box {
            position: relative;
            flex: 1;
            min-width: 240px;
        }

        #dictionary_values .search-box input {
            width: 100%;
            height: 34px;
            padding: 0 12px 0 34px;
            border: 1px solid var(--c-border);
            border-radius: 4px;
            color: var(--c-text);
            font-size: 13px;
            outline: none;
        }

        #dictionary_values .search-box input:focus {
            border-color: var(--c-primary);
        }

        #dictionary_values .search-box::before {
            position: absolute;
            top: 8px;
            left: 12px;
            color: var(--c-muted);
            font-size: 14px;
            content: "⌕";
        }

        #dictionary_values .filter-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        #dictionary_values .filter-tab {
            height: 30px;
            padding: 0 11px;
            border: 1px solid var(--c-border);
            border-radius: 4px;
            background: var(--c-surface);
            color: var(--c-subtext);
            cursor: pointer;
            font-size: 13px;
        }

        #dictionary_values .filter-tab.is-active {
            border-color: var(--c-primary);
            background: var(--c-primary);
            color: #FFFFFF;
        }

        #dictionary_values .section-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        #dictionary_values .dict-card {
            overflow: hidden;
            border: 1px solid var(--c-border);
            border-top: 3px solid var(--c-primary);
            border-radius: 4px;
            background: var(--c-surface);
            box-shadow: 0 8px 20px rgba(31, 42, 68, 0.04);
        }

        #dictionary_values .dict-card.is-db {
            border-top-color: var(--c-gold);
        }

        #dictionary_values .card-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--c-border);
            background: var(--c-surface-2);
        }

        #dictionary_values .card-title h2 {
            margin: 0;
            color: var(--c-text);
            font-size: 16px;
            line-height: 1.5;
        }

        #dictionary_values .card-title p {
            margin: 4px 0 0;
            color: var(--c-subtext);
            font-size: 12px;
            line-height: 1.5;
        }

        #dictionary_values .source-tag {
            flex: 0 0 auto;
            padding: 3px 7px;
            border: 1px solid #C8D1EA;
            border-radius: 4px;
            background: #FFFFFF;
            color: var(--c-primary);
            font-family: Consolas, Menlo, monospace;
            font-size: 12px;
        }

        #dictionary_values .dict-table-wrap {
            max-height: 360px;
            overflow: auto;
        }

        #dictionary_values table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        #dictionary_values th,
        #dictionary_values td {
            padding: 9px 10px;
            border-bottom: 1px solid var(--c-border);
            color: var(--c-subtext);
            text-align: left;
            vertical-align: top;
        }

        #dictionary_values th {
            position: sticky;
            top: 0;
            z-index: 1;
            background: #F1F3F7;
            color: var(--c-text);
            font-weight: 600;
        }

        #dictionary_values .code {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--c-primary-soft);
            color: var(--c-primary);
            font-family: Consolas, Menlo, monospace;
            font-size: 12px;
            line-height: 1.45;
        }

        #dictionary_values .name {
            color: var(--c-text);
            font-weight: 600;
        }

        #dictionary_values .muted {
            color: var(--c-muted);
        }

        #dictionary_values .empty {
            display: none;
            padding: 54px 16px;
            border: 1px dashed var(--c-border-strong);
            border-radius: 4px;
            background: var(--c-surface);
            color: var(--c-muted);
            text-align: center;
        }

        #dictionary_values .empty.is-visible {
            display: block;
        }

        #dictionary_values .module-title {
            grid-column: 1 / -1;
            margin: 10px 0 -2px;
            color: var(--c-text);
            font-size: 18px;
            font-weight: 700;
        }

        @media (max-width: 1100px) {
            #dictionary_values .dict-hero,
            #dictionary_values .section-grid {
                grid-template-columns: 1fr;
            }

            #dictionary_values .toolbar {
                align-items: stretch;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div id="dictionary_values">
    <header class="dict-hero">
        <div>
            <p class="dict-kicker">ZNTY RRS · DICTIONARY MAP</p>
            <h1>业务字典值总览</h1>
            <p class="dict-desc">
                汇总项目中类似字典值的数据来源：后端枚举、数据库字典表、流程角色、规则配置选项和信用债评分档配置。
                页面用于快速定位 code 与含义，避免在 Java 枚举、SQL 脚本和前端页面之间来回翻。
            </p>
        </div>
        <div class="hero-metrics">
            <div class="metric-card"><strong id="metricEnumCount">29</strong><span>后端枚举类</span></div>
            <div class="metric-card"><strong id="metricEnumItemCount">0</strong><span>枚举值</span></div>
            <div class="metric-card"><strong id="metricDbDictCount">6</strong><span>数据库字典/配置类</span></div>
            <div class="metric-card"><strong id="metricSecurityTypeCount">54</strong><span>证券类型记录</span></div>
        </div>
    </header>

    <section class="toolbar">
        <div class="search-box">
            <input id="dictSearch" type="search" placeholder="搜索字典名、code、中文含义、来源表，例如：审批 / 00 / credit_bond / wf_role_dict">
        </div>
        <div class="filter-tabs" id="dictFilters"></div>
    </section>

    <main class="section-grid" id="dictContent"></main>
    <div class="empty" id="emptyState">没有匹配的字典项，可以换一个关键词试试。</div>
</div>

];

const dictionaries = enumDictionaries.concat(dbDictionaries);
const groups = ['全部'].concat(Array.from(new Set(dictionaries.map(item => item.group))));
let currentGroup = '全部';

function escapeHtml(value) {
    return String(value || '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}

function dictionaryMatches(dict, keyword) {
    if (!keyword) return true;
    const text = [dict.group, dict.name, dict.source, dict.field]
        .concat(dict.items.flat())
        .join(' ')
        .toLowerCase();
    return text.indexOf(keyword) !== -1;
}

function renderFilters() {
    const box = document.getElementById('dictFilters');
    box.innerHTML = groups.map(group => `<button class="filter-tab ${group === currentGroup ? 'is-active' : ''}" data-group="${escapeHtml(group)}">${escapeHtml(group)}</button>`).join('');
    box.querySelectorAll('.filter-tab').forEach(button => {
        button.addEventListener('click', () => {
            currentGroup = button.dataset.group;
            render();
        });
    });
}

function renderCard(dict) {
    const rows = dict.items.map(item => `
        <tr>
            <td><span class="code">${escapeHtml(item[0])}</span></td>
            <td><span class="name">${escapeHtml(item[1])}</span></td>
            <td>${escapeHtml(item[2])}</td>
        </tr>
    `).join('');
    return `
        <article class="dict-card ${dict.group === '数据库字典' ? 'is-db' : ''}">
            <div class="card-head">
                <div class="card-title">
                    <h2>${escapeHtml(dict.name)}</h2>
                    <p>${escapeHtml(dict.field)}</p>
                </div>
                <span class="source-tag">${escapeHtml(dict.source)}</span>
            </div>
            <div class="dict-table-wrap">
                <table>
                    <thead>
                    <tr><th>Code / Key</th><th>名称 / 含义</th><th>说明</th></tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>
        </article>
    `;
}

function render() {
    renderFilters();
    const keyword = document.getElementById('dictSearch').value.trim().toLowerCase();
    const filtered = dictionaries.filter(dict => (currentGroup === '全部' || dict.group === currentGroup) && dictionaryMatches(dict, keyword));
    document.getElementById('dictContent').innerHTML = filtered.map(renderCard).join('');
    document.getElementById('emptyState').classList.toggle('is-visible', filtered.length === 0);
    document.getElementById('metricEnumItemCount').textContent = enumDictionaries.reduce((sum, dict) => sum + dict.items.length, 0);
}

document.getElementById('dictSearch').addEventListener('input', render);
render();
</script>
