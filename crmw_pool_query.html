<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRMW池查询</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui@2.15.14/lib/theme-chalk/index.css">
    <script src="https://unpkg.com/vue@2.5.16/dist/vue.min.js"></script>
    <script src="https://unpkg.com/element-ui@2.15.14/lib/index.js"></script>
    <script src="https://unpkg.com/axios@1.7.9/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <link rel="stylesheet" href="css/crmw_pool_query.css">
    <link rel="stylesheet" href="css/common.css">
</head>
<body class="crmw-pool-query-page">
<div id="crmw_pool_query">
    <div class="topbar">
        <div class="topbar-brand">
            <div class="topbar-icon">
                <svg viewBox="0 0 24 24"><path d="M4 6h16v3H4V6zm0 5h16v3H4v-3zm0 5h16v3H4v-3z"/></svg>
            </div>
            <h2>CRMW池查询</h2>
        </div>
        <div class="topbar-sep"></div>
        <div class="topbar-sys">证券投资管理系统</div>
        <div class="topbar-meta">
            <span class="topbar-date-badge"><i class="el-icon-time"></i>{{ today }}</span>
        </div>
    </div>

    <div class="list-body">
        <div class="search-panel">
            <div class="search-row">
                <span class="search-label"><i class="el-icon-search"></i>筛选</span>
                <el-input v-model="searchForm.crmwScode" placeholder="CRMW代码" clearable size="small" style="width:160px;">
                    <i slot="prefix" class="el-input__icon el-icon-document"></i>
                </el-input>
                <el-input v-model="searchForm.crmwName" placeholder="CRMW名称" clearable size="small" style="width:180px;">
                    <i slot="prefix" class="el-input__icon el-icon-tickets"></i>
                </el-input>
                <el-date-picker
                    v-model="searchForm.entryTimeRange"
                    type="daterange"
                    range-separator="至"
                    start-placeholder="入池开始日期"
                    end-placeholder="入池结束日期"
                    value-format="yyyy-MM-dd"
                    popper-class="project-date-range-picker"
                    size="small"
                    style="width:260px;">
                </el-date-picker>
                <el-input v-model="searchForm.adjusterName" placeholder="调整人" clearable size="small" style="width:130px;">
                    <i slot="prefix" class="el-input__icon el-icon-user"></i>
                </el-input>
                <el-button type="primary" size="small" icon="el-icon-search" @click="handleSearch">查询</el-button>
                <el-button size="small" icon="el-icon-refresh" @click="handleReset">重置</el-button>
                <div class="total-badge">
                    <i class="el-icon-data-line"></i> 共 {{ pagination.total }} 条记录
                </div>
            </div>
        </div>

        <div class="table-card">
            <el-table ref="crmwTableRef" :data="tableData" v-loading="loading" stripe border size="small" style="width:100%;">
                <el-table-column label="序号" width="60" align="center">
                    <template slot-scope="{ $index }">
                        {{ (pagination.pageIndex - 1) * pagination.pageSize + $index + 1 }}
                    </template>
                </el-table-column>
                <el-table-column prop="crmwName" label="CRMW名称" min-width="160" show-overflow-tooltip>
                    <template slot-scope="{ row }">
                        <span class="desc-link" @click="openCrmwAdjustDetail(row)">{{ row.crmwName || '' }}</span>
                    </template>
                </el-table-column>
                <el-table-column prop="crmwScode" label="CRMW代码" min-width="130">
                    <template slot-scope="{ row }">
                        <span class="desc-link" @click="openCrmwAdjustDetail(row)">{{ row.crmwScode || '' }}</span>
                    </template>
                </el-table-column>
                <el-table-column prop="securityShortName" label="证券名称" min-width="150" show-overflow-tooltip>
                    <template slot-scope="{ row }"><span class="desc-link" @click="openCrmwAdjustDetail(row)">{{ row.securityShortName || '' }}</span></template>
                </el-table-column>
                <el-table-column prop="securityCode" label="证券代码" min-width="130">
                    <template slot-scope="{ row }"><span class="desc-link" @click="openCrmwAdjustDetail(row)">{{ row.securityCode || '' }}</span></template>
                </el-table-column>
                <el-table-column prop="adjusterName" label="调整人" min-width="100"></el-table-column>
                <el-table-column label="入池时间" min-width="150" align="center">
                    <template slot-scope="{ row }">
                        {{ row.entryTime ? moment(row.entryTime).format('YYYY-MM-DD HH:mm') : '' }}
                    </template>
                </el-table-column>
                <el-table-column prop="targetPoolName" label="投资池名称" min-width="180" show-overflow-tooltip></el-table-column>
            </el-table>
            <div class="pagination-wrap">
                <el-pagination
                    :total="pagination.total"
                    :current-page="pagination.pageIndex"
                    :page-size="pagination.pageSize"
                    :page-sizes="[10, 20, 50, 100]"
                    layout="total, sizes, prev, pager, next, jumper"
                    small
                    @current-change="handlePageChange"
                    @size-change="handleSizeChange">
                </el-pagination>
            </div>
        </div>
    </div>
</div>

<script>
new Vue({
    el: '#crmw_pool_query',
    data() {
        return {
            moment: moment, // 日期处理工具
            today: moment().format('YYYY年MM月DD日'), // 顶栏当前日期展示文字
            searchForm: {
                crmwScode: '',        // CRMW代码关键词
                crmwName: '',         // CRMW名称关键词
                entryTimeRange: null, // 入池时间范围
                adjusterName: '',     // 调整人姓名关键词
            },
            tableData: [],            // 当前页表格数据
            loading: false,           // 表格加载状态
            pagination: {
                pageIndex: 1,         // 当前页码
                pageSize: 20,         // 每页条数
                total: 0,             // 总记录数
            },
        };
    },
    mounted() {
        axios.defaults.baseURL = 'http://localhost:18090';
        this.loadList();
        this.handleWindowResize = () => {
            window.clearTimeout(this.resizeLayoutTimer);
            this.resizeLayoutTimer = window.setTimeout(() => {
                // 窗口尺寸变化后同步表格布局
                this.refreshTableLayout();
            }, 120);
        };
        window.addEventListener('resize', this.handleWindowResize);
    },
    beforeDestroy() {
        window.removeEventListener('resize', this.handleWindowResize);
        window.clearTimeout(this.resizeLayoutTimer);
    },
    methods: {
        // API 请求封装
        async apiPost(path, body) {
            const resp = await axios.post(path, body || {});
            const json = resp.data;
            if (!json.success) {
                this.$message.error(json.message || '接口异常');
                throw new Error(json.message || '接口异常');
            }
            return json.data;
        },

        // 加载列表
        async loadList() {
            this.loading = true;
            try {
                const params = {
                    crmwScode: this.searchForm.crmwScode || null,
                    crmwName: this.searchForm.crmwName || null,
                    entryTimeStart: this.searchForm.entryTimeRange && this.searchForm.entryTimeRange[0]
                        ? this.searchForm.entryTimeRange[0] + ' 00:00:00' : null,
                    entryTimeEnd: this.searchForm.entryTimeRange && this.searchForm.entryTimeRange[1]
                        ? this.searchForm.entryTimeRange[1] + ' 23:59:59' : null,
                    adjusterName: this.searchForm.adjusterName || null,
                    pageIndex: this.pagination.pageIndex,
                    pageSize: this.pagination.pageSize,
                };
                const data = await this.apiPost('/api/v1/crmwPoolQuery/queryCrmwPoolPage', params);
                this.tableData = data.records || [];
                this.pagination.total = data.total || 0;
            } catch (e) {}
            this.loading = false;
            // 数据渲染后同步表格布局
            this.refreshTableLayout();
        },

        // 重新计算表格布局
        refreshTableLayout() {
            this.$nextTick(() => {
                window.requestAnimationFrame(() => {
                    const table = this.$refs.crmwTableRef;
                    if (table) {
                        table.doLayout();
                        window.setTimeout(() => table.doLayout(), 80);
                    }
                });
            });
        },

        // 触发查询
        handleSearch() {
            this.pagination.pageIndex = 1;
            this.loadList();
        },

        // 重置查询条件
        handleReset() {
            this.searchForm = {
                crmwScode: '',
                crmwName: '',
                entryTimeRange: null,
                adjusterName: '',
            };
            this.pagination.pageIndex = 1;
            this.loadList();
        },

        // 翻页
        handlePageChange(page) {
            this.pagination.pageIndex = page;
            this.loadList();
        },

        // 切换每页条数
        handleSizeChange(size) {
            this.pagination.pageSize = size;
            this.pagination.pageIndex = 1;
            this.loadList();
        },

        // 打开CRMW调库详情页
        openCrmwAdjustDetail(row) {
            const params = new URLSearchParams();
            params.set('securityCode', row.securityCode || '');
            params.set('crmwScode', row.crmwScode || '');
            if (row.targetPoolId) params.set('targetPoolId', row.targetPoolId);
            if (row.adjustLogId) params.set('adjustLogId', row.adjustLogId);
            if (row.adjustBatchNo) params.set('adjustBatchNo', row.adjustBatchNo);
            params.set('entryMode', 'view');
            window.location.href = 'crmw_pool_adjust_detail.html?' + params.toString();
        },
    }
});
</script>
</body>
</html>
