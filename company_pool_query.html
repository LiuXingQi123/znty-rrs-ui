<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主体池查询</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui@2.15.14/lib/theme-chalk/index.css">
    <script src="https://unpkg.com/vue@2.5.16/dist/vue.min.js"></script>
    <script src="https://unpkg.com/element-ui@2.15.14/lib/index.js"></script>
    <script src="https://unpkg.com/axios@1.7.9/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        #company_pool_query {
            --color-primary: #2743A4;
            --color-primary-hover: #1F3683;
            --color-primary-light: #E9ECF6;
            --color-bg-page: #F7F8FA;
            --color-bg-panel: #FFFFFF;
            --color-text-primary: #242933;
            --color-text-regular: #3F485A;
            --color-text-secondary: #707783;
            --color-text-placeholder: #9199BD;
            --color-text-disabled: #CCCCCC;
            --color-border: #E5E5E5;
            --color-border-hover: #CCCCCC;
            --color-success: #06C687;
            --color-success-light: #E7F9F3;
            --color-warning: #FFC802;
            --color-warning-light: #FFF4CC;
            --color-danger: #FF4542;
            --color-danger-light: #FFEDEC;
            --font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
            --radius-base: 4px;
            --topbar-h: 52px;

            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background: var(--color-bg-page);
            color: var(--color-text-regular);
            font-family: var(--font-family);
            font-size: 13px;
        }

        #company_pool_query .topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            height: var(--topbar-h);
            padding: 0 24px;
            background: var(--color-bg-panel);
            border-bottom: 1px solid var(--color-border);
            flex-shrink: 0;
        }

        #company_pool_query .topbar-brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #company_pool_query .topbar-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border: 1px solid var(--color-primary-light);
            border-radius: var(--radius-base);
            background: var(--color-primary-light);
            color: var(--color-primary);
            flex-shrink: 0;
        }

        #company_pool_query .topbar-icon svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        #company_pool_query .topbar h2 {
            color: var(--color-text-primary);
            font-size: 20px;
            font-weight: 600;
            line-height: 28px;
        }

        #company_pool_query .topbar-sep {
            width: 1px;
            height: 18px;
            background: var(--color-border);
        }

        #company_pool_query .topbar-sys,
        #company_pool_query .topbar-meta {
            color: var(--color-text-secondary);
            font-size: 12px;
            line-height: 20px;
        }

        #company_pool_query .topbar-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        #company_pool_query .topbar-date-badge {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 0 8px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-base);
            background: var(--color-bg-page);
            color: var(--color-text-secondary);
            font-size: 12px;
            line-height: 20px;
        }

        #company_pool_query .list-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }

        #company_pool_query .desc-link {
            color: var(--color-primary);
            font-weight: 500;
        }

        #company_pool_query .desc-link:hover {
            text-decoration: underline;
        }

        #company_pool_query .search-panel {
            padding: 16px 20px;
            margin-bottom: 12px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-base);
            background: var(--color-bg-panel);
        }

        #company_pool_query .search-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px 12px;
        }

        #company_pool_query .search-row + .search-row { margin-top: 12px; }

        #company_pool_query .search-label {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            min-width: 54px;
            height: 32px;
            color: var(--color-text-regular);
            font-size: 13px;
            font-weight: 400;
            line-height: normal;
            text-transform: none;
            letter-spacing: 0;
            margin-right: 0;
        }

        #company_pool_query .search-label .el-icon-search {
            color: var(--color-text-placeholder);
            font-size: 14px;
        }

        #company_pool_query .total-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            min-height: 24px;
            margin-left: auto;
            padding: 0 8px;
            border-radius: var(--radius-base);
            background: var(--color-primary-light);
            color: var(--color-primary);
            font-size: 12px;
            line-height: 20px;
        }

        #company_pool_query .compact-clear-btn {
            height: 22px;
            padding: 0;
            border: 0;
            border-radius: 0;
            background: transparent;
            color: var(--color-danger);
            font-family: inherit;
            font-size: 12px;
            line-height: 22px;
            cursor: pointer;
        }

        #company_pool_query .compact-clear-btn:hover {
            background: var(--color-danger-light);
            color: var(--color-danger);
        }

        #company_pool_query .compact-clear-btn i { font-size: 14px; }

        #company_pool_query .table-card {
            overflow: hidden;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-base);
            background: var(--color-bg-panel);
        }

        #company_pool_query .pagination-wrap {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            min-height: 48px;
            padding: 8px 20px;
            border-top: 1px solid var(--color-border);
            background: var(--color-bg-panel);
        }

        #company_pool_query .pool-popover-content {
            width: 100%;
            min-width: 0;
            overflow: hidden;
        }
        #company_pool_query .pool-tree-search { width: 100%; margin-bottom: 8px; }
        #company_pool_query .pool-tree-scroll {
            width: 100%; max-height: 300px; overflow-x: hidden; overflow-y: auto; padding-right: 4px;
        }
        #company_pool_query .pool-popover-actions {
            display:flex; align-items:center; justify-content:flex-end; gap:8px;
            margin-top:8px; padding-top:8px; border-top:1px solid var(--color-border);
        }
        #company_pool_query .pool-trigger {
            display:inline-flex; align-items:center; gap:6px; height:32px; padding:0 12px;
            border:1px solid var(--color-border); border-radius:4px; background:var(--color-bg-panel);
            color:var(--color-text-secondary); font-size:13px; font-weight:400; box-shadow:none; cursor:pointer; white-space:nowrap;
        }
        #company_pool_query .pool-trigger:hover,
        #company_pool_query .pool-trigger.has-selection {
            border-color:var(--color-primary); background:var(--color-primary-light); color:var(--color-primary); box-shadow:none;
        }
        #company_pool_query .pool-tag-row { display:flex; flex-wrap:wrap; gap:8px; max-width:calc(100vw - 400px); }
        #company_pool_query .pool-tag {
            display:inline-flex; align-items:center; gap:6px; min-height:24px; padding:1px 8px;
            border:1px solid var(--color-primary-light); border-radius:4px; background:var(--color-primary-light);
            color:var(--color-primary); font-size:12px; font-weight:400; line-height:20px; white-space:nowrap;
        }
        #company_pool_query .pool-tag span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        #company_pool_query .pool-tag .el-icon-close { cursor:pointer; color:var(--color-text-secondary); }
        #company_pool_query .pool-tag .el-icon-close:hover { color:var(--color-danger); }

        #company_pool_query .el-table {
            color: var(--color-text-regular);
            font-size: 13px;
        }

        #company_pool_query .el-table,
        #company_pool_query .el-table--border,
        #company_pool_query .el-table--group {
            border-color: var(--color-border);
        }

        #company_pool_query .el-table th.el-table__cell {
            height: 40px;
            padding: 8px 0;
            border-bottom: 1px solid var(--color-border);
            background: var(--color-bg-page);
            color: var(--color-text-primary);
            font-size: 13px;
            font-weight: 600;
            line-height: 22px;
        }

        #company_pool_query .el-table td.el-table__cell {
            height: 40px;
            padding: 8px 0;
            border-bottom-color: var(--color-border);
            color: var(--color-text-regular);
            font-size: 13px;
            line-height: 22px;
        }

        #company_pool_query .el-table--striped .el-table__body tr.el-table__row--striped td.el-table__cell {
            background: #FAFAFA;
        }

        #company_pool_query .el-table__body tr:hover > td {
            background: var(--color-bg-page) !important;
        }

        #company_pool_query .el-table--border th.el-table__cell,
        #company_pool_query .el-table--border td.el-table__cell {
            border-right-color: var(--color-border);
        }

        #company_pool_query .el-input--small .el-input__inner,
        #company_pool_query .el-date-editor--daterange.el-input__inner {
            height: 32px;
            border-color: var(--color-border);
            border-radius: var(--radius-base);
            color: var(--color-text-regular);
            font-size: 13px;
            line-height: 32px;
        }

        #company_pool_query .el-input--small .el-input__inner:hover,
        #company_pool_query .el-date-editor--daterange.el-input__inner:hover {
            border-color: var(--color-border-hover);
        }

        #company_pool_query .el-input--small .el-input__inner:focus,
        #company_pool_query .el-date-editor--daterange.el-input__inner.is-active {
            border-color: var(--color-primary);
        }

        #company_pool_query .el-input--small .el-input__icon {
            line-height: 32px;
        }

        #company_pool_query .el-date-editor.el-range-editor .el-range-separator {
            min-width: 24px;
            width: 24px;
            padding: 0;
            color: var(--color-text-secondary);
            font-size: 13px;
            line-height: 24px;
            text-align: center;
        }

        #company_pool_query .el-date-editor .el-range__icon,
        #company_pool_query .el-date-editor .el-range__close-icon {
            line-height: 24px;
        }

        #company_pool_query .el-button {
            height: 32px;
            padding: 0 12px;
            border-radius: var(--radius-base);
            font-size: 13px;
            font-weight: 500;
            line-height: 20px;
        }

        #company_pool_query .el-button--small {
            height: 32px;
            padding: 0 12px;
        }

        #company_pool_query .el-button--mini {
            height: 28px;
            padding: 0 10px;
            font-size: 12px;
        }

        #company_pool_query .el-button [class*="el-icon-"] {
            font-size: 16px;
        }

        #company_pool_query .el-button [class*="el-icon-"] + span {
            margin-left: 4px;
        }

        #company_pool_query .el-button--primary {
            border-color: var(--color-primary);
            background: var(--color-primary);
            color: #FFFFFF;
        }

        #company_pool_query .el-button--primary:hover,
        #company_pool_query .el-button--primary:focus {
            border-color: var(--color-primary-hover);
            background: var(--color-primary-hover);
            color: #FFFFFF;
        }

        #company_pool_query .el-button--default {
            border-color: var(--color-border);
            background: var(--color-bg-panel);
            color: var(--color-text-regular);
        }

        #company_pool_query .el-button--default:hover,
        #company_pool_query .el-button--default:focus {
            border-color: var(--color-primary);
            background: var(--color-bg-panel);
            color: var(--color-primary);
        }

        #company_pool_query .el-button.is-disabled,
        #company_pool_query .el-button.is-disabled:hover {
            border-color: var(--color-border);
            background: var(--color-bg-page);
            color: var(--color-text-disabled);
        }

        #company_pool_query .el-tag--mini {
            height: 22px;
            border-radius: 2px;
            font-size: 12px;
            line-height: 20px;
        }

        #company_pool_query .el-tag--success {
            border-color: var(--color-success-light);
            background: var(--color-success-light);
            color: var(--color-success);
        }

        #company_pool_query .el-tag--warning {
            border-color: var(--color-warning-light);
            background: var(--color-warning-light);
            color: #A7865F;
        }

        #company_pool_query .el-tag--danger {
            border-color: var(--color-danger-light);
            background: var(--color-danger-light);
            color: var(--color-danger);
        }

        #company_pool_query .el-tag--info {
            border-color: var(--color-bg-page);
            background: var(--color-bg-page);
            color: var(--color-text-secondary);
        }

        #company_pool_query .el-pagination {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            color: var(--color-text-regular);
            font-size: 13px;
            font-weight: 400;
            line-height: 28px;
        }

        #company_pool_query .el-pager li.active {
            background: var(--color-primary);
            color: #FFFFFF;
            box-shadow: none;
        }

        #company_pool_query .el-pagination .el-pagination__total,
        #company_pool_query .el-pagination .el-pagination__sizes,
        #company_pool_query .el-pagination .el-pagination__jump,
        #company_pool_query .el-pagination .el-pager {
            display: inline-flex;
            align-items: center;
            height: 28px;
            margin: 0;
            line-height: 28px;
        }

        #company_pool_query .el-pagination .btn-next,
        #company_pool_query .el-pagination .btn-prev,
        #company_pool_query .el-pagination .el-pager li {
            min-width: 28px;
            height: 28px;
            margin: 0;
            border-radius: var(--radius-base);
            line-height: 28px;
        }

        #company_pool_query .el-pagination .el-select .el-input { width: 96px !important; margin: 0; }
        #company_pool_query .el-pagination .el-input__inner {
            height: 28px;
            line-height: 28px;
        }
        #company_pool_query .el-pagination__jump .el-input {
            display: inline-flex;
            align-items: center;
            height: 28px;
            width: 48px;
            margin: 0 6px;
            line-height: 28px;
            vertical-align: top;
        }

        #company_pool_query .el-tree {
            background: transparent;
            color: var(--color-text-regular);
            font-family: inherit;
            font-size: 13px;
        }

        #company_pool_query .el-tree-node__content {
            height: 32px;
            border-radius: var(--radius-base);
        }

        #company_pool_query .el-tree-node__content:hover {
            background: var(--color-bg-page);
        }

        #company_pool_query .el-checkbox__input.is-checked .el-checkbox__inner,
        #company_pool_query .el-checkbox__input.is-indeterminate .el-checkbox__inner {
            border-color: var(--color-primary);
            background-color: var(--color-primary);
        }

        #company_pool_query .el-checkbox__input.is-focus .el-checkbox__inner,
        #company_pool_query .el-checkbox__inner:hover {
            border-color: var(--color-primary);
        }

        #company_pool_query .el-checkbox__input.is-disabled .el-checkbox__inner {
            border-color: var(--color-border);
            background-color: var(--color-bg-page);
        }

        .project-date-range-picker .el-date-table td.today span { color:#2743A4; font-weight:600; }
        .project-date-range-picker .el-date-table td.available:hover { color:#2743A4; }
        .project-date-range-picker .el-date-table td.in-range div,
        .project-date-range-picker .el-date-table td.in-range div:hover { background-color:#E9ECF6; }
        .project-date-range-picker .el-date-table td.start-date span,
        .project-date-range-picker .el-date-table td.end-date span { background-color:#2743A4; color:#FFFFFF; }
        .project-date-range-picker .el-picker-panel__icon-btn:hover,
        .project-date-range-picker .el-date-range-picker__header div:hover { color:#2743A4; }
    </style>
</head>
<body>
<div id="company_pool_query">
    <!-- ── 顶栏 ── -->
    <div class="topbar">
        <div class="topbar-brand">
            <div class="topbar-icon">
                <svg width="18" height="18" viewBox="0 0 24 24"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/></svg>
            </div>
            <h2>主体池查询</h2>
        </div>
        <div class="topbar-sep"></div>
        <span class="topbar-sys">证券投资管理系统</span>
        <div class="topbar-meta">
            <span class="topbar-date-badge">{{ today }}</span>
        </div>
    </div>

    <!-- ── 列表页 ── -->
    <div class="list-body">
        <!-- 搜索面板：包含所有筛选条件输入项 -->
        <div class="search-panel">
            <!-- 第一行：投资池选择 + 主体代码 + 入池时间范围 + 调整人 + 操作按钮 + 总数统计 -->
            <div class="search-row">
                <span class="search-label"><i class="el-icon-search"></i>筛选</span>

                <!-- 投资池选择器：点击触发树形弹窗，支持多选叶子节点 -->
                <el-popover
                    placement="bottom-start"
                    width="340"
                    v-model="poolTreeVisible"
                    :append-to-body="false"
                    @hide="handlePoolTreeHide">
                    <div class="pool-popover-content">
                        <el-input
                            v-model="poolTreeKeyword"
                            class="pool-tree-search"
                            size="small"
                            clearable
                            prefix-icon="el-icon-search"
                            placeholder="搜索投资池"
                            @input="filterPoolTree">
                        </el-input>
                        <!-- 投资池树：check-strictly 保证父子节点独立勾选，default-expand-all 默认全展开 -->
                        <div class="pool-tree-scroll">
                            <el-tree
                                ref="poolTreeRef"
                                :data="poolTreeData"
                                node-key="id"
                                :props="treeProps"
                                show-checkbox
                                check-strictly
                                default-expand-all
                                :filter-node-method="filterPoolTreeNode">
                            </el-tree>
                        </div>
                    </div>
                    <!-- 弹窗底部操作按钮：取消 / 确认 -->
                    <div class="pool-popover-actions">
                        <el-button size="mini" @click="poolTreeVisible = false">取消</el-button>
                        <el-button type="primary" size="mini" @click="handlePoolTreeConfirm">确认</el-button>
                    </div>
                    <span slot="reference" class="pool-trigger" :class="{ 'has-selection': searchForm.poolIds.length > 0 }">
                        <i class="el-icon-folder-opened"></i>
                        {{ searchForm.poolIds.length > 0 ? '已选 ' + searchForm.poolIds.length + ' 个池' : '请选择投资池' }}
                    </span>
                </el-popover>

                <el-input v-model="searchForm.subjectCode" placeholder="主体代码" clearable size="small" style="width:160px;" @keyup.enter.native="handleSearch">
                    <i slot="prefix" class="el-input__icon el-icon-office-building"></i>
                </el-input>

                <el-date-picker
                    v-model="searchForm.entryTimeRange"
                    type="daterange"
                    range-separator="至"
                    start-placeholder="入池开始"
                    end-placeholder="入池结束"
                    popper-class="project-date-range-picker"
                    size="small"
                    style="width:240px;"
                    value-format="yyyy-MM-dd">
                </el-date-picker>

                <el-input v-model="searchForm.adjusterName" placeholder="调整人" clearable size="small" style="width:140px;" @keyup.enter.native="handleSearch">
                    <i slot="prefix" class="el-input__icon el-icon-user"></i>
                </el-input>

                <el-button type="primary" size="small" icon="el-icon-search" @click="handleSearch">查询</el-button>
                <el-button size="small" icon="el-icon-refresh" @click="handleReset">重置</el-button>

                <div class="total-badge">
                    <i class="el-icon-office-building"></i> 共 {{ pagination.total }} 个主体
                </div>
            </div>

            <!-- 已选池标签行 -->
            <div class="search-row" v-if="selectedPoolTags.length > 0">
                <span class="search-label" style="visibility:hidden;"><i class="el-icon-search"></i>筛选</span>
                <div class="pool-tag-row">
                    <span class="pool-tag" v-for="p in selectedPoolTags" :key="p.id">
                        <span :title="p.poolName">{{ p.poolName }}</span>
                        <i class="el-icon-close" @click="removePoolTag(p.id)"></i>
                    </span>
                </div>
                <button type="button" class="compact-clear-btn" @click="clearPoolSelection">
                    <i class="el-icon-delete"></i> 清空
                </button>
            </div>
        </div>

        <!-- 表格卡片 -->
        <div class="table-card">
            <el-table :data="tableData" v-loading="loading" stripe border size="small" style="width:100%;">
                <el-table-column label="序号" width="50" align="center">
                    <template slot-scope="{ $index }">
                        {{ (pagination.pageIndex - 1) * pagination.pageSize + $index + 1 }}
                    </template>
                </el-table-column>
                <el-table-column prop="securityShortName" label="主体名称" min-width="200" show-overflow-tooltip>
                    <template slot-scope="{ row }">
                        <span class="desc-link">{{ row.securityShortName || '' }}</span>
                    </template>
                </el-table-column>
                <el-table-column prop="securityCode" label="主体代码" min-width="140">
                    <template slot-scope="{ row }">
                        <span class="desc-link">{{ row.securityCode || '' }}</span>
                    </template>
                </el-table-column>
                <el-table-column prop="adjusterName" label="调整人" min-width="100"></el-table-column>
                <el-table-column label="入池时间" min-width="150" align="center">
                    <template slot-scope="{ row }">
                        {{ row.entryTime ? moment(row.entryTime).format('YYYY-MM-DD HH:mm') : '' }}
                    </template>
                </el-table-column>
                <el-table-column prop="targetPoolName" label="投资池名称" min-width="160" show-overflow-tooltip></el-table-column>
            </el-table>
            <div class="pagination-wrap">
                <el-pagination
                    :total="pagination.total"
                    :current-page="pagination.pageIndex"
                    :page-size="pagination.pageSize"
                    :page-sizes="[10, 20, 50, 100]"
                    layout="total, sizes, prev, pager, next, jumper"
                    small
                    @current-change="handlePageChange"
                    @size-change="handleSizeChange">
                </el-pagination>
            </div>
        </div>
    </div>
</div>

<script>
new Vue({
    el: '#company_pool_query',
    data() {
        return {
            today: moment().format('YYYY年MM月DD日'), // 顶栏显示的当前日期文字
            // 搜索表单
            searchForm: {
                poolIds: [],            // 选中的池 ID 列表（多选）
                subjectCode: '',        // 主体代码关键词
                entryTimeRange: null,   // 入池时间范围 [startDate, endDate]
                adjusterName: '',       // 调整人姓名关键词
            },
            // 投资池树
            poolTreeData: [],           // 投资池树形数据（嵌套结构）
            poolTreeVisible: false,     // 投资池树弹窗是否显示
            poolTreeKeyword: '',        // 投资池树搜索词
            selectedPoolTags: [],       // 已选池标签列表 [{id, poolName}]，用于标签行展示
            treeProps: {              // 投资池树字段配置
                children: 'children',  // 子节点字段名
                label: 'poolName',     // 节点显示文本字段名
                disabled(data) {
                    // 仅叶子节点可选，父节点（有子节点）禁止勾选
                    return data.children && data.children.length > 0;
                }
            },
            // 表格
            tableData: [],              // 当前页主体池数据列表
            loading: false,             // 表格加载状态
            pagination: {             // 分页参数
                pageIndex: 1,           // 当前页码
                pageSize: 20,           // 每页显示条数
                total: 0,               // 查询结果总条数
            },
        };
    },
    // 页面挂载后：配置请求根地址，加载投资池树与主体池列表
    mounted() {
        axios.defaults.baseURL = 'http://localhost:18090';
        this.loadPoolTree();
        this.loadList();
    },
    methods: {
        // 统一 POST 请求封装：校验 code 为 0，否则弹出错误提示并抛出异常
        async apiPost(path, body) {
            const resp = await axios.post(path, body || {});
            const json = resp.data;
            if (json.code !== 0) {
                this.$message.error(json.message || '接口异常');
                throw new Error(json.message || '接口异常');
            }
            return json.data;
        },

        // 加载投资池树
        async loadPoolTree() {
            try {
                const data = await this.apiPost('/api/v1/common/queryPoolTreeList', {});
                this.poolTreeData = this.buildPoolTree(data || []);
            } catch (e) {}
        },

        // 构建树结构（扁平列表 → 嵌套树），同时为每个节点挂载 fullPath 用于标签展示
        buildPoolTree(list) {
            if (!list || list.length === 0) return [];
            const map = {};
            const roots = [];
            list.forEach(function(item) {
                map[item.id] = Object.assign({}, item, { children: [] });
            });
            list.forEach(function(item) {
                const node = map[item.id];
                if (item.parentId != null && map[item.parentId]) {
                    const parent = map[item.parentId];
                    node.fullPath = node.poolFullName || parent.poolName + '/' + node.poolName;
                    parent.children.push(node);
                } else {
                    node.fullPath = node.poolFullName || node.poolName;
                    roots.push(node);
                }
            });
            return roots;
        },

        // 确认池树选择
        handlePoolTreeConfirm() {
            const checkedKeys = this.$refs.poolTreeRef.getCheckedKeys();
            const halfCheckedKeys = this.$refs.poolTreeRef.getHalfCheckedKeys();
            const allKeys = checkedKeys.concat(halfCheckedKeys);
            this.searchForm.poolIds = allKeys;
            const flatList = this.flattenTree(this.poolTreeData);
            this.selectedPoolTags = flatList
                .filter(function(n) { return allKeys.indexOf(n.id) !== -1; })
                .map(function(n) { return { id: n.id, poolName: n.fullPath }; });
            this.poolTreeVisible = false;
            this.handleSearch();
        },

        // 按投资池名称过滤选择树
        filterPoolTree(value) {
            if (this.$refs.poolTreeRef) {
                this.$refs.poolTreeRef.filter(value.trim());
            }
        },

        // 判断投资池树节点是否匹配搜索词
        filterPoolTreeNode(value, data) {
            if (!value) return true;
            const searchableText = data.fullPath || data.poolName || '';
            return String(searchableText).toLowerCase().indexOf(value.toLowerCase()) !== -1;
        },

        // 关闭选择弹层后清空搜索条件
        handlePoolTreeHide() {
            this.poolTreeKeyword = '';
            if (this.$refs.poolTreeRef) {
                this.$refs.poolTreeRef.filter('');
            }
        },

        // 移除已选池标签
        removePoolTag(poolId) {
            this.searchForm.poolIds = this.searchForm.poolIds.filter(function(id) { return id !== poolId; });
            this.selectedPoolTags = this.selectedPoolTags.filter(function(p) { return p.id !== poolId; });
            this.$refs.poolTreeRef.setCheckedKeys(this.searchForm.poolIds);
            this.handleSearch();
        },

        // 清空全部已选投资池并同步取消树节点勾选
        clearPoolSelection() {
            this.searchForm.poolIds = [];
            this.selectedPoolTags = [];
            if (this.$refs.poolTreeRef) {
                this.$refs.poolTreeRef.setCheckedKeys([]);
            }
            this.handleSearch();
        },

        // 树扁平化
        flattenTree(nodes) {
            const result = [];
            (function walk(list) {
                list.forEach(function(n) {
                    result.push(n);
                    if (n.children && n.children.length > 0) walk(n.children);
                });
            })(nodes);
            return result;
        },

        // 组装分页查询参数并调用接口，将结果填入 tableData 与 pagination.total
        async loadList() {
            this.loading = true;
            try {
                const params = {
                    poolIds: this.searchForm.poolIds.length > 0 ? this.searchForm.poolIds : null,
                    subjectCode: this.searchForm.subjectCode || null,
                    entryTimeStart: this.searchForm.entryTimeRange && this.searchForm.entryTimeRange[0]
                        ? this.searchForm.entryTimeRange[0] + ' 00:00:00' : null,
                    entryTimeEnd: this.searchForm.entryTimeRange && this.searchForm.entryTimeRange[1]
                        ? this.searchForm.entryTimeRange[1] + ' 23:59:59' : null,
                    adjusterName: this.searchForm.adjusterName || null,
                    pageIndex: this.pagination.pageIndex,
                    pageSize: this.pagination.pageSize,
                };
                const data = await this.apiPost('/api/v1/subjectPoolQuery/querySubjectPoolPage', params);
                this.tableData = data.records || [];
                this.pagination.total = data.total || 0;
            } catch (e) {}
            this.loading = false;
        },

        // 点击查询按钮：重置页码为第 1 页并重新加载列表
        handleSearch() {
            this.pagination.pageIndex = 1;
            this.loadList();
        },

        // 点击重置按钮：清空所有搜索条件、清除池树勾选，并重新加载列表
        handleReset() {
            this.searchForm = {
                poolIds: [],
                subjectCode: '',
                entryTimeRange: null,
                adjusterName: '',
            };
            this.selectedPoolTags = [];
            this.pagination.pageIndex = 1;
            if (this.$refs.poolTreeRef) {
                this.$refs.poolTreeRef.setCheckedKeys([]);
            }
            this.loadList();
        },

        // 切换页码：更新当前页码并重新加载列表
        handlePageChange(page) {
            this.pagination.pageIndex = page;
            this.loadList();
        },
        // 修改每页条数：重置到第 1 页并重新加载列表
        handleSizeChange(size) {
            this.pagination.pageSize = size;
            this.pagination.pageIndex = 1;
            this.loadList();
        },
    }
});
</script>
</body>
</html>
