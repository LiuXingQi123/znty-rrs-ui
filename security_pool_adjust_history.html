<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>证券池调整历史</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/element-ui@2.15.14/lib/theme-chalk/index.css">
    <script src="https://unpkg.com/vue@2.5.16/dist/vue.min.js"></script>
    <script src="https://unpkg.com/element-ui@2.15.14/lib/index.js"></script>
    <script src="https://unpkg.com/axios@1.7.9/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <style>
        /* 全局盒模型重置 */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ── 页面根容器：CSS 变量定义 + 整体布局 ── */
        #security_pool_adjust_history {
            /* 背景与表面色 */
            --c-bg:         #F2F4F8;
            --c-surface:    #FFFFFF;
            --c-surface-2:  #F8FAFD;
            --c-border:     #E2E8F4;
            --c-border-l:   #ECF0F9;

            /* 文字色阶 */
            --c-text:       #0D1829;
            --c-text-2:     #3A4769;
            --c-text-3:     #8895B8;
            --c-text-inv:   #FFFFFF;

            /* 主色及衍生色 */
            --c-primary:    #1746D4;
            --c-primary-h:  #0F35B0;
            --c-primary-l:  #EEF2FD;
            --c-primary-s:  rgba(23,70,212,.12);
            --c-primary-glow: rgba(23,70,212,.18);

            /* 状态色：绿/琥珀/红 */
            --c-green:      #0A8A5A;
            --c-green-l:    #E8FBF3;
            --c-amber:      #B05E00;
            --c-amber-l:    #FFF6E8;
            --c-red:        #D02020;
            --c-red-l:      #FFF0F0;
            --c-red-s:      rgba(208,32,32,.12);

            /* 圆角尺寸 */
            --r-xs: 4px;
            --r-sm: 7px;
            --r:    10px;
            --r-lg: 14px;
            --r-xl: 18px;

            /* 阴影等级 */
            --sh-xs: 0 1px 3px rgba(13,24,54,.05);
            --sh-sm: 0 2px 8px rgba(13,24,54,.08), 0 0 0 1px rgba(13,24,54,.04);
            --sh-md: 0 4px 20px rgba(13,24,54,.10), 0 0 0 1px rgba(13,24,54,.04);

            /* 顶栏高度常量 */
            --topbar-h: 60px;

            /* 整页纵向弹性布局，高度撑满视口，超出不滚动（由内部区域独立滚动） */
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--c-bg);
            color: var(--c-text);
            font-size: 14px;
            letter-spacing: 0.01em;
        }

        /* ── 顶部导航栏整体布局 ── */
        #security_pool_adjust_history .topbar {
            display: flex; align-items: center;
            padding: 0 28px; height: var(--topbar-h);
            background: var(--c-surface);
            border-bottom: 1px solid var(--c-border);
            flex-shrink: 0; gap: 14px;
            box-shadow: 0 1px 0 var(--c-border), 0 2px 8px rgba(13,24,54,.04);
        }
        /* 顶栏左侧品牌区（图标 + 标题） */
        #security_pool_adjust_history .topbar-brand { display: flex; align-items: center; gap: 12px; }
        /* 顶栏品牌图标（蓝色渐变圆角方块） */
        #security_pool_adjust_history .topbar-icon {
            width: 34px; height: 34px; border-radius: 9px;
            background: linear-gradient(135deg, var(--c-primary) 0%, #3B6AEA 100%);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            box-shadow: 0 2px 8px var(--c-primary-glow);
        }
        /* 顶栏图标内部 SVG 填充为白色 */
        #security_pool_adjust_history .topbar-icon svg { fill: #fff; }
        /* 顶栏页面标题文字样式 */
        #security_pool_adjust_history .topbar h2 { font-size: 15px; font-weight: 700; color: var(--c-text); letter-spacing: 0.02em; }
        /* 顶栏分隔竖线 */
        #security_pool_adjust_history .topbar-sep { width: 1px; height: 18px; background: var(--c-border); }
        /* 顶栏系统名称副标题 */
        #security_pool_adjust_history .topbar-sys {
            font-size: 12px; color: var(--c-text-3); font-weight: 400; letter-spacing: 0.03em;
        }
        /* 顶栏右侧元信息区（推到最右侧） */
        #security_pool_adjust_history .topbar-meta {
            margin-left: auto;
            display: flex; align-items: center; gap: 8px;
            font-size: 12px; color: var(--c-text-3);
        }
        /* 顶栏日期胶囊徽章 */
        #security_pool_adjust_history .topbar-date-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 10px; border-radius: 20px;
            background: var(--c-surface-2);
            border: 1px solid var(--c-border);
            font-size: 11px; color: var(--c-text-3); font-weight: 500;
        }

        /* ── 列表页主体区域：占满剩余高度，纵向滚动 ── */
        #security_pool_adjust_history .list-body { flex: 1; overflow-y: auto; padding: 22px 28px; }
        #security_pool_adjust_history .desc-link {
            color: var(--c-primary);
            cursor: pointer;
            font-weight: 600;
        }
        #security_pool_adjust_history .desc-link:hover { text-decoration: underline; }

        /* 搜索面板：白色卡片，包含所有筛选项 */
        #security_pool_adjust_history .search-panel {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--r-xl);
            padding: 16px 20px;
            margin-bottom: 16px;
            box-shadow: var(--sh-xs);
        }
        /* 搜索行：每行筛选控件水平排列，允许换行 */
        #security_pool_adjust_history .search-row {
            display: flex; align-items: center; flex-wrap: wrap; gap: 10px;
        }
        /* 相邻搜索行之间增加间距 */
        #security_pool_adjust_history .search-row + .search-row { margin-top: 10px; }
        /* 搜索行标签文字（小号大写加粗） */
        #security_pool_adjust_history .search-label {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 12px; font-weight: 600; color: var(--c-text-3);
            text-transform: uppercase; letter-spacing: 0.06em;
            margin-right: 4px;
        }
        /* 总条数统计徽章（右对齐显示在搜索行末尾） */
        #security_pool_adjust_history .total-badge {
            margin-left: auto;
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 14px; border-radius: 20px;
            background: var(--c-primary-l);
            border: 1px solid rgba(23,70,212,.15);
            color: var(--c-primary);
            font-size: 12px; font-weight: 600;
        }

        /* 池树触发按钮：点击后展开投资池树弹出层 */
        #security_pool_adjust_history .pool-trigger {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 7px 14px; border-radius: var(--r);
            border: 1px solid var(--c-border);
            background: var(--c-surface);
            color: var(--c-text-2);
            font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all .18s ease;
            outline: none; font-family: inherit;
            white-space: nowrap;
        }
        /* 池触发按钮悬停态 */
        #security_pool_adjust_history .pool-trigger:hover {
            border-color: var(--c-primary); color: var(--c-primary);
            background: var(--c-primary-l);
        }
        /* 池触发按钮已有选中项时高亮显示 */
        #security_pool_adjust_history .pool-trigger.has-selection {
            border-color: var(--c-primary); color: var(--c-primary);
            background: var(--c-primary-l);
            box-shadow: 0 1px 4px var(--c-primary-s);
        }

        /* 已选池标签容器：横向排列，超出宽度自动换行 */
        #security_pool_adjust_history .pool-tag-row {
            display: flex; flex-wrap: wrap; gap: 6px;
            max-width: calc(100vw - 400px);
        }
        /* 单个已选池标签样式（蓝色胶囊，含关闭图标） */
        #security_pool_adjust_history .pool-tag {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 8px; border-radius: 14px;
            background: var(--c-primary-l);
            border: 1px solid rgba(23,70,212,.15);
            color: var(--c-primary);
            font-size: 11.5px; font-weight: 500;
            white-space: nowrap;
        }
        /* 标签内关闭图标 */
        #security_pool_adjust_history .pool-tag .el-icon-close {
            cursor: pointer; font-size: 11px;
            color: var(--c-primary);
            transition: color .15s;
        }
        /* 标签关闭图标悬停变红提示危险操作 */
        #security_pool_adjust_history .pool-tag .el-icon-close:hover { color: var(--c-red); }

        /* 表格卡片：白色圆角卡片，内部包含表格与分页 */
        #security_pool_adjust_history .table-card {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--r-xl);
            overflow: hidden;
            box-shadow: var(--sh-sm);
        }
        /* 分页区：底部浅色背景条，内容右对齐 */
        #security_pool_adjust_history .pagination-wrap {
            display: flex; justify-content: flex-end;
            padding: 12px 20px;
            border-top: 1px solid var(--c-border-l);
            background: var(--c-surface-2);
        }

        /* 池树弹出层内容容器：限制宽高并允许内部滚动 */
        #security_pool_adjust_history .pool-popover-content {
            width: 320px; max-height: 400px; overflow-y: auto;
        }

        /* ── Element UI 组件样式覆盖 ── */
        /* 表头单元格：浅蓝背景 + 加粗小字 */
        #security_pool_adjust_history .el-table th.el-table__cell {
            background: #F4F7FE;
            color: var(--c-text-2); font-weight: 700;
            font-size: 11.5px; letter-spacing: 0.05em;
            border-bottom: 1px solid var(--c-border);
            padding: 11px 0;
        }
        /* 数据单元格：正文色 + 浅分割线 */
        #security_pool_adjust_history .el-table td.el-table__cell {
            color: var(--c-text); border-bottom-color: var(--c-border-l);
            padding: 10px 0;
        }
        /* 斑马纹奇数行背景 */
        #security_pool_adjust_history .el-table--striped .el-table__body tr.el-table__row--striped td.el-table__cell {
            background: #FAFBFF;
        }
        /* 表格行悬停高亮 */
        #security_pool_adjust_history .el-table__body tr:hover > td {
            background: var(--c-primary-l) !important;
        }
        /* 小尺寸输入框内边框与字体覆盖 */
        #security_pool_adjust_history .el-input--small .el-input__inner {
            border-radius: var(--r-sm); border-color: var(--c-border);
            color: var(--c-text); font-size: 13px;
            transition: border-color .18s, box-shadow .18s;
        }
        /* 输入框悬停描边加深 */
        #security_pool_adjust_history .el-input--small .el-input__inner:hover { border-color: #B0BCE8; }
        /* 输入框聚焦态：主色描边 + 光晕 */
        #security_pool_adjust_history .el-input--small .el-input__inner:focus {
            border-color: var(--c-primary);
            box-shadow: 0 0 0 3px var(--c-primary-s);
        }
        /* 日期范围选择器分隔符宽度固定，防止布局抖动 */
        #security_pool_adjust_history .el-date-editor.el-range-editor .el-range-separator {
            min-width: 24px;
            width: 24px;
            padding: 0;
            text-align: center;
        }
        /* 主要按钮：蓝色渐变背景 */
        #security_pool_adjust_history .el-button--primary {
            background: linear-gradient(135deg, var(--c-primary) 0%, #2D5CE8 100%);
            border-color: var(--c-primary);
            border-radius: var(--r-sm); font-weight: 600; letter-spacing: 0.03em;
            transition: all .18s; box-shadow: 0 2px 6px var(--c-primary-s);
        }
        /* 主要按钮悬停：加深渐变 + 上浮阴影 */
        #security_pool_adjust_history .el-button--primary:hover {
            background: linear-gradient(135deg, var(--c-primary-h) 0%, var(--c-primary) 100%);
            border-color: var(--c-primary-h);
            box-shadow: 0 4px 12px var(--c-primary-glow);
            transform: translateY(-1px);
        }
        /* 主要按钮点击态：轻微缩放反馈 */
        #security_pool_adjust_history .el-button--primary:active { transform: scale(.97) translateY(0); }
        /* 默认按钮：白底细边，次要操作使用 */
        #security_pool_adjust_history .el-button--default {
            border-radius: var(--r-sm); color: var(--c-text-2);
            border-color: var(--c-border); font-weight: 500;
            background: var(--c-surface); transition: all .18s;
        }
        /* 默认按钮悬停：主色高亮 */
        #security_pool_adjust_history .el-button--default:hover {
            color: var(--c-primary); border-color: rgba(23,70,212,.2); background: var(--c-primary-l);
            box-shadow: 0 2px 8px var(--c-primary-s);
        }
        /* 迷你标签：胶囊形加粗小字 */
        #security_pool_adjust_history .el-tag--mini {
            border-radius: 20px; font-weight: 600; font-size: 11px; letter-spacing: 0.03em;
        }
        /* 状态标签颜色：成功/警告/危险/默认 */
        #security_pool_adjust_history .el-tag--success { background: var(--c-green-l); border-color: transparent; color: var(--c-green); }
        #security_pool_adjust_history .el-tag--warning { background: var(--c-amber-l); border-color: transparent; color: var(--c-amber); }
        #security_pool_adjust_history .el-tag--danger  { background: var(--c-red-l);   border-color: transparent; color: var(--c-red); }
        #security_pool_adjust_history .el-tag--info    { background: #F0F2FA; border-color: transparent; color: var(--c-text-3); }
        /* 分页当前页码高亮 */
        #security_pool_adjust_history .el-pager li.active {
            background: var(--c-primary); color: #fff;
            border-radius: var(--r-sm);
            box-shadow: 0 2px 6px var(--c-primary-s);
        }
        #security_pool_adjust_history .el-pagination .btn-next,
        #security_pool_adjust_history .el-pagination .btn-prev,
        #security_pool_adjust_history .el-pagination .el-pager li { border-radius: var(--r-sm); font-weight: 500; }
        #security_pool_adjust_history .el-pagination { font-weight: 500; }
        #security_pool_adjust_history .el-pagination.is-small .el-select .el-input { width: 100px !important; }
        #security_pool_adjust_history .el-tree {
            font-family: inherit;
            background: transparent;
        }
        #security_pool_adjust_history .el-tree-node__content {
            height: 32px; border-radius: var(--r-xs);
        }
        #security_pool_adjust_history .el-tree-node__content:hover {
            background: var(--c-primary-l);
        }
        #security_pool_adjust_history .el-checkbox__input.is-disabled .el-checkbox__inner {
            background-color: #F0F2FA; border-color: #DDE3F0;
        }

        /* 滚动条 */
        #security_pool_adjust_history ::-webkit-scrollbar { width: 5px; height: 5px; }
        #security_pool_adjust_history ::-webkit-scrollbar-track { background: transparent; }
        #security_pool_adjust_history ::-webkit-scrollbar-thumb { background: #CCD5E8; border-radius: 10px; }
        #security_pool_adjust_history ::-webkit-scrollbar-thumb:hover { background: #ADB9D4; }
    </style>
</head>
<body>
<div id="security_pool_adjust_history">
    <!-- ── 顶栏 ── -->
    <div class="topbar">
        <div class="topbar-brand">
            <div class="topbar-icon">
                <svg width="18" height="18" viewBox="0 0 24 24"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
            </div>
            <h2>证券池调整历史</h2>
        </div>
        <div class="topbar-sep"></div>
        <span class="topbar-sys">证券投资管理系统</span>
        <div class="topbar-meta">
            <span class="topbar-date-badge">{{ today }}</span>
        </div>
    </div>

    <!-- ── 列表页 ── -->
    <div class="list-body">
        <!-- 搜索面板 -->
        <div class="search-panel">
            <!-- 第一行 -->
            <div class="search-row">
                <span class="search-label"><i class="el-icon-search"></i>筛选</span>

                <el-popover
                    placement="bottom-start"
                    width="340"
                    v-model="poolTreeVisible"
                    :append-to-body="false">
                    <div class="pool-popover-content">
                        <el-tree
                            ref="poolTreeRef"
                            :data="poolTreeData"
                            node-key="id"
                            :props="treeProps"
                            show-checkbox
                            check-strictly
                            default-expand-all
                            :filter-node-method="filterPoolNode">
                        </el-tree>
                    </div>
                    <div style="margin-top:8px;text-align:right;">
                        <el-button size="mini" @click="poolTreeVisible = false">取消</el-button>
                        <el-button type="primary" size="mini" @click="handlePoolTreeConfirm">确认</el-button>
                    </div>
                    <span slot="reference" class="pool-trigger" :class="{ 'has-selection': searchForm.poolIds.length > 0 }">
                        <i class="el-icon-folder-opened"></i>
                        {{ searchForm.poolIds.length > 0 ? '已选 ' + searchForm.poolIds.length + ' 个池' : '请选择投资池' }}
                    </span>
                </el-popover>

                <el-input v-model="searchForm.securityCode" placeholder="证券代码" clearable size="small" style="width:140px;" @keyup.enter.native="handleSearch">
                    <i slot="prefix" class="el-input__icon el-icon-document"></i>
                </el-input>

                <el-select v-model="searchForm.securityType" placeholder="证券类型" clearable size="small" style="width:140px;">
                    <el-option v-for="t in securityTypeOptions" :key="t.securityType" :label="t.securityTypeName" :value="t.securityType"></el-option>
                </el-select>

                <el-select v-model="searchForm.bondStatus" placeholder="证券状态" clearable size="small" style="width:120px;">
                    <el-option v-for="s in bondStatusOptions" :key="s.value" :label="s.label" :value="s.value"></el-option>
                </el-select>

                <el-date-picker
                    v-model="searchForm.adjustTimeRange"
                    type="daterange"
                    range-separator="至"
                    start-placeholder="调整开始"
                    end-placeholder="调整结束"
                    size="small"
                    style="width:240px;"
                    value-format="yyyy-MM-dd">
                </el-date-picker>
            </div>

            <!-- 第二行 -->
            <div class="search-row">
                <span class="search-label" style="visibility:hidden;"><i class="el-icon-search"></i>筛选</span>

                <el-input v-model="searchForm.adjusterName" placeholder="调整人" clearable size="small" style="width:130px;">
                    <i slot="prefix" class="el-input__icon el-icon-user"></i>
                </el-input>

                <el-input v-model="searchForm.issuer" placeholder="发行主体名称" clearable size="small" style="width:180px;">
                    <i slot="prefix" class="el-input__icon el-icon-office-building"></i>
                </el-input>

                <el-select v-model="searchForm.adjustMode" placeholder="调整方向" clearable size="small" style="width:110px;">
                    <el-option v-for="m in adjustModeOptions" :key="m.value" :label="m.label" :value="m.value"></el-option>
                </el-select>

                <el-select v-model="searchForm.auditStatus" placeholder="调整状态" clearable size="small" style="width:130px;">
                    <el-option v-for="a in auditStatusOptions" :key="a.value" :label="a.label" :value="a.value"></el-option>
                </el-select>

                <el-checkbox v-model="searchForm.myBonds" @change="handleSearch">我的调整</el-checkbox>

                <el-button type="primary" size="small" icon="el-icon-search" @click="handleSearch">查询</el-button>
                <el-button size="small" icon="el-icon-refresh" @click="handleReset">重置</el-button>

                <div class="total-badge">
                    <i class="el-icon-data-line"></i> 共 {{ pagination.total }} 条记录
                </div>
            </div>

            <!-- 已选池标签行 -->
            <div class="search-row" v-if="selectedPoolTags.length > 0">
                <span class="search-label" style="visibility:hidden;"><i class="el-icon-search"></i>筛选</span>
                <div class="pool-tag-row">
                    <span class="pool-tag" v-for="p in selectedPoolTags" :key="p.id">
                        {{ p.poolName }}
                        <i class="el-icon-close" @click="removePoolTag(p.id)"></i>
                    </span>
                </div>
            </div>
        </div>

        <!-- 表格卡片 -->
        <div class="table-card">
            <el-table :data="tableData" v-loading="loading" stripe border size="small" style="width:100%;">
                <el-table-column label="提交日期" min-width="130">
                    <template slot-scope="{ row }">
                        {{ row.submitTime ? moment(row.submitTime).format('YYYY-MM-DD HH:mm') : '' }}
                    </template>
                </el-table-column>
                <el-table-column prop="securityShortName" label="证券名称" min-width="140" show-overflow-tooltip fixed="left">
                    <template slot-scope="{ row }">
                        <span class="desc-link" @click="openSecurityAdjustDetail(row)">{{ row.securityShortName || '' }}</span>
                    </template>
                </el-table-column>
                <el-table-column prop="securityCode" label="证券代码" min-width="120">
                    <template slot-scope="{ row }">
                        <span class="desc-link" @click="openSecurityAdjustDetail(row)">{{ row.securityCode || '' }}</span>
                    </template>
                </el-table-column>
                <el-table-column prop="securityTypeName" label="证券类型" min-width="110">
                    <template slot-scope="{ row }">
                        <el-tag v-if="row.securityTypeName" size="mini" type="info">{{ row.securityTypeName }}</el-tag>
                        <span v-else style="color:var(--c-text-3);"></span>
                    </template>
                </el-table-column>
                <el-table-column prop="adjustType" label="调整类型" min-width="110">
                    <template slot-scope="{ row }">{{ row.adjustType || '' }}</template>
                </el-table-column>
                <el-table-column label="调整方向" min-width="90">
                    <template slot-scope="{ row }">
                        <el-tag v-if="row.adjustMode === '调入'" type="success" size="mini">调入</el-tag>
                        <el-tag v-else-if="row.adjustMode === '调出'" type="danger" size="mini">调出</el-tag>
                        <span v-else style="color:var(--c-text-3);"></span>
                    </template>
                </el-table-column>
                <el-table-column prop="targetPoolPath" label="投资池名称" min-width="160" show-overflow-tooltip>
                    <template slot-scope="{ row }">{{ row.targetPoolPath || '' }}</template>
                </el-table-column>
                <el-table-column prop="adjustReason" label="调整原因" min-width="180" show-overflow-tooltip>
                    <template slot-scope="{ row }">{{ row.adjustReason || '' }}</template>
                </el-table-column>
                <el-table-column label="审核状态" min-width="110">
                    <template slot-scope="{ row }">
                        <el-tag :type="auditStatusType(row.auditStatus)" size="mini" v-if="row.auditStatus != null">
                            {{ auditStatusLabel(row.auditStatus) }}
                        </el-tag>
                        <span v-else style="color:var(--c-text-3);"></span>
                    </template>
                </el-table-column>
                <el-table-column prop="adjusterName" label="调整人" min-width="90">
                    <template slot-scope="{ row }">{{ row.adjusterName || '' }}</template>
                </el-table-column>
            </el-table>
            <div class="pagination-wrap">
                <el-pagination
                    :total="pagination.total"
                    :current-page="pagination.pageIndex"
                    :page-size="pagination.pageSize"
                    :page-sizes="[10, 20, 50, 100]"
                    layout="total, sizes, prev, pager, next, jumper"
                    small
                    @current-change="handlePageChange"
                    @size-change="handleSizeChange">
                </el-pagination>
            </div>
        </div>
    </div>
</div>

<script>
new Vue({
    el: '#security_pool_adjust_history',
    data() {
        return {
            today: moment().format('YYYY年MM月DD日'), // 顶栏当前日期展示文字
            // 搜索表单
            searchForm: {
                poolIds: [],           // 选中的池ID列表（多选）
                securityCode: '',      // 证券代码关键词
                securityType: '',      // 证券类型（下拉选中值）
                bondStatus: '',        // 证券状态（存续/到期）
                adjustTimeRange: null, // 调整时间范围 [startDate, endDate]
                adjusterName: '',      // 调整人姓名关键词
                issuer: '',            // 发行主体名称关键词
                adjustMode: '',        // 调整方向（调入/调出）
                auditStatus: '',       // 审核状态码
                myBonds: false,        // 是否只看我的调整记录
                currentUserId: '1001', // 当前用户ID（TODO: 对接实际登录用户）
            },
            securityTypeOptions: [],  // 证券类型下拉（动态加载）
            // 证券状态下拉
            bondStatusOptions: [
                { value: '存续', label: '存续' },
                { value: '到期', label: '到期' },
            ],
            // 调整方向下拉
            adjustModeOptions: [
                { value: '调入', label: '调入' },
                { value: '调出', label: '调出' },
            ],
            // 审核状态下拉
            auditStatusOptions: [
                { value: '-1', label: '无效调整' },
                { value: '00', label: '已提交待审核' },
                { value: '10', label: '审核通过待审批' },
                { value: '11', label: '驳回待修改' },
                { value: '20', label: '审批通过' },
                { value: '21', label: '审批驳回' },
                { value: '32', label: 'O32自动审批' },
                { value: '99', label: '发起人已撤回' },
            ],
            // 投资池树相关
            poolTreeData: [],          // 树形结构数据（由扁平列表构建）
            poolTreeVisible: false,    // 投资池选择弹出层显隐状态
            selectedPoolTags: [],      // 已选池标签列表 [{id, poolName}]，用于标签行展示
            treeProps: {
                children: 'children',  // 子节点字段名
                label: 'poolName',     // 节点显示文字字段名
                disabled: function(data) {
                    // 仅叶子节点可选，父节点禁止勾选
                    return data.children && data.children.length > 0;
                }
            },
            // 表格与分页
            tableData: [],             // 当前页表格数据
            loading: false,            // 表格加载状态
            pagination: {
                pageIndex: 1,          // 当前页码
                pageSize: 20,          // 每页条数
                total: 0,              // 总记录数
            },
        };
    },
    // 组件挂载后初始化：设置后端接口地址，依次加载投资池树、证券类型下拉和列表数据
    mounted() {
        axios.defaults.baseURL = 'http://localhost:18090';
        this.loadPoolTree();
        this.loadSecurityTypeOptions();
        this.loadList();
    },
    methods: {
        // API 请求封装
        async apiPost(path, body) {
            const resp = await axios.post(path, body || {});
            const json = resp.data;
            if (json.code !== 0) {
                this.$message.error(json.message || '接口异常');
                throw new Error(json.message || '接口异常');
            }
            return json.data;
        },

        // 审核状态码 → 中文
        auditStatusLabel(code) {
            const map = {
                '-1': '无效调整', '00': '已提交待审核', '10': '审核通过待审批',
                '11': '驳回待修改', '20': '审批通过', '21': '审批驳回', '32': 'O32自动审批', '99': '发起人已撤回'
            };
            return map[String(code)] || code || '';
        },

        // 审核状态 → el-tag type
        auditStatusType(code) {
            const map = {
                '20': 'success', '10': 'success', '-1': 'danger',
                '21': 'danger', '32': 'success', '99': 'info', '11': 'warning', '00': 'warning'
            };
            return map[String(code)] || 'info';
        },

        // 加载投资池树
        async loadPoolTree() {
            try {
                const data = await this.apiPost('/api/v1/adjustHistory/queryPoolTreeList', {});
                this.poolTreeData = this.buildPoolTree(data || []);
            } catch (e) {}
        },

        // 加载证券类型下拉选项（返回 [{securityType, securityTypeName}] 列表）
        async loadSecurityTypeOptions() {
            try {
                this.securityTypeOptions = await this.apiPost('/api/v1/adjustHistory/querySecurityTypeList', {});
            } catch (e) {}
        },

        // 构建树结构（扁平列表 → 嵌套树）
        buildPoolTree(list) {
            if (!list || list.length === 0) return [];
            const map = {};
            const roots = [];
            list.forEach(function(item) {
                map[item.id] = Object.assign({}, item, { children: [] });
            });
            list.forEach(function(item) {
                const node = map[item.id];
                if (item.parentId != null && map[item.parentId]) {
                    const parent = map[item.parentId];
                    node.fullPath = parent.poolName + '/' + node.poolName;
                    parent.children.push(node);
                } else {
                    node.fullPath = node.poolName;
                    roots.push(node);
                }
            });
            return roots;
        },

        // 树节点搜索过滤
        filterPoolNode(value, data) {
            if (!value) return true;
            return data.poolName && data.poolName.indexOf(value) !== -1;
        },

        // 确认池树选择
        handlePoolTreeConfirm() {
            const checkedKeys = this.$refs.poolTreeRef.getCheckedKeys();
            const halfCheckedKeys = this.$refs.poolTreeRef.getHalfCheckedKeys();
            const allKeys = checkedKeys.concat(halfCheckedKeys);
            this.searchForm.poolIds = allKeys;
            // 构建标签展示数据
            const flatList = this.flattenTree(this.poolTreeData);
            this.selectedPoolTags = flatList.filter(function(n) {
                return allKeys.indexOf(n.id) !== -1;
            }).map(function(n) {
                return { id: n.id, poolName: n.fullPath };
            });
            this.poolTreeVisible = false;
            this.handleSearch();
        },

        // 移除已选池标签
        removePoolTag(poolId) {
            this.searchForm.poolIds = this.searchForm.poolIds.filter(function(id) {
                return id !== poolId;
            });
            this.selectedPoolTags = this.selectedPoolTags.filter(function(p) {
                return p.id !== poolId;
            });
            // 同步 tree 勾选状态
            this.$refs.poolTreeRef.setCheckedKeys(this.searchForm.poolIds);
            this.handleSearch();
        },

        // 树扁平化
        flattenTree(nodes) {
            let result = [];
            (function walk(list) {
                list.forEach(function(n) {
                    result.push(n);
                    if (n.children && n.children.length > 0) {
                        walk(n.children);
                    }
                });
            })(nodes);
            return result;
        },

        // 加载列表
        async loadList() {
            this.loading = true;
            try {
                const params = {
                    poolIds: this.searchForm.poolIds.length > 0 ? this.searchForm.poolIds : null,
                    securityCode: this.searchForm.securityCode || null,
                    securityType: this.searchForm.securityType || null,
                    bondStatus: this.searchForm.bondStatus || null,
                    adjustTimeStart: this.searchForm.adjustTimeRange ? this.searchForm.adjustTimeRange[0] : null,
                    adjustTimeEnd: this.searchForm.adjustTimeRange ? this.searchForm.adjustTimeRange[1] : null,
                    adjusterName: this.searchForm.adjusterName || null,
                    issuer: this.searchForm.issuer || null,
                    adjustMode: this.searchForm.adjustMode || null,
                    auditStatus: this.searchForm.auditStatus || null,
                    myBonds: this.searchForm.myBonds || null,
                    currentUserId: this.searchForm.currentUserId,
                    pageIndex: this.pagination.pageIndex,
                    pageSize: this.pagination.pageSize,
                };
                const data = await this.apiPost('/api/v1/adjustHistory/queryAdjustHistoryPage', params);
                this.tableData = data.records || [];
                this.pagination.total = data.total || 0;
            } catch (e) {}
            this.loading = false;
        },

        // 触发查询：重置到第一页后重新加载列表
        handleSearch() {
            this.pagination.pageIndex = 1;
            this.loadList();
        },

        // 重置所有搜索条件：清空表单、已选标签、树勾选，并重新查询
        handleReset() {
            this.searchForm = {
                poolIds: [],
                securityCode: '',
                securityType: '',
                bondStatus: '',
                adjustTimeRange: null,
                adjusterName: '',
                issuer: '',
                adjustMode: '',
                auditStatus: '',
                myBonds: false,
                currentUserId: '1001',
            };
            this.selectedPoolTags = [];
            this.pagination.pageIndex = 1;
            if (this.$refs.poolTreeRef) {
                // 同步清空树的勾选状态
                this.$refs.poolTreeRef.setCheckedKeys([]);
            }
            this.loadList();
        },

        // 翻页：更新当前页码并重新加载
        handlePageChange(page) {
            this.pagination.pageIndex = page;
            this.loadList();
        },

        // 切换每页条数：重置到第一页并重新加载
        handleSizeChange(size) {
            this.pagination.pageSize = size;
            this.pagination.pageIndex = 1;
            this.loadList();
        },

        // 打开证券调库详情页
        openSecurityAdjustDetail(row) {
            const params = new URLSearchParams();
            if (row.securityCode || row.windCode) params.set('securityCode', row.securityCode || row.windCode);
            if (row.targetPoolId) params.set('targetPoolId', row.targetPoolId);
            if (row.adjustBatchNo) params.set('adjustBatchNo', row.adjustBatchNo);
            window.location.href = 'security_pool_adjust_detail.html?' + params.toString();
        },
    }
});
</script>
</body>
</html>
