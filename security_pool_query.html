<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>证券池查询</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui@2.15.14/lib/theme-chalk/index.css">
    <script src="https://unpkg.com/vue@2.5.16/dist/vue.min.js"></script>
    <script src="https://unpkg.com/element-ui@2.15.14/lib/index.js"></script>
    <script src="https://unpkg.com/axios@1.7.9/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
<link rel="stylesheet" href="css/security_pool_query.css">
</head>
<body class="security-pool-query-page">
<div id="security_pool_query">
    <!-- ── 顶栏 ── -->
    <div class="topbar">
        <div class="topbar-brand">
            <div class="topbar-icon">
                <svg width="18" height="18" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
            </div>
            <h2>证券池查询</h2>
        </div>
        <div class="topbar-sep"></div>
        <span class="topbar-sys">证券投资管理系统</span>
        <div class="topbar-meta">
            <span class="topbar-date-badge">{{ today }}</span>
        </div>
    </div>

    <!-- ── 列表页 ── -->
    <div class="list-body">
        <!-- 搜索面板 -->
        <div class="search-panel">
            <!-- 筛选条件：空间不足时自然换行 -->
            <div class="search-row">
                <span class="search-label"><i class="el-icon-search"></i>筛选</span>

                <el-popover
                    placement="bottom-start"
                    width="340"
                    v-model="poolTreeVisible"
                    :append-to-body="false"
                    @hide="handlePoolTreeHide">
                    <div class="pool-popover-content">
                        <el-input
                            v-model="poolTreeKeyword"
                            class="pool-tree-search"
                            size="small"
                            clearable
                            prefix-icon="el-icon-search"
                            placeholder="搜索投资池"
                            @input="filterPoolTree">
                        </el-input>
                        <div class="pool-tree-scroll">
                            <el-tree
                                ref="poolTreeRef"
                                :data="poolTreeData"
                                node-key="id"
                                :props="treeProps"
                                show-checkbox
                                check-strictly
                                default-expand-all
                                :filter-node-method="filterPoolNode">
                            </el-tree>
                        </div>
                    </div>
                    <div class="pool-popover-actions">
                        <el-button size="mini" @click="poolTreeVisible = false">取消</el-button>
                        <el-button type="primary" size="mini" @click="handlePoolTreeConfirm">确认</el-button>
                    </div>
                    <span slot="reference" class="pool-trigger" :class="{ 'has-selection': searchForm.poolIds.length > 0 }">
                        <i class="el-icon-folder-opened"></i>
                        {{ searchForm.poolIds.length > 0 ? '已选 ' + searchForm.poolIds.length + ' 个池' : '请选择投资池' }}
                    </span>
                </el-popover>

                <el-input v-model="searchForm.securityCode" placeholder="证券代码" clearable size="small" style="width:140px;" @keyup.enter.native="handleSearch">
                    <i slot="prefix" class="el-input__icon el-icon-document"></i>
                </el-input>

                <el-input v-model="searchForm.securityShortName" placeholder="证券简称" clearable size="small" style="width:140px;" @keyup.enter.native="handleSearch">
                    <i slot="prefix" class="el-input__icon el-icon-tickets"></i>
                </el-input>

                <el-select v-model="searchForm.securityType" placeholder="证券类型" clearable size="small" style="width:140px;">
                    <el-option v-for="t in securityTypeOptions" :key="t.securityType" :label="t.securityTypeName" :value="t.securityType"></el-option>
                </el-select>

                <el-select v-model="searchForm.securityStatus" placeholder="证券状态" clearable size="small" style="width:120px;">
                    <el-option v-for="s in securityStatusOptions" :key="s.value" :label="s.label" :value="s.value"></el-option>
                </el-select>

                <el-date-picker
                    v-model="searchForm.entryTimeRange"
                    type="daterange"
                    popper-class="project-date-range-picker"
                    range-separator="至"
                    start-placeholder="入池开始"
                    end-placeholder="入池结束"
                    size="small"
                    style="width:240px;"
                    value-format="yyyy-MM-dd">
                </el-date-picker>

                <el-input v-model="searchForm.adjusterName" placeholder="调整人" clearable size="small" style="width:140px;">
                    <i slot="prefix" class="el-input__icon el-icon-user"></i>
                </el-input>

                <el-input v-model="searchForm.issuer" placeholder="发行主体名称" clearable size="small" style="width:180px;">
                    <i slot="prefix" class="el-input__icon el-icon-office-building"></i>
                </el-input>

                <el-checkbox v-model="searchForm.mySecurities" @change="handleSearch">我的证券</el-checkbox>

                <el-button type="primary" size="small" icon="el-icon-search" @click="handleSearch">查询</el-button>
                <el-button size="small" icon="el-icon-refresh" @click="handleReset">重置</el-button>

                <div class="total-badge">
                    <i class="el-icon-data-line"></i> 共 {{ pagination.total }} 条记录
                </div>
            </div>

            <!-- 已选池标签行 -->
            <div class="search-row" v-if="selectedPoolTags.length > 0">
                <span class="search-label" style="visibility:hidden;"><i class="el-icon-search"></i>筛选</span>
                <div class="pool-tag-row">
                    <span class="pool-tag" v-for="p in selectedPoolTags" :key="p.id">
                        <span :title="p.poolName">{{ p.poolName }}</span>
                        <i class="el-icon-close" @click="removePoolTag(p.id)"></i>
                    </span>
                </div>
                <button type="button" class="compact-clear-btn" @click="clearPoolSelection">
                    <i class="el-icon-delete"></i> 清空
                </button>
            </div>
        </div>

        <!-- 表格卡片 -->
        <div class="table-card">
            <el-table ref="securityTableRef" :data="tableData" v-loading="loading" stripe border size="small" style="width:100%;">
                <el-table-column label="序号" width="50" align="center">
                    <template slot-scope="{ $index }">
                        {{ (pagination.pageIndex - 1) * pagination.pageSize + $index + 1 }}
                    </template>
                </el-table-column>
                <el-table-column prop="securityShortName" label="证券简称" min-width="140" show-overflow-tooltip>
                    <template slot-scope="{ row }">
                        <span class="desc-link" @click="openSecurityAdjustDetail(row)">{{ row.securityShortName || '' }}</span>
                    </template>
                </el-table-column>
                <el-table-column prop="securityCode" label="证券代码" min-width="130">
                    <template slot-scope="{ row }">
                        <span class="desc-link" @click="openSecurityAdjustDetail(row)">{{ row.securityCode || '' }}</span>
                    </template>
                </el-table-column>
                <el-table-column prop="adjusterName" label="调整人" min-width="100"></el-table-column>
                <el-table-column label="入池时间" min-width="150" align="center">
                    <template slot-scope="{ row }">
                        {{ row.entryTime ? moment(row.entryTime).format('YYYY-MM-DD HH:mm') : '' }}
                    </template>
                </el-table-column>
                <el-table-column prop="targetPoolName" label="投资池名称" min-width="160" show-overflow-tooltip></el-table-column>
                <el-table-column prop="securityTypeName" label="证券类型" min-width="110">
                    <template slot-scope="{ row }">
                        <el-tag v-if="row.securityTypeName" size="mini" type="info">{{ row.securityTypeName }}</el-tag>
                        <span v-else style="color:var(--c-text-3);"></span>
                    </template>
                </el-table-column>
                <el-table-column prop="couponRate" label="票面年利率(%)" min-width="120" align="right">
                    <template slot-scope="{ row }">{{ row.couponRate || '' }}</template>
                </el-table-column>
                <el-table-column prop="issuer" label="发行主体名称" min-width="180" show-overflow-tooltip>
                    <template slot-scope="{ row }">{{ row.issuer || '' }}</template>
                </el-table-column>
                <el-table-column prop="fullName" label="证券全称" min-width="240" show-overflow-tooltip>
                    <template slot-scope="{ row }">{{ row.fullName || '' }}</template>
                </el-table-column>
                <el-table-column prop="issueDate" label="发行日期" min-width="110" align="center">
                    <template slot-scope="{ row }">{{ row.issueDate || '' }}</template>
                </el-table-column>
                <el-table-column prop="carryDate" label="起息日" min-width="110" align="center">
                    <template slot-scope="{ row }">{{ row.carryDate || '' }}</template>
                </el-table-column>
                <el-table-column prop="maturityDate" label="到期日" min-width="110" align="center">
                    <template slot-scope="{ row }">{{ row.maturityDate || '' }}</template>
                </el-table-column>
                <el-table-column label="证券状态" min-width="100">
                    <template slot-scope="{ row }">
                        <el-tag v-if="row.securityStatus === 'active'" size="mini" type="success">存续</el-tag>
                        <el-tag v-else-if="row.securityStatus === 'matured'" size="mini" type="info">到期</el-tag>
                    </template>
                </el-table-column>
                <el-table-column prop="delistDate" label="退市日期" min-width="110" align="center">
                    <template slot-scope="{ row }">{{ row.delistDate || '' }}</template>
                </el-table-column>
                <el-table-column prop="repurchaseDate" label="行权日期（回售）" min-width="140" align="center">
                    <template slot-scope="{ row }">{{ row.repurchaseDate || '' }}</template>
                </el-table-column>
                <el-table-column label="操作" width="60" fixed="right" align="center">
                    <template slot-scope="{ row }">
                        <button type="button"
                                class="favorite-action"
                                :class="{ 'is-favorite': isFavorited(row) }"
                                :title="isFavorited(row) ? '点击取消收藏' : '点击添加收藏'"
                                @click="toggleFavorite(row)">
                            <i :class="isFavorited(row) ? 'el-icon-star-on' : 'el-icon-star-off'"></i>
                        </button>
                    </template>
                </el-table-column>
            </el-table>
            <div class="pagination-wrap">
                <el-pagination
                    :total="pagination.total"
                    :current-page="pagination.pageIndex"
                    :page-size="pagination.pageSize"
                    :page-sizes="[10, 20, 50, 100]"
                    layout="total, sizes, prev, pager, next, jumper"
                    small
                    @current-change="handlePageChange"
                    @size-change="handleSizeChange">
                </el-pagination>
            </div>
        </div>
    </div>
</div>

<script>
new Vue({
    el: '#security_pool_query',
    data() {
        return {
            moment: moment, // 日期处理工具
            today: moment().format('YYYY年MM月DD日'), // 顶栏当前日期展示文字
            // 搜索表单
            searchForm: {
                poolIds: [],           // 选中的池ID列表（多选）
                securityCode: '',      // 证券代码关键词
                securityShortName: '', // 证券简称关键词
                securityType: '',      // 证券类型（下拉选中值）
                securityStatus: 'active',  // 证券状态，默认存续
                entryTimeRange: null,  // 入池时间范围 [startDate, endDate]
                adjusterName: '',      // 调整人姓名关键词
                issuer: '',            // 发行主体名称关键词
                mySecurities: false,   // 是否只看我的证券
                currentUserId: '1001', // 当前用户ID（TODO: 对接实际登录用户）
            },
            // 证券类型下拉（动态加载，格式：[{securityType, securityTypeName}]）
            securityTypeOptions: [],
            // 证券状态下拉
            securityStatusOptions: [
                { value: 'active', label: '存续' },
                { value: 'matured', label: '到期' },
            ],
            // 投资池树相关
            poolTreeData: [],          // 树形结构数据（由扁平列表构建）
            poolTreeVisible: false,    // 投资池选择弹出层显隐状态
            poolTreeKeyword: '',       // 投资池树搜索词
            selectedPoolTags: [],      // 已选池标签列表 [{id, poolName}]，用于标签行展示
            treeProps: {              // 投资池树字段配置
                children: 'children',  // 子节点字段名
                label: 'poolName',     // 节点显示文字字段名
                disabled(data) {
                    // 仅叶子节点可选，父节点禁止勾选
                    return data.children && data.children.length > 0;
                }
            },
            // 表格与分页
            tableData: [],             // 当前页表格数据
            loading: false,            // 表格加载状态
            pagination: {             // 分页参数
                pageIndex: 1,          // 当前页码
                pageSize: 20,          // 每页条数
                total: 0,              // 总记录数
            },
        };
    },
    // 组件挂载后初始化：设置后端接口地址，依次加载投资池树、证券类型下拉和列表数据
    mounted() {
        axios.defaults.baseURL = 'http://localhost:18090';
        this.loadPoolTree();
        this.loadSecurityTypeOptions();
        this.loadList();
        this.handleWindowResize = () => {
            window.clearTimeout(this.resizeLayoutTimer);
            this.resizeLayoutTimer = window.setTimeout(() => {
                // 窗口尺寸变化后同步所有表格固定列布局
                this.refreshAllTableLayout();
            }, 120);
        };
        window.addEventListener('resize', this.handleWindowResize);
    },
    beforeDestroy() {
        window.removeEventListener('resize', this.handleWindowResize);
        window.clearTimeout(this.resizeLayoutTimer);
    },
    methods: {
        // API 请求封装
        async apiPost(path, body) {
            const resp = await axios.post(path, body || {});
            const json = resp.data;
            if (!json.success) {
                this.$message.error(json.message || '接口异常');
                throw new Error(json.message || '接口异常');
            }
            return json.data;
        },

        // 加载投资池树
        async loadPoolTree() {
            try {
                const data = await this.apiPost('/api/v1/common/queryPoolTreeList', {});
                this.poolTreeData = this.buildPoolTree(data || []);
            } catch (e) {}
        },

        // 加载证券类型下拉选项（返回 [{securityType, securityTypeName}] 列表）
        async loadSecurityTypeOptions() {
            try {
                this.securityTypeOptions = await this.apiPost('/api/v1/securityPoolQuery/querySecurityTypeList', {});
            } catch (e) {}
        },

        // 构建树结构（扁平列表 → 嵌套树），同时为每个节点挂载 fullPath 用于标签展示
        buildPoolTree(list) {
            if (!list || list.length === 0) return [];
            const map = {};
            const roots = [];
            list.forEach(function(item) {
                map[item.id] = Object.assign({}, item, { children: [] });
            });
            list.forEach(function(item) {
                const node = map[item.id];
                if (item.parentId != null && map[item.parentId]) {
                    const parent = map[item.parentId];
                    node.fullPath = node.poolFullName || parent.poolName + '/' + node.poolName;
                    parent.children.push(node);
                } else {
                    node.fullPath = node.poolFullName || node.poolName;
                    roots.push(node);
                }
            });
            return roots;
        },

        // 树节点搜索过滤
        filterPoolNode(value, data) {
            if (!value) return true;
            const searchableText = data.fullPath || data.poolName || '';
            return String(searchableText).toLowerCase().indexOf(value.toLowerCase()) !== -1;
        },

        // 按投资池名称过滤选择树
        filterPoolTree(value) {
            if (this.$refs.poolTreeRef) {
                this.$refs.poolTreeRef.filter(value.trim());
            }
        },

        // 关闭选择弹层后清空搜索条件
        handlePoolTreeHide() {
            this.poolTreeKeyword = '';
            if (this.$refs.poolTreeRef) {
                this.$refs.poolTreeRef.filter('');
            }
        },

        // 确认池树选择
        handlePoolTreeConfirm() {
            const checkedKeys = this.$refs.poolTreeRef.getCheckedKeys();
            const halfCheckedKeys = this.$refs.poolTreeRef.getHalfCheckedKeys();
            const allKeys = checkedKeys.concat(halfCheckedKeys);
            this.searchForm.poolIds = allKeys;
            // 构建标签展示数据
            const flatList = this.flattenTree(this.poolTreeData);
            this.selectedPoolTags = flatList.filter(function(n) {
                return allKeys.indexOf(n.id) !== -1;
            }).map(function(n) {
                return { id: n.id, poolName: n.fullPath };
            });
            this.poolTreeVisible = false;
            this.handleSearch();
        },

        // 移除已选池标签
        removePoolTag(poolId) {
            this.searchForm.poolIds = this.searchForm.poolIds.filter(function(id) {
                return id !== poolId;
            });
            this.selectedPoolTags = this.selectedPoolTags.filter(function(p) {
                return p.id !== poolId;
            });
            // 同步 tree 勾选状态
            this.$refs.poolTreeRef.setCheckedKeys(this.searchForm.poolIds);
            this.handleSearch();
        },

        // 清空全部已选投资池并同步取消树节点勾选
        clearPoolSelection() {
            this.searchForm.poolIds = [];
            this.selectedPoolTags = [];
            if (this.$refs.poolTreeRef) {
                this.$refs.poolTreeRef.setCheckedKeys([]);
            }
            this.handleSearch();
        },

        // 树扁平化
        flattenTree(nodes) {
            let result = [];
            (function walk(list) {
                list.forEach(function(n) {
                    result.push(n);
                    if (n.children && n.children.length > 0) {
                        walk(n.children);
                    }
                });
            })(nodes);
            return result;
        },

        // 加载列表
        async loadList() {
            this.loading = true;
            try {
                const params = {
                    poolIds: this.searchForm.poolIds.length > 0 ? this.searchForm.poolIds : null,
                    securityCode: this.searchForm.securityCode || null,
                    securityShortName: this.searchForm.securityShortName || null,
                    securityType: this.searchForm.securityType || null,
                    securityStatus: this.searchForm.securityStatus || null,
                    entryTimeStart: this.searchForm.entryTimeRange && this.searchForm.entryTimeRange[0]
                        ? this.searchForm.entryTimeRange[0] + ' 00:00:00' : null,
                    entryTimeEnd: this.searchForm.entryTimeRange && this.searchForm.entryTimeRange[1]
                        ? this.searchForm.entryTimeRange[1] + ' 23:59:59' : null,
                    adjusterName: this.searchForm.adjusterName || null,
                    issuer: this.searchForm.issuer || null,
                    mySecurities: this.searchForm.mySecurities || null,
                    currentUserId: this.searchForm.currentUserId,
                    pageIndex: this.pagination.pageIndex,
                    pageSize: this.pagination.pageSize,
                };
                const data = await this.apiPost('/api/v1/securityPoolQuery/querySecurityPoolPage', params);
                this.tableData = data.records || [];
                this.pagination.total = data.total || 0;
            } catch (e) {}
            this.loading = false;
            // 数据渲染后同步列表固定列布局
            this.refreshTableLayout('securityTableRef');
        },

        // 重新计算指定表格固定列布局
        refreshTableLayout(refName) {
            this.$nextTick(() => {
                window.requestAnimationFrame(() => {
                    const table = this.$refs[refName];
                    if (table) {
                        table.doLayout();
                        window.setTimeout(() => table.doLayout(), 80);
                        window.setTimeout(() => table.doLayout(), 180);
                    }
                });
            });
        },

        // 重新计算当前页面所有表格固定列布局
        refreshAllTableLayout() {
            this.$nextTick(() => {
                window.requestAnimationFrame(() => {
                    Object.keys(this.$refs).forEach(refName => {
                        const ref = this.$refs[refName];
                        const table = Array.isArray(ref) ? ref[0] : ref;
                        if (table && typeof table.doLayout === 'function') {
                            table.doLayout();
                            window.setTimeout(() => table.doLayout(), 80);
                            window.setTimeout(() => table.doLayout(), 180);
                        }
                    });
                });
            });
        },

        // 触发查询：重置到第一页后重新加载列表
        handleSearch() {
            this.pagination.pageIndex = 1;
            this.loadList();
        },

        // 重置所有搜索条件：清空表单、已选标签、树勾选，并重新查询
        handleReset() {
            this.searchForm = {
                poolIds: [],
                securityCode: '',
                securityShortName: '',
                securityType: '',
                securityStatus: 'active',
                entryTimeRange: null,
                adjusterName: '',
                issuer: '',
                mySecurities: false,
                currentUserId: '1001',
            };
            this.selectedPoolTags = [];
            this.pagination.pageIndex = 1;
            if (this.$refs.poolTreeRef) {
                // 同步清空树的勾选状态
                this.$refs.poolTreeRef.setCheckedKeys([]);
            }
            this.loadList();
        },

        // 翻页：更新当前页码并重新加载
        handlePageChange(page) {
            this.pagination.pageIndex = page;
            this.loadList();
        },

        // 切换每页条数：重置到第一页并重新加载
        handleSizeChange(size) {
            this.pagination.pageSize = size;
            this.pagination.pageIndex = 1;
            this.loadList();
        },

        // 判断是否已收藏（mySecurityPoolId 非 null 即为已收藏）
        isFavorited(row) {
            return row.mySecurityPoolId != null;
        },

        // 打开证券调库详情页
        openSecurityAdjustDetail(row) {
            const params = new URLSearchParams();
            if (row.securityCode || row.windCode) params.set('securityCode', row.securityCode || row.windCode);
            if (row.targetPoolId) params.set('targetPoolId', row.targetPoolId);
            if (row.adjustBatchNo) params.set('adjustBatchNo', row.adjustBatchNo);
            params.set('entryMode', 'view');
            window.location.href = 'security_pool_adjust_detail.html?' + params.toString();
        },

        // 切换收藏状态：已收藏则弹框确认后移除，未收藏则直接添加
        async toggleFavorite(row) {
            const userId = this.searchForm.currentUserId;
            if (this.isFavorited(row)) {
                // 取消收藏：弹出二次确认，防止误操作
                try {
                    await this.$confirm(
                        '该证券已在我的证券池列表中，确认移除？',
                        '提示',
                        { confirmButtonText: '确认移除', cancelButtonText: '取消', type: 'warning' }
                    );
                    await this.apiPost('/api/v1/securityPoolQuery/deleteSecurityFromMyPool', {
                        securityCode: row.securityCode,
                        userId: userId,
                    });
                    // 前端乐观更新：清空收藏 ID，使图标立即变为未收藏状态
                    row.mySecurityPoolId = null;
                    this.$message.success('已从我的证券池移除');
                } catch (e) {}
            } else {
                // 添加收藏：调用接口并前端乐观更新收藏 ID
                try {
                    await this.apiPost('/api/v1/securityPoolQuery/addSecurityToMyPool', {
                        securityCode: row.securityCode,
                        securityType: row.securityType || '证券',
                        market: '',
                        userId: userId,
                    });
                    // 前端乐观更新：设置非空值，使图标立即变为已收藏状态
                    row.mySecurityPoolId = 1;
                    this.$message.success('已添加到我的证券池');
                } catch (e) {}
            }
        },
    }
});
</script>
</body>
</html>
