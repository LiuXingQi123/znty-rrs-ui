<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禁投池查询</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui@2.15.14/lib/theme-chalk/index.css">
    <script src="https://unpkg.com/vue@2.5.16/dist/vue.min.js"></script>
    <script src="https://unpkg.com/element-ui@2.15.14/lib/index.js"></script>
    <script src="https://unpkg.com/axios@1.7.9/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <style>
*,
*::before,
*::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

#forbidden_pool_query {
    --c-bg: #F7F8FA;
    --c-surface: #FFFFFF;
    --c-surface-2: #F7F8FA;
    --c-border: #E5E5E5;
    --c-text: #3F485A;
    --c-title: #242933;
    --c-text-2: #707783;
    --c-text-3: #9199BD;
    --c-primary: #2743A4;
    --c-primary-h: #1F3683;
    --c-primary-l: #E9ECF6;
    --c-green: #06C687;
    --c-green-l: #E7F9F3;
    --c-amber: #A7865F;
    --c-amber-l: #FFF4CC;
    --c-red: #FF4542;
    --c-red-l: #FFEDEC;
    --r-xs: 2px;
    --r-sm: 4px;
    --r: 4px;
    --r-xl: 4px;
    --topbar-h: 52px;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif;
    background: var(--c-bg);
    color: var(--c-text);
    font-size: 13px;
    letter-spacing: 0;
}

#forbidden_pool_query .topbar {
    display: flex;
    align-items: center;
    padding: 0 24px;
    height: var(--topbar-h);
    background: var(--c-surface);
    border-bottom: 1px solid var(--c-border);
    flex-shrink: 0;
    gap: 12px;
}

#forbidden_pool_query .topbar-brand {
    display: flex;
    align-items: center;
    gap: 8px;
}

#forbidden_pool_query .topbar-icon {
    width: 28px;
    height: 28px;
    border-radius: var(--r);
    border: 1px solid var(--c-primary-l);
    background: var(--c-primary-l);
    color: var(--c-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

#forbidden_pool_query .topbar-icon svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
}

#forbidden_pool_query .topbar h2 {
    font-size: 20px;
    line-height: 28px;
    font-weight: 600;
    color: var(--c-title);
    letter-spacing: 0;
}

#forbidden_pool_query .topbar-sep {
    width: 1px;
    height: 18px;
    background: var(--c-border);
}

#forbidden_pool_query .topbar-sys {
    font-size: 12px;
    line-height: 20px;
    color: var(--c-text-3);
    font-weight: 400;
    letter-spacing: 0;
}

#forbidden_pool_query .topbar-meta {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--c-text-3);
}

#forbidden_pool_query .topbar-date-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    height: 24px;
    padding: 0 10px;
    border-radius: var(--r);
    background: var(--c-surface-2);
    border: 1px solid var(--c-border);
    font-size: 12px;
    color: var(--c-text-3);
    font-weight: 400;
}

#forbidden_pool_query .list-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
}

#forbidden_pool_query .desc-link {
    color: var(--c-primary);
    cursor: pointer;
    font-weight: 500;
}

#forbidden_pool_query .desc-link:hover {
    text-decoration: underline;
}

#forbidden_pool_query .search-panel {
    background: var(--c-surface);
    border: 1px solid var(--c-border);
    border-radius: var(--r-xl);
    padding: 16px 20px;
    margin-bottom: 12px;
}

#forbidden_pool_query .search-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px 12px;
}

#forbidden_pool_query .search-row + .search-row {
    margin-top: 12px;
}

#forbidden_pool_query .search-label {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    min-width: 54px;
    height: 32px;
    font-size: 13px;
    font-weight: 400;
    color: var(--c-text);
    letter-spacing: 0;
}

#forbidden_pool_query .search-label .el-icon-search {
    color: var(--c-text-3);
    font-size: 14px;
}

#forbidden_pool_query .total-badge {
    margin-left: auto;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    height: 24px;
    padding: 0 8px;
    border-radius: var(--r);
    background: var(--c-primary-l);
    color: var(--c-primary);
    font-size: 12px;
    line-height: 20px;
    font-weight: 400;
}

#forbidden_pool_query .pool-trigger {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    height: 32px;
    padding: 0 12px;
    border-radius: var(--r);
    border: 1px solid var(--c-border);
    background: var(--c-surface);
    color: var(--c-text-2);
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    transition: all .18s ease;
    outline: none;
    font-family: inherit;
    white-space: nowrap;
}

#forbidden_pool_query .pool-trigger:hover {
    border-color: var(--c-primary);
    color: var(--c-primary);
    background: var(--c-primary-l);
}

#forbidden_pool_query .pool-trigger.has-selection {
    border-color: var(--c-primary);
    color: var(--c-primary);
    background: var(--c-primary-l);
}

#forbidden_pool_query .pool-tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    max-width: calc(100vw - 400px);
}

#forbidden_pool_query .pool-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    min-height: 24px;
    padding: 1px 8px;
    border-radius: var(--r);
    background: var(--c-primary-l);
    border: 1px solid var(--c-primary-l);
    color: var(--c-primary);
    font-size: 12px;
    font-weight: 400;
    white-space: nowrap;
}

#forbidden_pool_query .pool-tag .el-icon-close {
    cursor: pointer;
    font-size: 11px;
    color: var(--c-primary);
    transition: color .15s;
}

#forbidden_pool_query .pool-tag .el-icon-close:hover {
    color: var(--c-red);
}

#forbidden_pool_query .table-card {
    background: var(--c-surface);
    border: 1px solid var(--c-border);
    border-radius: var(--r-xl);
    overflow: hidden;
}

#forbidden_pool_query .pagination-wrap {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    min-height: 48px;
    padding: 8px 20px;
    border-top: 1px solid var(--c-border);
    background: var(--c-surface);
}

#forbidden_pool_query .pool-popover-content {
    width: 320px;
    max-height: 400px;
    overflow-y: auto;
}

#forbidden_pool_query .audit-tag {
    display: inline-flex;
    align-items: center;
    height: 24px;
    padding: 0 8px;
    border-radius: var(--r-xs);
    font-size: 12px;
    font-weight: 400;
    line-height: 22px;
}

#forbidden_pool_query .audit-tag-pending {
    background: var(--c-amber-l);
    color: var(--c-amber);
    border: 1px solid var(--c-amber-l);
}

#forbidden_pool_query .audit-tag-active {
    background: var(--c-green-l);
    color: var(--c-green);
    border: 1px solid var(--c-green-l);
}

#forbidden_pool_query .audit-tag-rejected {
    background: var(--c-red-l);
    color: var(--c-red);
    border: 1px solid var(--c-red-l);
}

#forbidden_pool_query .audit-tag-review {
    background: var(--c-primary-l);
    color: var(--c-primary);
    border: 1px solid var(--c-primary-l);
}

#forbidden_pool_query .el-table {
    color: var(--c-text);
    font-size: 13px;
}

#forbidden_pool_query .el-table th.el-table__cell {
    background: var(--c-bg);
    color: var(--c-title);
    font-weight: 600;
    font-size: 13px;
    line-height: 22px;
    letter-spacing: 0;
    border-bottom: 1px solid var(--c-border);
    padding: 8px 0;
}

#forbidden_pool_query .el-table td.el-table__cell {
    color: var(--c-text);
    font-size: 13px;
    line-height: 22px;
    border-bottom-color: var(--c-border);
    padding: 8px 0;
}

#forbidden_pool_query .el-table--border,
#forbidden_pool_query .el-table--group {
    border-color: var(--c-border);
}

#forbidden_pool_query .el-table--border th.el-table__cell,
#forbidden_pool_query .el-table--border td.el-table__cell {
    border-right-color: var(--c-border);
}

#forbidden_pool_query .el-table--striped .el-table__body tr.el-table__row--striped td.el-table__cell {
    background: #FAFAFA;
}

#forbidden_pool_query .el-table__body tr:hover > td {
    background: var(--c-bg) !important;
}

#forbidden_pool_query .el-input--small .el-input__inner,
#forbidden_pool_query .el-select .el-input__inner {
    height: 32px;
    line-height: 32px;
    border-radius: var(--r-sm);
    border-color: var(--c-border);
    color: var(--c-text);
    font-size: 13px;
    transition: border-color .18s, box-shadow .18s;
}

#forbidden_pool_query .el-input--small .el-input__inner::placeholder {
    color: var(--c-text-3);
}

#forbidden_pool_query .el-input--small .el-input__inner:hover,
#forbidden_pool_query .el-select .el-input__inner:hover {
    border-color: #CCCCCC;
}

#forbidden_pool_query .el-input--small .el-input__inner:focus,
#forbidden_pool_query .el-select .el-input.is-focus .el-input__inner {
    border-color: var(--c-primary);
}

#forbidden_pool_query .el-date-editor.el-range-editor .el-range-separator {
    min-width: 24px;
    width: 24px;
    padding: 0;
    text-align: center;
}

#forbidden_pool_query .el-button {
    height: 32px;
    padding: 0 12px;
    font-size: 13px;
    font-weight: 500;
    border-radius: var(--r);
}

#forbidden_pool_query .el-button--small {
    height: 32px;
}

#forbidden_pool_query .el-button--mini {
    height: 28px;
    padding: 0 10px;
    font-size: 12px;
}

#forbidden_pool_query .el-button [class*="el-icon-"] {
    font-size: 16px;
}

#forbidden_pool_query .el-button [class*="el-icon-"] + span {
    margin-left: 4px;
}

#forbidden_pool_query .el-button--primary {
    background: var(--c-primary);
    border-color: var(--c-primary);
    font-weight: 500;
    letter-spacing: 0;
    transition: all .18s;
    box-shadow: none;
}

#forbidden_pool_query .el-button--primary:hover,
#forbidden_pool_query .el-button--primary:focus {
    background: var(--c-primary-h);
    border-color: var(--c-primary-h);
}

#forbidden_pool_query .el-button--default {
    color: var(--c-text);
    border-color: var(--c-border);
    font-weight: 500;
    background: var(--c-surface);
    transition: all .18s;
}

#forbidden_pool_query .el-button--default:hover,
#forbidden_pool_query .el-button--default:focus {
    color: var(--c-primary);
    border-color: var(--c-primary);
    background: var(--c-surface);
}

#forbidden_pool_query .el-button.is-disabled,
#forbidden_pool_query .el-button.is-disabled:hover {
    color: #CCCCCC;
    border-color: var(--c-border);
    background: var(--c-bg);
}

#forbidden_pool_query .el-tag--mini {
    height: 24px;
    line-height: 22px;
    border-radius: var(--r);
    font-weight: 400;
    font-size: 12px;
    letter-spacing: 0;
}

#forbidden_pool_query .el-tag--success {
    background: var(--c-green-l);
    border-color: var(--c-green-l);
    color: var(--c-green);
}

#forbidden_pool_query .el-tag--warning {
    background: var(--c-amber-l);
    border-color: var(--c-amber-l);
    color: var(--c-amber);
}

#forbidden_pool_query .el-tag--danger {
    background: var(--c-red-l);
    border-color: var(--c-red-l);
    color: var(--c-red);
}

#forbidden_pool_query .el-tag--info {
    background: #F6F6F6;
    border-color: #F6F6F6;
    color: var(--c-text-3);
}

#forbidden_pool_query .el-pagination .btn-next,
#forbidden_pool_query .el-pagination .btn-prev,
#forbidden_pool_query .el-pagination .el-pager li {
    min-width: 28px;
    height: 28px;
    margin: 0;
    border-radius: var(--r);
    color: var(--c-text);
    font-weight: 400;
    line-height: 28px;
}

#forbidden_pool_query .el-pager li.active {
    background: var(--c-primary);
    color: #FFFFFF;
    font-weight: 500;
    box-shadow: none;
}

#forbidden_pool_query .el-pagination {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    color: var(--c-text);
    font-size: 13px;
    font-weight: 400;
    line-height: 28px;
}

#forbidden_pool_query .el-pagination .el-pagination__total,
#forbidden_pool_query .el-pagination .el-pagination__sizes,
#forbidden_pool_query .el-pagination .el-pagination__jump,
#forbidden_pool_query .el-pagination .el-pager {
    display: inline-flex;
    align-items: center;
    height: 28px;
    margin: 0;
    line-height: 28px;
}

#forbidden_pool_query .el-pagination .el-select .el-input {
    width: 96px !important;
    margin: 0;
}

#forbidden_pool_query .el-pagination .el-input__inner {
    height: 28px;
    line-height: 28px;
}

#forbidden_pool_query .el-pagination__jump .el-input {
    display: inline-flex;
    align-items: center;
    height: 28px;
    width: 48px;
    margin: 0 6px;
    line-height: 28px;
    vertical-align: top;
}

#forbidden_pool_query .el-tree {
    font-family: inherit;
    background: transparent;
}

#forbidden_pool_query .el-tree-node__content {
    height: 32px;
    border-radius: var(--r-xs);
}

#forbidden_pool_query .el-tree-node__content:hover {
    background: var(--c-primary-l);
}

#forbidden_pool_query .el-checkbox__input.is-checked .el-checkbox__inner {
    background-color: var(--c-primary) !important;
    border-color: var(--c-primary) !important;
}

#forbidden_pool_query .el-checkbox__input.is-indeterminate .el-checkbox__inner {
    background-color: var(--c-primary) !important;
    border-color: var(--c-primary) !important;
}

.project-date-range-picker .el-date-table td.today span {
    color: #2743A4;
    font-weight: 600;
}

.project-date-range-picker .el-date-table td.available:hover {
    color: #2743A4;
}

.project-date-range-picker .el-date-table td.in-range div,
.project-date-range-picker .el-date-table td.in-range div:hover {
    background-color: #E9ECF6;
}

.project-date-range-picker .el-date-table td.start-date span,
.project-date-range-picker .el-date-table td.end-date span {
    background-color: #2743A4;
    color: #FFFFFF;
}

.project-date-range-picker .el-picker-panel__icon-btn:hover,
.project-date-range-picker .el-date-range-picker__header div:hover {
    color: #2743A4;
}
</style>
</head>
<body>
<div id="forbidden_pool_query">
    <!-- ── 顶栏 ── -->
    <div class="topbar">
        <div class="topbar-brand">
            <div class="topbar-icon">
                <svg width="18" height="18" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-4H7l5-8v4h4l-5 8z"/>
                </svg>
            </div>
            <h2>禁投池查询</h2>
        </div>
        <div class="topbar-sep"></div>
        <span class="topbar-sys">证券投资管理系统</span>
        <div class="topbar-meta">
            <span class="topbar-date-badge">{{ today }}</span>
        </div>
    </div>

    <!-- ── 列表页 ── -->
    <div class="list-body">
        <!-- 搜索面板：包含所有筛选条件输入项 -->
        <div class="search-panel">
            <!-- 筛选条件：空间不足时自然换行 -->
            <div class="search-row">
                <span class="search-label"><i class="el-icon-search"></i>筛选</span>

                <!-- 证券代码输入框：支持回车触发查询 -->
                <el-input v-model="searchForm.securityCode" placeholder="证券代码" clearable size="small" style="width:140px;" @keyup.enter.native="handleSearch">
                    <i slot="prefix" class="el-input__icon el-icon-document"></i>
                </el-input>

                <!-- 证券简称输入框：支持回车触发查询 -->
                <el-input v-model="searchForm.securityShortName" placeholder="证券简称" clearable size="small" style="width:140px;" @keyup.enter.native="handleSearch">
                    <i slot="prefix" class="el-input__icon el-icon-tickets"></i>
                </el-input>

                <!-- 证券类型下拉：选项从后端接口动态加载 -->
                <el-select v-model="searchForm.securityType" placeholder="证券类型" clearable size="small" style="width:140px;">
                    <el-option v-for="t in securityTypeOptions" :key="t.securityType" :label="t.securityTypeName" :value="t.securityType"></el-option>
                </el-select>

                <!-- 证券状态下拉：存续 / 到期（前端静态字典） -->
                <el-select v-model="searchForm.bondStatus" placeholder="证券状态" clearable size="small" style="width:110px;">
                    <el-option v-for="s in bondStatusOptions" :key="s.value" :label="s.label" :value="s.value"></el-option>
                </el-select>

                <!-- 调整日期范围选择器，值格式化为 yyyy-MM-dd -->
                <el-date-picker
                    v-model="searchForm.adjustTimeRange"
                    type="daterange"
                    popper-class="project-date-range-picker"
                    range-separator="至"
                    start-placeholder="调整日期起"
                    end-placeholder="调整日期止"
                    size="small"
                    style="width:240px;"
                    value-format="yyyy-MM-dd">
                </el-date-picker>

                <!-- 调整人输入框 -->
                <el-input v-model="searchForm.adjusterName" placeholder="调整人" clearable size="small" style="width:140px;">
                    <i slot="prefix" class="el-input__icon el-icon-user"></i>
                </el-input>

                <!-- 发行主体名称输入框 -->
                <el-input v-model="searchForm.issuer" placeholder="发行主体名称" clearable size="small" style="width:180px;">
                    <i slot="prefix" class="el-input__icon el-icon-office-building"></i>
                </el-input>

                <!-- 调整状态下拉：已提交待审核 / 审核通过待审批 / 驳回待修改 / 审批通过 / 审批驳回 / 发起人已撤回 -->
                <el-select v-model="searchForm.auditStatus" placeholder="调整状态" clearable size="small" style="width:130px;">
                    <el-option v-for="s in auditStatusOptions" :key="s.value" :label="s.label" :value="s.value"></el-option>
                </el-select>

                <el-button type="primary" size="small" icon="el-icon-search" @click="handleSearch">查询</el-button>
                <el-button size="small" icon="el-icon-refresh" @click="handleReset">重置</el-button>

                <!-- 总数徽章：展示当前查询命中的总记录条数 -->
                <div class="total-badge">
                    <i class="el-icon-data-line"></i> 共 {{ pagination.total }} 条记录
                </div>
            </div>

        </div>

        <!-- 表格卡片：展示禁投池证券列表数据，包含表格与分页 -->
        <div class="table-card">
            <!-- 禁投池证券数据表格：斑马纹 + 边框 + 加载蒙层 -->
            <el-table :data="tableData" v-loading="loading" stripe border size="small" style="width:100%;">
                <el-table-column label="序号" width="50" align="center">
                    <template slot-scope="{ $index }">
                        {{ (pagination.pageIndex - 1) * pagination.pageSize + $index + 1 }}
                    </template>
                </el-table-column>
                <!-- 证券简称：固定左侧，超长截断显示 tooltip -->
                <el-table-column prop="securityShortName" label="证券简称" min-width="140" show-overflow-tooltip>
                    <template slot-scope="{ row }">
                        <span class="desc-link" @click="openSecurityAdjustDetail(row)">{{ row.securityShortName || '' }}</span>
                    </template>
                </el-table-column>
                <el-table-column prop="securityCode" label="证券代码" min-width="130">
                    <template slot-scope="{ row }">
                        <span class="desc-link" @click="openSecurityAdjustDetail(row)">{{ row.securityCode || '' }}</span>
                    </template>
                </el-table-column>
                <!-- 发行主体：空值显示空字符串 -->
                <el-table-column prop="issuer" label="发行主体" min-width="180" show-overflow-tooltip>
                    <template slot-scope="{ row }">{{ row.issuer || '' }}</template>
                </el-table-column>
                <el-table-column prop="adjusterName" label="调整人" min-width="100"></el-table-column>
                <!-- 证券类型：有值则渲染 info 灰色标签，无值显示空 -->
                <el-table-column prop="securityTypeName" label="证券类型" min-width="110">
                    <template slot-scope="{ row }">
                        <el-tag v-if="row.securityTypeName" size="mini" type="info">{{ row.securityTypeName }}</el-tag>
                        <span v-else style="color:var(--c-text-3);"></span>
                    </template>
                </el-table-column>
                <el-table-column prop="targetPoolName" label="投资池名称" min-width="160" show-overflow-tooltip></el-table-column>
                <!-- 入池时间：通过 moment 格式化为 YYYY-MM-DD HH:mm -->
                <el-table-column label="入池时间" min-width="150" align="center">
                    <template slot-scope="{ row }">
                        {{ row.entryTime ? moment(row.entryTime).format('YYYY-MM-DD HH:mm') : '' }}
                    </template>
                </el-table-column>
                <!-- 证券状态：根据到期日实时计算，存续/到期渲染不同颜色标签 -->
                <el-table-column label="证券状态" min-width="100">
                    <template slot-scope="{ row }">
                        <el-tag v-if="getBondStatus(row) === '存续'" size="mini" type="success">存续</el-tag>
                        <el-tag v-else-if="getBondStatus(row) === '到期'" size="mini" type="info">到期</el-tag>
                    </template>
                </el-table-column>
                <!-- 退市日期：空值显示空字符串 -->
                <el-table-column prop="delistDate" label="退市日期" min-width="110" align="center">
                    <template slot-scope="{ row }">{{ row.delistDate || '' }}</template>
                </el-table-column>
                <!-- 行权日期（回售）：空值显示空字符串 -->
                <el-table-column prop="repurchaseDate" label="行权日期（回售）" min-width="140" align="center">
                    <template slot-scope="{ row }">{{ row.repurchaseDate || '' }}</template>
                </el-table-column>
            </el-table>
            <!-- 分页组件：支持切换页码和每页条数 -->
            <div class="pagination-wrap">
                <el-pagination
                    :total="pagination.total"
                    :current-page="pagination.pageIndex"
                    :page-size="pagination.pageSize"
                    :page-sizes="[10, 20, 50, 100]"
                    layout="total, sizes, prev, pager, next, jumper"
                    small
                    @current-change="handlePageChange"
                    @size-change="handleSizeChange">
                </el-pagination>
            </div>
        </div>
    </div>
</div>

<script>
new Vue({
    el: '#forbidden_pool_query',
    data() {
        return {
            moment: moment, // 日期处理工具
            today: moment().format('YYYY年MM月DD日'), // 顶栏显示的当前日期文字
            // 搜索表单
            searchForm: {
                securityCode: '',        // 证券代码关键词
                securityShortName: '',   // 证券简称关键词
                securityType: '',        // 证券类型代码（从下拉选项获取）
                bondStatus: '',          // 证券状态：存续 / 到期
                adjustTimeRange: null,   // 调整日期范围 [startDate, endDate]
                adjusterName: '',        // 调整人姓名关键词
                issuer: '',              // 发行主体名称关键词
                auditStatus: '',         // 调整状态代码（00/10/11/20/21/99）
            },
            // 下拉选项
            securityTypeOptions: [],     // 证券类型选项列表，从后端接口动态加载
            bondStatusOptions: [      // 债券状态筛选选项
                { value: '存续', label: '存续' }, // 债券仍在存续期
                { value: '到期', label: '到期' }, // 债券已到期
            ],
            auditStatusOptions: [     // 审核状态筛选选项
                { value: '-1', label: '无效调整' }, // 校验不通过，流程未正式发起
                { value: '00', label: '已提交待审核' }, // 已提交，等待审核
                { value: '10', label: '审核通过待审批' }, // 审核通过，等待审批
                { value: '11', label: '驳回待修改' }, // 审核驳回，待发起人修改
                { value: '20', label: '审批通过' }, // 审批通过并生效
                { value: '21', label: '审批驳回' }, // 审批驳回，流程终止
                { value: '99', label: '发起人已撤回' }, // 发起人主动撤回
            ],
            // 表格
            tableData: [],              // 当前页禁投池证券数据列表
            loading: false,             // 表格加载状态
            pagination: {             // 分页参数
                pageIndex: 1,           // 当前页码
                pageSize: 20,           // 每页显示条数
                total: 0,               // 查询结果总条数
            },
        };
    },
    // 页面挂载后：配置请求根地址，加载证券类型下拉选项与禁投池列表
    mounted() {
        axios.defaults.baseURL = 'http://localhost:18090';
        this.loadBondTypeOptions();
        this.loadList();
    },
    methods: {
        // 统一 POST 请求封装：校验 code 为 0，否则弹出错误提示并抛出异常
        async apiPost(path, body) {
            const resp = await axios.post(path, body || {});
            const json = resp.data;
            if (!json.success) {
                this.$message.error(json.message || '接口异常');
                throw new Error(json.message || '接口异常');
            }
            return json.data;
        },

        // 加载证券类型下拉选项（返回 [{securityType, securityTypeName}] 列表）
        async loadBondTypeOptions() {
            try {
                this.securityTypeOptions = await this.apiPost('/api/v1/forbiddenPoolQuery/querySecurityTypeList', {});
            } catch (e) {}
        },

        // 组装分页查询参数并调用接口，将结果填入 tableData 与 pagination.total
        async loadList() {
            this.loading = true;
            try {
                const params = {
                    securityCode: this.searchForm.securityCode || null,
                    securityShortName: this.searchForm.securityShortName || null,
                    securityType: this.searchForm.securityType || null,
                    bondStatus: this.searchForm.bondStatus || null,
                    // 调整日期范围起止，无选择时传 null
                    adjustTimeStart: this.searchForm.adjustTimeRange && this.searchForm.adjustTimeRange[0]
                        ? this.searchForm.adjustTimeRange[0] : null,
                    adjustTimeEnd: this.searchForm.adjustTimeRange && this.searchForm.adjustTimeRange[1]
                        ? this.searchForm.adjustTimeRange[1] : null,
                    adjusterName: this.searchForm.adjusterName || null,
                    issuer: this.searchForm.issuer || null,
                    auditStatus: this.searchForm.auditStatus || null,
                    pageIndex: this.pagination.pageIndex,
                    pageSize: this.pagination.pageSize,
                };
                const data = await this.apiPost('/api/v1/forbiddenPoolQuery/queryForbiddenPoolPage', params);
                this.tableData = data.records || [];
                this.pagination.total = data.total || 0;
            } catch (e) {}
            this.loading = false;
        },

        // 根据行数据的到期日（maturityDate）与今日比较，计算并返回"存续"或"到期"
        getBondStatus(row) {
            if (!row.maturityDate) return '';
            return moment(row.maturityDate).isBefore(moment(), 'day') ? '到期' : '存续';
        },

        // 点击查询按钮：重置页码为第 1 页并重新加载列表
        handleSearch() {
            this.pagination.pageIndex = 1;
            this.loadList();
        },

        // 点击重置按钮：清空所有搜索条件，重置页码，并重新加载列表
        handleReset() {
            this.searchForm = {
                securityCode: '',
                securityShortName: '',
                securityType: '',
                bondStatus: '',
                adjustTimeRange: null,
                adjusterName: '',
                issuer: '',
                auditStatus: '',
            };
            this.pagination.pageIndex = 1;
            this.loadList();
        },

        // 切换页码：更新当前页码并重新加载列表
        handlePageChange(page) {
            this.pagination.pageIndex = page;
            this.loadList();
        },
        // 修改每页条数：重置到第 1 页并重新加载列表
        handleSizeChange(size) {
            this.pagination.pageSize = size;
            this.pagination.pageIndex = 1;
            this.loadList();
        },

        // 打开证券调库详情页
        openSecurityAdjustDetail(row) {
            const params = new URLSearchParams();
            if (row.securityCode || row.windCode) params.set('securityCode', row.securityCode || row.windCode);
            if (row.targetPoolId) params.set('targetPoolId', row.targetPoolId);
            if (row.adjustBatchNo) params.set('adjustBatchNo', row.adjustBatchNo);
            params.set('entryMode', 'view');
            window.location.href = 'security_pool_adjust_detail.html?' + params.toString();
        },
    }
});
</script>
</body>
</html>
