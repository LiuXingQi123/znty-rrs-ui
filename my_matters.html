<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的事宜</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui@2.15.14/lib/theme-chalk/index.css">
    <script src="https://unpkg.com/vue@2.5.16/dist/vue.min.js"></script>
    <script src="https://unpkg.com/element-ui@2.15.14/lib/index.js"></script>
    <script src="https://unpkg.com/axios@1.7.9/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        #my_matters {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background: var(--c-bg);
            color: var(--c-text);
        }

        #my_matters .topbar {
            display: flex; align-items: center;
            background: var(--c-surface);
            border-bottom: 1px solid var(--c-border);
            flex-shrink: 0;
        }
        #my_matters .topbar-brand { display: flex; align-items: center; }
        #my_matters .topbar-icon {
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        #my_matters .topbar-sep { width: 1px; height: 18px; background: var(--c-border); }
        #my_matters .topbar-meta { margin-left: auto; display: flex; align-items: center; gap: 8px; }
        #my_matters .topbar-date-badge {
            display: inline-flex; align-items: center; gap: 5px;
            border: 1px solid var(--c-border);
        }

        #my_matters .list-body { flex: 1; overflow-y: auto; }
        #my_matters .search-row { display: flex; align-items: center; flex-wrap: wrap; }
        #my_matters .search-label {
            display: inline-flex; align-items: center; gap: 6px;
        }
        #my_matters .total-badge {
            margin-left: auto;
            display: inline-flex; align-items: center; gap: 6px;
            border: 1px solid rgba(39,67,164,.15);
        }

        #my_matters .table-card {
            overflow: hidden;
        }
        #my_matters .desc-cell { color: var(--c-text-2); line-height: 1.6; }
        #my_matters .handled-text { color: var(--c-text-3); font-size: 12px; }

        #my_matters .el-table th.el-table__cell {
            border-bottom: 1px solid var(--c-border);
        }
        #my_matters .el-input--small .el-input__inner {
            transition: border-color .18s, box-shadow .18s;
        }
        #my_matters .el-input--small .el-input__inner:hover { border-color: #B0BCE8; }
        #my_matters .el-date-editor.el-range-editor .el-range-separator { min-width: 24px; width: 24px; padding: 0; text-align: center; }
        #my_matters .el-tabs__header { margin: 0; padding: 0 20px; background: var(--c-surface); }
        #my_matters .el-tabs__nav-wrap::after { background: var(--c-border-l); }
        #my_matters .el-tabs__item { font-size: 13px; font-weight: 600; color: var(--c-text-3); }
        #my_matters .el-tabs__item.is-active { color: var(--c-primary); }
        #my_matters .el-tabs__active-bar { background: var(--c-primary); height: 2px; border-radius: 2px; }
        /* 项目UI规范覆盖层：金融后台、紧凑、高密度 */
        #my_matters {
            --c-bg:#F7F8FA; --c-surface:#FFFFFF; --c-surface-2:#F7F8FA; --c-border:#E5E5E5; --c-border-l:#E5E5E5;
            --c-text:#242933; --c-text-2:#3F485A; --c-text-3:#707783; --c-primary:#2743A4; --c-primary-h:#1F3683;
            --c-primary-l:#E9ECF6; --c-primary-s:rgba(39,67,164,.12); --c-primary-glow:rgba(39,67,164,.18);
            --r-xs:2px; --r-sm:4px; --r-xl:4px; --sh-xs:none; --sh-sm:none; --topbar-h:52px;
            font-family:"PingFang SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif; font-size:13px; letter-spacing:0;
        }
        #my_matters .topbar { height:52px; padding:0 24px; gap:12px; border-bottom-color:var(--c-border); box-shadow:none; }
        #my_matters .topbar-brand { gap:8px; }
        #my_matters .topbar-icon { width:28px; height:28px; border:1px solid var(--c-primary-l); border-radius:4px; background:var(--c-primary-l); color:var(--c-primary); box-shadow:none; }
        #my_matters .topbar-icon svg { width:16px; height:16px; fill:currentColor; }
        #my_matters .topbar h2 { color:#242933; font-size:20px; font-weight:600; line-height:28px; letter-spacing:0; }
        #my_matters .topbar-sys, #my_matters .topbar-meta { color:var(--c-text-3); font-size:12px; line-height:20px; letter-spacing:0; }
        #my_matters .topbar-date-badge { height:24px; padding:0 8px; border-radius:4px; background:var(--c-bg); color:var(--c-text-3); font-size:12px; font-weight:400; }
        #my_matters .list-body { padding:20px 24px; }
        #my_matters .search-panel, #my_matters .table-card { border:1px solid var(--c-border); border-radius:4px; background:var(--c-surface); box-shadow:none; }
        #my_matters .search-panel { padding:16px 20px; margin-bottom:12px; }
        #my_matters .search-row { gap:8px 12px; }
        #my_matters .search-label { height:32px; color:var(--c-text-2); font-size:13px; font-weight:400; text-transform:none; letter-spacing:0; margin-right:0; }
        #my_matters .total-badge { height:24px; padding:0 8px; border-radius:4px; border-color:var(--c-primary-l); background:var(--c-primary-l); color:var(--c-primary); font-size:12px; font-weight:400; }
        #my_matters .el-input--small .el-input__inner, #my_matters .el-select .el-input__inner, #my_matters .el-date-editor.el-range-editor { height:32px; border-color:var(--c-border); border-radius:4px; color:var(--c-text-2); font-size:13px; box-shadow:none; }
        #my_matters .el-input--small .el-input__inner:focus, #my_matters .el-select .el-input.is-focus .el-input__inner, #my_matters .el-date-editor.el-range-editor.is-active { border-color:var(--c-primary); box-shadow:none; }
        #my_matters .el-button { border-radius:4px; font-size:13px; font-weight:500; box-shadow:none; }
        #my_matters .el-button--small { height:32px; padding:0 12px; }
        #my_matters .el-button--mini { height:28px; padding:0 10px; font-size:12px; }
        #my_matters .el-button [class*="el-icon-"] { font-size:16px; }
        #my_matters .el-button [class*="el-icon-"] + span { margin-left:4px; }
        #my_matters .el-button--default { border-color:var(--c-border); background:var(--c-surface); color:var(--c-text-2); }
        #my_matters .el-button--primary, #my_matters .el-button--primary:hover, #my_matters .el-button--primary:focus { border-color:var(--c-primary); background:var(--c-primary); color:#fff; transform:none; box-shadow:none; letter-spacing:0; }
        #my_matters .el-button--primary:hover { border-color:var(--c-primary-h); background:var(--c-primary-h); }
        #my_matters .el-button--default:hover { border-color:var(--c-primary); background:var(--c-surface); color:var(--c-primary); box-shadow:none; }
        #my_matters .matter-action .el-icon-edit-outline,
        #my_matters .matter-view-action .el-icon-view { font-size:14px; }
        #my_matters .matter-view-action,
        #my_matters .matter-view-action:hover,
        #my_matters .matter-view-action:focus {
            border-color:var(--c-primary-l);
            background:var(--c-primary-l);
            color:var(--c-primary);
        }
        #my_matters .matter-view-action:hover,
        #my_matters .matter-view-action:focus {
            border-color:var(--c-primary);
            background:var(--c-primary);
            color:#FFFFFF;
        }
        #my_matters .matter-view-action { transition:border-color .15s, background-color .15s, color .15s; }
        #my_matters .el-button.is-disabled,
        #my_matters .el-button.is-disabled:hover { border-color:var(--c-border); background:var(--c-bg); color:#CCCCCC; }
        #my_matters .el-table { color:var(--c-text-2); font-size:13px; }
        #my_matters .el-table th.el-table__cell { padding:8px 0; background:var(--c-bg); color:#242933; font-size:13px; font-weight:600; line-height:22px; letter-spacing:0; border-color:var(--c-border); }
        #my_matters .el-table td.el-table__cell { padding:8px 0; color:var(--c-text-2); font-size:13px; line-height:22px; border-color:var(--c-border); }
        #my_matters .el-table--striped .el-table__body tr.el-table__row--striped td.el-table__cell { background:#FAFAFA; }
        #my_matters .el-table__body tr:hover > td { background:var(--c-bg)!important; }
        #my_matters .desc-link { color:var(--c-primary); cursor:pointer; font-weight:500; text-decoration:none; }
        #my_matters .desc-link:hover { color:var(--c-primary); text-decoration:underline; }
        #my_matters .el-tag--mini { height:22px; padding:0 8px; border-radius:2px; font-size:12px; font-weight:400; line-height:20px; letter-spacing:0; }
        #my_matters .pagination-wrap { display:flex; align-items:center; justify-content:flex-end; min-height:48px; padding:8px 20px; border-top:1px solid var(--c-border); background:var(--c-surface); }
        #my_matters .el-pagination { display:flex; align-items:center; justify-content:flex-end; gap:8px; font-size:13px; line-height:28px; }
        #my_matters .el-pagination__total, #my_matters .el-pagination__sizes, #my_matters .el-pagination__jump, #my_matters .el-pager { display:inline-flex; align-items:center; height:28px; margin:0; line-height:28px; }
        #my_matters .el-pagination button, #my_matters .el-pager li { min-width:28px; height:28px; padding:0 6px; border-radius:4px; line-height:28px; box-shadow:none; }
        #my_matters .el-pager li.active { background:var(--c-primary); color:#fff; box-shadow:none; }
        #my_matters .el-pagination .el-select .el-input { width:96px!important; margin:0; }
        #my_matters .el-pagination .el-select .el-input .el-input__inner, #my_matters .el-pagination__editor.el-input .el-input__inner { height:28px; line-height:28px; }
        #my_matters .el-pagination__editor.el-input { display:inline-flex; align-items:center; width:48px; height:28px; margin:0 6px; }
    </style>
</head>
<body>
<div id="my_matters">
    <div class="topbar">
        <div class="topbar-brand">
            <div class="topbar-icon">
                <svg width="18" height="18" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
            <h2>我的事宜</h2>
        </div>
        <div class="topbar-sep"></div>
        <span class="topbar-sys">证券投资管理系统</span>
        <div class="topbar-meta">
            <span class="topbar-date-badge">{{ today }}</span>
        </div>
    </div>

    <div class="list-body">
        <div class="search-panel">
            <div class="search-row">
                <span class="search-label"><i class="el-icon-search"></i>筛选</span>

                <el-select v-model="searchForm.flowIds" placeholder="流程名称" clearable multiple collapse-tags size="small" style="width:220px;">
                    <el-option v-for="f in flowOptions" :key="f.flowId" :label="f.flowName" :value="f.flowId"></el-option>
                </el-select>

                <el-date-picker
                    v-model="searchForm.startDateRange"
                    type="daterange"
                    range-separator="至"
                    start-placeholder="开始日期"
                    end-placeholder="结束日期"
                    size="small"
                    style="width:240px;"
                    value-format="yyyy-MM-dd">
                </el-date-picker>

                <el-input v-model="searchForm.processDescription" placeholder="流程描述" clearable size="small" style="width:220px;" @keyup.enter.native="handleSearch">
                    <i slot="prefix" class="el-input__icon el-icon-document"></i>
                </el-input>

                <el-input v-model="searchForm.initiatorName" placeholder="发起人" clearable size="small" style="width:140px;" @keyup.enter.native="handleSearch">
                    <i slot="prefix" class="el-input__icon el-icon-user"></i>
                </el-input>

                <el-select v-model="searchForm.auditStatus" placeholder="调整状态" clearable size="small" style="width:130px;">
                    <el-option v-for="a in auditStatusOptions" :key="a.value" :label="a.label" :value="a.value"></el-option>
                </el-select>

                <el-button type="primary" size="small" icon="el-icon-search" @click="handleSearch">查询</el-button>
                <el-button size="small" icon="el-icon-refresh" @click="handleReset">重置</el-button>

                <div class="total-badge">
                    <i class="el-icon-data-line"></i> 共 {{ pagination.total }} 条{{ activeTab === 'pending' ? '待处理' : '已完成' }}事宜
                </div>
            </div>
        </div>

        <div class="table-card">
            <el-tabs v-model="activeTab" @tab-click="handleTabClick">
                <el-tab-pane label="待处理" name="pending"></el-tab-pane>
                <el-tab-pane label="已完成" name="completed"></el-tab-pane>
            </el-tabs>
            <el-table :data="tableData" v-loading="loading" stripe border size="small" style="width:100%;" empty-text="暂无事宜">
                <el-table-column label="序号" width="50" align="center">
                    <template slot-scope="{ $index }">
                        {{ (pagination.pageIndex - 1) * pagination.pageSize + $index + 1 }}
                    </template>
                </el-table-column>
                <el-table-column prop="flowName" label="流程名称" min-width="160" show-overflow-tooltip></el-table-column>
                <el-table-column prop="stepName" label="步骤名称" min-width="140" show-overflow-tooltip></el-table-column>
                <el-table-column label="流程描述" min-width="300" show-overflow-tooltip>
                    <template slot-scope="{ row }">
                        <span class="desc-link" @click="openMatterPage(row)">{{ row.processDescription || '' }}</span>
                    </template>
                </el-table-column>
                <el-table-column label="步骤状态" min-width="110">
                    <template slot-scope="{ row }">
                        <el-tag :type="stepStatusType(row.stepStatus)" size="mini" v-if="row.stepStatus != null">
                            {{ stepStatusLabel(row.stepStatus) }}
                        </el-tag>
                        <span v-else style="color:var(--c-text-3);"></span>
                    </template>
                </el-table-column>
                <el-table-column label="调整状态" min-width="110">
                    <template slot-scope="{ row }">
                        <el-tag :type="auditStatusType(row.auditStatus)" size="mini" v-if="row.auditStatus != null">
                            {{ auditStatusLabel(row.auditStatus) }}
                        </el-tag>
                        <span v-else style="color:var(--c-text-3);"></span>
                    </template>
                </el-table-column>
                <el-table-column prop="initiatorName" label="发起人" min-width="110">
                    <template slot-scope="{ row }">{{ row.initiatorName || '' }}</template>
                </el-table-column>
                <el-table-column label="开始时间" min-width="150" align="center">
                    <template slot-scope="{ row }">
                        {{ row.startTime ? moment(row.startTime).format('YYYY-MM-DD HH:mm') : '' }}
                    </template>
                </el-table-column>
                <el-table-column label="操作" width="100" fixed="right" align="center">
                    <template slot-scope="{ row }">
                        <el-button v-if="activeTab === 'pending'" class="matter-action" type="primary" size="mini" icon="el-icon-edit-outline" @click="openMatterPage(row)">处理</el-button>
                        <el-button v-else class="matter-view-action" size="mini" icon="el-icon-view" @click="openMatterPage(row)">查看</el-button>
                    </template>
                </el-table-column>
            </el-table>
            <div class="pagination-wrap">
                <el-pagination
                    :total="pagination.total"
                    :current-page="pagination.pageIndex"
                    :page-size="pagination.pageSize"
                    :page-sizes="[10, 20, 50, 100]"
                    layout="total, sizes, prev, pager, next, jumper"
                    small
                    @current-change="handlePageChange"
                    @size-change="handleSizeChange">
                </el-pagination>
            </div>
        </div>
    </div>
</div>

<script>
new Vue({
    el: '#my_matters',
    data() {
        return {
            today: moment().format('YYYY年MM月DD日'), // 顶栏当前日期展示文字
            searchForm: {             // 查询条件
                flowIds: [],              // 流程 ID 多选
                startDateRange: null,     // 开始日期范围
                processDescription: '',   // 流程描述关键词
                auditStatus: '',          // 调整状态
                initiatorName: '',        // 发起人姓名关键词
                currentUserId: '1001',    // 当前用户ID（TODO: 对接实际登录用户）
            },
            auditStatusOptions: [     // 审核状态筛选选项
                { value: '-1', label: '无效调整' },
                { value: '00', label: '已提交待审核' },
                { value: '10', label: '审核通过待审批' },
                { value: '11', label: '驳回待修改' },
                { value: '20', label: '审批通过' },
                { value: '21', label: '审批驳回' },
                { value: '32', label: 'O32自动审批' },
                { value: '99', label: '发起人已撤回' },
            ],
            flowOptions: [],              // 流程名称下拉选项
            activeTab: 'pending',         // 当前事宜页签：pending=待处理 / completed=已完成
            tableData: [],                // 当前页事宜数据
            loading: false,               // 表格加载状态
            pagination: {             // 分页参数
                pageIndex: 1,             // 当前页码
                pageSize: 20,             // 每页条数
                total: 0,                 // 总记录数
            },
        };
    },
    mounted() {
        axios.defaults.baseURL = 'http://localhost:18090';
        this.loadFlowOptions();
        this.loadList();
    },
    methods: {
        // API 请求封装
        async apiPost(path, body) {
            const resp = await axios.post(path, body || {});
            const json = resp.data;
            if (json.code !== 0) {
                this.$message.error(json.message || '接口异常');
                throw new Error(json.message || '接口异常');
            }
            return json.data;
        },

        // 审核状态码转中文
        auditStatusLabel(code) {
            const map = {
                '-1': '无效调整',
                '00': '已提交待审核',
                '10': '审核通过待审批',
                '11': '驳回待修改',
                '20': '审批通过',
                '21': '审批驳回',
                '32': 'O32自动审批',
                '99': '发起人已撤回',
            };
            return map[String(code)] || code || '';
        },

        // 审核状态对应标签颜色
        auditStatusType(code) {
            const map = {
                '-1': 'danger',
                '00': 'warning',
                '10': 'success',
                '11': 'warning',
                '20': 'success',
                '21': 'danger',
                '32': 'success',
                '99': 'info',
            };
            return map[String(code)] || 'info';
        },

        // 步骤状态码转中文
        stepStatusLabel(code) {
            const map = {
                pending: '待处理',
                approve: '通过',
                reject: '驳回',
                submit: '提交',
                auto_process: '自动处理',
                canceled: '已撤回',
            };
            return map[String(code)] || code || '';
        },

        // 步骤状态对应标签颜色
        stepStatusType(code) {
            const map = {
                pending: 'warning',
                approve: 'success',
                reject: 'danger',
                submit: 'primary',
                auto_process: 'info',
                canceled: 'info',
            };
            return map[String(code)] || 'info';
        },

        // 加载流程名称下拉选项
        async loadFlowOptions() {
            try {
                this.flowOptions = await this.apiPost('/api/v1/myMatters/queryFlowOptionList', {
                    currentUserId: this.searchForm.currentUserId,
                });
            } catch (e) {}
        },

        // 加载我的事宜列表
        async loadList() {
            this.loading = true;
            try {
                const params = {
                    flowIds: this.searchForm.flowIds.length > 0 ? this.searchForm.flowIds : null,
                    startDateStart: this.searchForm.startDateRange ? this.searchForm.startDateRange[0] : null,
                    startDateEnd: this.searchForm.startDateRange ? this.searchForm.startDateRange[1] : null,
                    processDescription: this.searchForm.processDescription || null,
                    auditStatus: this.searchForm.auditStatus || null,
                    stepStatus: this.activeTab,
                    initiatorName: this.searchForm.initiatorName || null,
                    currentUserId: this.searchForm.currentUserId,
                    pageIndex: this.pagination.pageIndex,
                    pageSize: this.pagination.pageSize,
                };
                const data = await this.apiPost('/api/v1/myMatters/queryMyMattersPage', params);
                this.tableData = data.records || [];
                this.pagination.total = data.total || 0;
            } catch (e) {}
            this.loading = false;
        },

        // 触发查询
        handleSearch() {
            this.pagination.pageIndex = 1;
            this.loadList();
        },

        // 切换事宜页签
        handleTabClick() {
            this.pagination.pageIndex = 1;
            this.loadList();
        },

        // 重置查询条件
        handleReset() {
            this.searchForm = {
                flowIds: [],
                startDateRange: null,
                processDescription: '',
                auditStatus: '',
                initiatorName: '',
                currentUserId: '1001',
            };
            this.pagination.pageIndex = 1;
            this.loadFlowOptions();
            this.loadList();
        },

        // 翻页
        handlePageChange(page) {
            this.pagination.pageIndex = page;
            this.loadList();
        },

        // 切换每页条数
        handleSizeChange(size) {
            this.pagination.pageSize = size;
            this.pagination.pageIndex = 1;
            this.loadList();
        },

        // 打开对应调库页面
        openMatterPage(row) {
            const params = new URLSearchParams();
            if (row.securityCode) params.set('securityCode', row.securityCode);
            if (row.targetPoolId) params.set('targetPoolId', row.targetPoolId);
            if (row.adjustLogId) params.set('adjustLogId', row.adjustLogId);
            if (row.adjustBatchNo) params.set('adjustBatchNo', row.adjustBatchNo);
            params.set('entryMode', this.activeTab === 'pending' ? 'process' : 'view');
            const page = this.activeTab === 'pending' ? 'security_pool_adjust_approve.html' : 'security_pool_adjust_detail.html';
            window.location.href = page + '?' + params.toString();
        },
    }
});
</script>
</body>
