<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的事宜</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/element-ui@2.15.14/lib/theme-chalk/index.css">
    <script src="https://unpkg.com/vue@2.5.16/dist/vue.min.js"></script>
    <script src="https://unpkg.com/element-ui@2.15.14/lib/index.js"></script>
    <script src="https://unpkg.com/axios@1.7.9/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        #my_matters {
            --c-bg: #F2F4F8;
            --c-surface: #FFFFFF;
            --c-surface-2: #F8FAFD;
            --c-border: #E2E8F4;
            --c-border-l: #ECF0F9;
            --c-text: #0D1829;
            --c-text-2: #3A4769;
            --c-text-3: #8895B8;
            --c-primary: #1746D4;
            --c-primary-h: #0F35B0;
            --c-primary-l: #EEF2FD;
            --c-primary-s: rgba(23,70,212,.12);
            --c-primary-glow: rgba(23,70,212,.18);
            --r-xs: 4px;
            --r-sm: 7px;
            --r-xl: 18px;
            --sh-xs: 0 1px 3px rgba(13,24,54,.05);
            --sh-sm: 0 2px 8px rgba(13,24,54,.08), 0 0 0 1px rgba(13,24,54,.04);
            --topbar-h: 60px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--c-bg);
            color: var(--c-text);
            font-size: 14px;
        }

        #my_matters .topbar {
            display: flex; align-items: center;
            padding: 0 28px; height: var(--topbar-h);
            background: var(--c-surface);
            border-bottom: 1px solid var(--c-border);
            flex-shrink: 0; gap: 14px;
            box-shadow: 0 1px 0 var(--c-border), 0 2px 8px rgba(13,24,54,.04);
        }
        #my_matters .topbar-brand { display: flex; align-items: center; gap: 12px; }
        #my_matters .topbar-icon {
            width: 34px; height: 34px; border-radius: 9px;
            background: linear-gradient(135deg, var(--c-primary) 0%, #3B6AEA 100%);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            box-shadow: 0 2px 8px var(--c-primary-glow);
        }
        #my_matters .topbar-icon svg { fill: #fff; }
        #my_matters .topbar h2 { font-size: 15px; font-weight: 700; color: var(--c-text); letter-spacing: 0.02em; }
        #my_matters .topbar-sep { width: 1px; height: 18px; background: var(--c-border); }
        #my_matters .topbar-sys { font-size: 12px; color: var(--c-text-3); font-weight: 400; letter-spacing: 0.03em; }
        #my_matters .topbar-meta { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--c-text-3); }
        #my_matters .topbar-date-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 10px; border-radius: 20px;
            background: var(--c-surface-2); border: 1px solid var(--c-border);
            font-size: 11px; color: var(--c-text-3); font-weight: 500;
        }

        #my_matters .list-body { flex: 1; overflow-y: auto; padding: 22px 28px; }
        #my_matters .search-panel {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--r-xl);
            padding: 16px 20px;
            margin-bottom: 16px;
            box-shadow: var(--sh-xs);
        }
        #my_matters .search-row { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; }
        #my_matters .search-label {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 12px; font-weight: 600; color: var(--c-text-3);
            text-transform: uppercase; letter-spacing: 0.06em; margin-right: 4px;
        }
        #my_matters .total-badge {
            margin-left: auto;
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 14px; border-radius: 20px;
            background: var(--c-primary-l);
            border: 1px solid rgba(23,70,212,.15);
            color: var(--c-primary);
            font-size: 12px; font-weight: 600;
        }

        #my_matters .table-card {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--r-xl);
            overflow: hidden;
            box-shadow: var(--sh-sm);
        }
        #my_matters .pagination-wrap {
            display: flex; justify-content: flex-end;
            padding: 12px 20px;
            border-top: 1px solid var(--c-border-l);
            background: var(--c-surface-2);
        }
        #my_matters .desc-cell { color: var(--c-text-2); line-height: 1.6; }
        #my_matters .desc-link {
            color: var(--c-primary);
            line-height: 1.6;
            font-weight: 600;
            cursor: pointer;
        }
        #my_matters .desc-link:hover { text-decoration: underline; }
        #my_matters .handled-text { color: var(--c-text-3); font-size: 12px; }

        #my_matters .el-table th.el-table__cell {
            background: #F4F7FE;
            color: var(--c-text-2); font-weight: 700;
            font-size: 11.5px; letter-spacing: 0.05em;
            border-bottom: 1px solid var(--c-border);
            padding: 11px 0;
        }
        #my_matters .el-table td.el-table__cell { color: var(--c-text); border-bottom-color: var(--c-border-l); padding: 10px 0; }
        #my_matters .el-table--striped .el-table__body tr.el-table__row--striped td.el-table__cell { background: #FAFBFF; }
        #my_matters .el-table__body tr:hover > td { background: var(--c-primary-l) !important; }
        #my_matters .el-input--small .el-input__inner {
            border-radius: var(--r-sm); border-color: var(--c-border);
            color: var(--c-text); font-size: 13px;
            transition: border-color .18s, box-shadow .18s;
        }
        #my_matters .el-input--small .el-input__inner:hover { border-color: #B0BCE8; }
        #my_matters .el-input--small .el-input__inner:focus { border-color: var(--c-primary); box-shadow: 0 0 0 3px var(--c-primary-s); }
        #my_matters .el-select .el-input__inner { border-radius: var(--r-sm); border-color: var(--c-border); }
        #my_matters .el-date-editor.el-range-editor .el-range-separator { min-width: 24px; width: 24px; padding: 0; text-align: center; }
        #my_matters .el-button--primary {
            background: linear-gradient(135deg, var(--c-primary) 0%, #2D5CE8 100%);
            border-color: var(--c-primary);
            border-radius: var(--r-sm); font-weight: 600; letter-spacing: 0.03em;
            transition: all .18s; box-shadow: 0 2px 6px var(--c-primary-s);
        }
        #my_matters .el-button--primary:hover {
            background: linear-gradient(135deg, var(--c-primary-h) 0%, var(--c-primary) 100%);
            border-color: var(--c-primary-h);
            box-shadow: 0 4px 12px var(--c-primary-glow);
            transform: translateY(-1px);
        }
        #my_matters .el-button--primary:active { transform: scale(.97) translateY(0); }
        #my_matters .el-button--default {
            border-radius: var(--r-sm); color: var(--c-text-2);
            border-color: var(--c-border); font-weight: 500;
            background: var(--c-surface); transition: all .18s;
        }
        #my_matters .el-button--default:hover {
            color: var(--c-primary); border-color: rgba(23,70,212,.2); background: var(--c-primary-l);
            box-shadow: 0 2px 8px var(--c-primary-s);
        }
        #my_matters .el-tag--mini { border-radius: 20px; font-weight: 600; font-size: 11px; letter-spacing: 0.03em; }
        #my_matters .el-pager li.active {
            background: var(--c-primary); color: #fff;
            border-radius: var(--r-sm);
            box-shadow: 0 2px 6px var(--c-primary-s);
        }
        #my_matters .el-pagination .btn-next,
        #my_matters .el-pagination .btn-prev,
        #my_matters .el-pagination .el-pager li { border-radius: var(--r-sm); font-weight: 500; }
        #my_matters .el-pagination { font-weight: 500; }
        #my_matters .el-pagination.is-small .el-select .el-input { width: 100px !important; }
        #my_matters .el-tabs__header { margin: 0; padding: 0 20px; background: var(--c-surface); }
        #my_matters .el-tabs__nav-wrap::after { background: var(--c-border-l); }
        #my_matters .el-tabs__item { font-size: 13px; font-weight: 600; color: var(--c-text-3); }
        #my_matters .el-tabs__item.is-active { color: var(--c-primary); }
        #my_matters .el-tabs__active-bar { background: var(--c-primary); height: 2px; border-radius: 2px; }
    </style>
</head>
<body>
<div id="my_matters">
    <div class="topbar">
        <div class="topbar-brand">
            <div class="topbar-icon">
                <svg width="18" height="18" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
            <h2>我的事宜</h2>
        </div>
        <div class="topbar-sep"></div>
        <span class="topbar-sys">证券投资管理系统</span>
        <div class="topbar-meta">
            <span class="topbar-date-badge">{{ today }}</span>
        </div>
    </div>

    <div class="list-body">
        <div class="search-panel">
            <div class="search-row">
                <span class="search-label"><i class="el-icon-search"></i>筛选</span>

                <el-select v-model="searchForm.flowIds" placeholder="流程名称" clearable multiple collapse-tags size="small" style="width:220px;">
                    <el-option v-for="f in flowOptions" :key="f.flowId" :label="f.flowName" :value="f.flowId"></el-option>
                </el-select>

                <el-date-picker
                    v-model="searchForm.startDateRange"
                    type="daterange"
                    range-separator="至"
                    start-placeholder="开始日期"
                    end-placeholder="结束日期"
                    size="small"
                    style="width:240px;"
                    value-format="yyyy-MM-dd">
                </el-date-picker>

                <el-input v-model="searchForm.processDescription" placeholder="流程描述" clearable size="small" style="width:220px;" @keyup.enter.native="handleSearch">
                    <i slot="prefix" class="el-input__icon el-icon-document"></i>
                </el-input>

                <el-input v-model="searchForm.initiatorName" placeholder="发起人" clearable size="small" style="width:140px;" @keyup.enter.native="handleSearch">
                    <i slot="prefix" class="el-input__icon el-icon-user"></i>
                </el-input>

                <el-select v-model="searchForm.auditStatus" placeholder="调整状态" clearable size="small" style="width:130px;">
                    <el-option v-for="a in auditStatusOptions" :key="a.value" :label="a.label" :value="a.value"></el-option>
                </el-select>

                <el-button type="primary" size="small" icon="el-icon-search" @click="handleSearch">查询</el-button>
                <el-button size="small" icon="el-icon-refresh" @click="handleReset">重置</el-button>

                <div class="total-badge">
                    <i class="el-icon-data-line"></i> 共 {{ pagination.total }} 条{{ activeTab === 'pending' ? '待处理' : '已完成' }}事宜
                </div>
            </div>
        </div>

        <div class="table-card">
            <el-tabs v-model="activeTab" @tab-click="handleTabClick">
                <el-tab-pane label="待处理" name="pending"></el-tab-pane>
                <el-tab-pane label="已完成" name="completed"></el-tab-pane>
            </el-tabs>
            <el-table :data="tableData" v-loading="loading" stripe border size="small" style="width:100%;" empty-text="暂无事宜">
                <el-table-column prop="flowName" label="流程名称" min-width="160" show-overflow-tooltip fixed="left"></el-table-column>
                <el-table-column prop="stepName" label="步骤名称" min-width="140" show-overflow-tooltip></el-table-column>
                <el-table-column label="流程描述" min-width="300" show-overflow-tooltip>
                    <template slot-scope="{ row }">
                        <span class="desc-link" @click="openMatterPage(row)">{{ row.processDescription || '' }}</span>
                    </template>
                </el-table-column>
                <el-table-column label="步骤状态" min-width="110">
                    <template slot-scope="{ row }">
                        <el-tag :type="stepStatusType(row.stepStatus)" size="mini" v-if="row.stepStatus != null">
                            {{ stepStatusLabel(row.stepStatus) }}
                        </el-tag>
                        <span v-else style="color:var(--c-text-3);"></span>
                    </template>
                </el-table-column>
                <el-table-column label="调整状态" min-width="110">
                    <template slot-scope="{ row }">
                        <el-tag :type="auditStatusType(row.auditStatus)" size="mini" v-if="row.auditStatus != null">
                            {{ auditStatusLabel(row.auditStatus) }}
                        </el-tag>
                        <span v-else style="color:var(--c-text-3);"></span>
                    </template>
                </el-table-column>
                <el-table-column prop="initiatorName" label="发起人" min-width="110">
                    <template slot-scope="{ row }">{{ row.initiatorName || '' }}</template>
                </el-table-column>
                <el-table-column label="开始时间" min-width="150">
                    <template slot-scope="{ row }">
                        {{ row.startTime ? moment(row.startTime).format('YYYY-MM-DD HH:mm') : '' }}
                    </template>
                </el-table-column>
                <el-table-column label="操作" width="100" fixed="right" align="center">
                    <template slot-scope="{ row }">
                        <el-button v-if="activeTab === 'pending'" type="primary" size="mini" @click="openMatterPage(row)">处理</el-button>
                        <el-button v-else size="mini" @click="openMatterPage(row)">查看</el-button>
                    </template>
                </el-table-column>
            </el-table>
            <div class="pagination-wrap">
                <el-pagination
                    :total="pagination.total"
                    :current-page="pagination.pageIndex"
                    :page-size="pagination.pageSize"
                    :page-sizes="[10, 20, 50, 100]"
                    layout="total, sizes, prev, pager, next, jumper"
                    small
                    @current-change="handlePageChange"
                    @size-change="handleSizeChange">
                </el-pagination>
            </div>
        </div>
    </div>
</div>

<script>
new Vue({
    el: '#my_matters',
    data() {
        return {
            today: moment().format('YYYY年MM月DD日'), // 顶栏当前日期展示文字
            searchForm: {             // 查询条件
                flowIds: [],              // 流程 ID 多选
                startDateRange: null,     // 开始日期范围
                processDescription: '',   // 流程描述关键词
                auditStatus: '',          // 调整状态
                initiatorName: '',        // 发起人姓名关键词
                currentUserId: '1001',    // 当前用户ID（TODO: 对接实际登录用户）
            },
            auditStatusOptions: [     // 审核状态筛选选项
                { value: '-1', label: '无效调整' },
                { value: '00', label: '已提交待审核' },
                { value: '10', label: '审核通过待审批' },
                { value: '11', label: '驳回待修改' },
                { value: '20', label: '审批通过' },
                { value: '21', label: '审批驳回' },
                { value: '32', label: 'O32自动审批' },
                { value: '99', label: '发起人已撤回' },
            ],
            flowOptions: [],              // 流程名称下拉选项
            activeTab: 'pending',         // 当前事宜页签：pending=待处理 / completed=已完成
            tableData: [],                // 当前页事宜数据
            loading: false,               // 表格加载状态
            pagination: {             // 分页参数
                pageIndex: 1,             // 当前页码
                pageSize: 20,             // 每页条数
                total: 0,                 // 总记录数
            },
        };
    },
    mounted() {
        axios.defaults.baseURL = 'http://localhost:18090';
        this.loadFlowOptions();
        this.loadList();
    },
    methods: {
        // API 请求封装
        async apiPost(path, body) {
            const resp = await axios.post(path, body || {});
            const json = resp.data;
            if (json.code !== 0) {
                this.$message.error(json.message || '接口异常');
                throw new Error(json.message || '接口异常');
            }
            return json.data;
        },

        // 审核状态码转中文
        auditStatusLabel(code) {
            const map = {
                '-1': '无效调整',
                '00': '已提交待审核',
                '10': '审核通过待审批',
                '11': '驳回待修改',
                '20': '审批通过',
                '21': '审批驳回',
                '32': 'O32自动审批',
                '99': '发起人已撤回',
            };
            return map[String(code)] || code || '';
        },

        // 审核状态对应标签颜色
        auditStatusType(code) {
            const map = {
                '-1': 'danger',
                '00': 'warning',
                '10': 'success',
                '11': 'warning',
                '20': 'success',
                '21': 'danger',
                '32': 'success',
                '99': 'info',
            };
            return map[String(code)] || 'info';
        },

        // 步骤状态码转中文
        stepStatusLabel(code) {
            const map = {
                pending: '待处理',
                approve: '通过',
                reject: '驳回',
                submit: '提交',
                auto_process: '自动处理',
                canceled: '已撤回',
            };
            return map[String(code)] || code || '';
        },

        // 步骤状态对应标签颜色
        stepStatusType(code) {
            const map = {
                pending: 'warning',
                approve: 'success',
                reject: 'danger',
                submit: 'primary',
                auto_process: 'info',
                canceled: 'info',
            };
            return map[String(code)] || 'info';
        },

        // 加载流程名称下拉选项
        async loadFlowOptions() {
            try {
                this.flowOptions = await this.apiPost('/api/v1/myMatters/queryFlowOptionList', {
                    currentUserId: this.searchForm.currentUserId,
                });
            } catch (e) {}
        },

        // 加载我的事宜列表
        async loadList() {
            this.loading = true;
            try {
                const params = {
                    flowIds: this.searchForm.flowIds.length > 0 ? this.searchForm.flowIds : null,
                    startDateStart: this.searchForm.startDateRange ? this.searchForm.startDateRange[0] : null,
                    startDateEnd: this.searchForm.startDateRange ? this.searchForm.startDateRange[1] : null,
                    processDescription: this.searchForm.processDescription || null,
                    auditStatus: this.searchForm.auditStatus || null,
                    stepStatus: this.activeTab,
                    initiatorName: this.searchForm.initiatorName || null,
                    currentUserId: this.searchForm.currentUserId,
                    pageIndex: this.pagination.pageIndex,
                    pageSize: this.pagination.pageSize,
                };
                const data = await this.apiPost('/api/v1/myMatters/queryMyMattersPage', params);
                this.tableData = data.records || [];
                this.pagination.total = data.total || 0;
            } catch (e) {}
            this.loading = false;
        },

        // 触发查询
        handleSearch() {
            this.pagination.pageIndex = 1;
            this.loadList();
        },

        // 切换事宜页签
        handleTabClick() {
            this.pagination.pageIndex = 1;
            this.loadList();
        },

        // 重置查询条件
        handleReset() {
            this.searchForm = {
                flowIds: [],
                startDateRange: null,
                processDescription: '',
                auditStatus: '',
                initiatorName: '',
                currentUserId: '1001',
            };
            this.pagination.pageIndex = 1;
            this.loadFlowOptions();
            this.loadList();
        },

        // 翻页
        handlePageChange(page) {
            this.pagination.pageIndex = page;
            this.loadList();
        },

        // 切换每页条数
        handleSizeChange(size) {
            this.pagination.pageSize = size;
            this.pagination.pageIndex = 1;
            this.loadList();
        },

        // 打开对应调库页面
        openMatterPage(row) {
            const params = new URLSearchParams();
            if (row.securityCode) params.set('securityCode', row.securityCode);
            if (row.targetPoolId) params.set('targetPoolId', row.targetPoolId);
            if (row.adjustLogId) params.set('adjustLogId', row.adjustLogId);
            if (row.adjustBatchNo) params.set('adjustBatchNo', row.adjustBatchNo);
            params.set('entryMode', this.activeTab === 'pending' ? 'process' : 'view');
            const page = this.activeTab === 'pending' ? 'security_pool_adjust_approve.html' : 'security_pool_adjust_detail.html';
            window.location.href = page + '?' + params.toString();
        },
    }
});
</script>
</body>
</html>
