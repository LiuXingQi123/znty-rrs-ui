<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>主体内评分档规则</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui@2.15.14/lib/theme-chalk/index.css" />
    <script src="https://unpkg.com/vue@2.5.16/dist/vue.js"></script>
    <script src="https://unpkg.com/element-ui@2.15.14/lib/index.js"></script>
    <script src="https://unpkg.com/axios@1.7.9/dist/axios.min.js"></script>
    <script src="js/api.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <link rel="stylesheet" href="css/credit_bond_grade_rule.css">
    <link rel="stylesheet" href="css/common.css">
</head>
<body class="credit-bond-grade-rule-page">
<div id="credit_bond_grade_rule" class="app-shell" v-cloak>
    <header class="topbar">
        <div class="topbar-brand">
            <div class="topbar-icon"><i class="el-icon-s-operation"></i></div>
            <h2>主体内评分档规则</h2>
        </div>
        <div class="topbar-sep"></div>
        <span class="topbar-sys">证券投资管理系统</span>
        <span class="topbar-date">{{ today }}</span>
    </header>

    <main class="list-body">
        <section class="toolbar">
            <div class="toolbar-main">
                <div class="toolbar-title"><span class="title-line"></span>信用债大库评级准入矩阵</div>
            </div>
            <el-button v-if="!editing" size="small" icon="el-icon-refresh" :loading="loading" @click="loadMatrix">刷新</el-button>
            <el-button v-if="!editing" size="small" type="primary" icon="el-icon-edit" @click="startEdit">修改</el-button>
            <el-button v-if="editing" size="small" icon="el-icon-close" @click="cancelEdit">取消</el-button>
            <el-button v-if="editing" size="small" type="primary" icon="el-icon-check" :loading="saving" @click="saveMatrix">保存</el-button>
        </section>

        <section class="matrix-wrap" v-loading="loading">
            <div class="matrix-scroll">
                <table class="rule-matrix">
                    <thead>
                    <tr>
                        <th class="grade-col head-grade-col" rowspan="2">主体内评分档</th>
                        <th class="term-group-col" :colspan="termBuckets.length">债券期限（年）</th>
                    </tr>
                    <tr>
                        <th v-for="bucket in termBuckets" :key="bucket.id">
                            <span class="term-name">{{ bucket.bucketName }}</span>
                        </th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr v-for="grade in ratingGrades" :key="grade.id">
                        <td class="grade-col">
                            <div class="grade-name">
                                <span class="grade-dot"></span>
                                <span>{{ grade.gradeName }}</span>
                            </div>
                        </td>
                        <td v-for="bucket in termBuckets" :key="bucket.id">
                            <el-popover
                                v-if="editing"
                                placement="bottom-start"
                                width="300"
                                trigger="click"
                                :append-to-body="false"
                                v-model="poolPickerVisibleMap[cellKey(bucket.id, grade.id)]"
                                @show="openPoolPicker(bucket.id, grade.id)"
                                @hide="handlePoolPickerHide(bucket.id, grade.id)">
                                <div class="pool-popover-content">
                                    <el-input
                                        v-model="poolTreeKeyword"
                                        class="pool-tree-search"
                                        size="small"
                                        clearable
                                        prefix-icon="el-icon-search"
                                        placeholder="搜索投资池"
                                        @input="filterPoolTree(bucket.id, grade.id)">
                                    </el-input>
                                    <div class="pool-tree-scroll">
                                        <el-tree
                                            :ref="'poolTree_' + cellKey(bucket.id, grade.id)"
                                            :data="poolTreeData"
                                            node-key="id"
                                            :props="poolTreeProps"
                                            show-checkbox
                                            check-strictly
                                            default-expand-all
                                            :filter-node-method="filterPoolNode"
                                            @check-change="handlePoolTreeCheckChange(bucket.id, grade.id)">
                                        </el-tree>
                                    </div>
                                </div>
                                <div class="pool-popover-actions">
                                    <el-button size="mini" @click="cancelPoolPicker(bucket.id, grade.id)">取消</el-button>
                                    <el-button type="primary" size="mini" @click="confirmPoolPicker(bucket.id, grade.id)">确认</el-button>
                                </div>
                                <div
                                    slot="reference"
                                    class="cell-picker-trigger"
                                    :class="{ 'is-active': poolPickerVisibleMap[cellKey(bucket.id, grade.id)] }">
                                    <div class="cell-picker-tags">
                                        <template v-if="getCellPools(bucket.id, grade.id).length">
                                            <span
                                                v-for="pool in getCellPools(bucket.id, grade.id)"
                                                :key="pool.poolId"
                                                class="pool-tag is-editable">
                                                {{ pool.poolName }}
                                                <i
                                                    class="el-icon-close pool-tag-close"
                                                    @click.stop="removeCellPool(bucket.id, grade.id, pool.poolId)">
                                                </i>
                                            </span>
                                        </template>
                                        <span v-else class="cell-picker-placeholder">请选择投资池</span>
                                    </div>
                                    <i class="el-icon-arrow-down cell-picker-arrow"></i>
                                </div>
                            </el-popover>
                            <div v-if="!editing" class="cell-count">
                                <span v-if="getCellPools(bucket.id, grade.id).length">
                                    <span
                                        v-for="pool in getCellPools(bucket.id, grade.id)"
                                        :key="pool.poolId"
                                        class="pool-tag">{{ pool.poolName }}</span>
                                </span>
                                <span v-else class="empty-cell">未配置</span>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div class="summary-bar">
                <div class="summary-items">
                    <el-tag size="small">期限 {{ termBuckets.length }} 档</el-tag>
                    <el-tag size="small" type="success">主体内评分档 {{ ratingGrades.length }} 档</el-tag>
                    <el-tag size="small" type="warning">关系 {{ totalRuleCount }} 条</el-tag>
                </div>
                <div>最后刷新：{{ lastLoadedAt }}</div>
            </div>
        </section>
    </main>
</div>

<script>
    new Vue({
        el: '#credit_bond_grade_rule',
        data() {
            return {
                moment: moment, // 日期处理工具
                today: moment().format('YYYY年MM月DD日'),
                loading: false,
                saving: false,
                editing: false,
                termBuckets: [],
                ratingGrades: [],
                poolOptions: [],
                poolTreeData: [],
                poolTreeKeyword: '',
                poolPickerVisibleMap: {},
                poolPickerOriginalIdsMap: {},
                poolTreeProps: {
                    children: 'children',
                    label: 'poolName',
                    disabled(data) {
                        return data.disabled
                    }
                },
                matrixMap: {},
                originalMatrixMap: {},
                lastLoadedAt: ''
            }
        },
        computed: {
            totalRuleCount() {
                return Object.keys(this.matrixMap).reduce((total, key) => {
                    const list = this.matrixMap[key] || []
                    return total + list.length
                }, 0)
            }
        },
        created() {
            this.loadMatrix()
        },
        methods: {
            // 生成矩阵单元格键
            cellKey(termBucketId, ratingGradeId) {
                return String(termBucketId) + '_' + String(ratingGradeId)
            },
            // 复制矩阵映射，避免取消编辑时引用同一个数组
            cloneMatrixMap(source) {
                const target = {}
                Object.keys(source || {}).forEach(key => {
                    target[key] = (source[key] || []).slice()
                })
                return target
            },
            // 查询矩阵配置并填充页面
            async loadMatrix() {
                this.loading = true
                try {
                    const data = await this.apiPost('/api/v1/creditBondGradeRule/queryGradeRuleMatrix', {})
                    this.termBuckets = data.termBuckets || []
                    this.ratingGrades = data.ratingGrades || []
                    this.poolOptions = data.poolOptions || []
                    this.poolTreeData = this.buildPoolTreeData(this.poolOptions)
                    this.fillMatrixMap(data.rules || [])
                    this.originalMatrixMap = this.cloneMatrixMap(this.matrixMap)
                    this.editing = false
                    this.lastLoadedAt = moment().format('YYYY-MM-DD HH:mm:ss')
                } catch (e) {
                    this.termBuckets = []
                    this.ratingGrades = []
                    this.poolOptions = []
                    this.poolTreeData = []
                    this.matrixMap = {}
                    this.originalMatrixMap = {}
                    this.editing = false
                }
                this.loading = false
            },
            // 将后端关系列表填充为单元格映射
            fillMatrixMap(rules) {
                const map = {}
                const visibleMap = {}
                const originalIdsMap = {}
                this.ratingGrades.forEach(grade => {
                    this.termBuckets.forEach(bucket => {
                        const key = this.cellKey(bucket.id, grade.id)
                        map[key] = []
                        visibleMap[key] = false
                        originalIdsMap[key] = []
                    })
                })
                rules.forEach(rule => {
                    const key = this.cellKey(rule.termBucketId, rule.innerRatingGradeId)
                    if (!map[key]) {
                        map[key] = []
                    }
                    if (map[key].indexOf(rule.poolId) === -1) {
                        map[key].push(rule.poolId)
                    }
                })
                this.matrixMap = map
                this.poolPickerVisibleMap = visibleMap
                this.poolPickerOriginalIdsMap = originalIdsMap
            },
            // 构建信用债大库树，根节点只展示不可选
            buildPoolTreeData(pools) {
                return [{
                    id: 'credit_bond_root',
                    poolName: '信用债大库',
                    disabled: true,
                    children: (pools || []).map(pool => {
                        return {
                            id: pool.poolId,
                            poolName: pool.poolName,
                            poolFullName: pool.poolFullName || ('信用债大库/' + pool.poolName),
                            disabled: false,
                            children: []
                        }
                    })
                }]
            },
            // 获取当前单元格树组件引用
            getPoolTreeRef(key) {
                const ref = this.$refs['poolTree_' + key]
                return Array.isArray(ref) ? ref[0] : ref
            },
            // 进入矩阵编辑状态
            startEdit() {
                this.originalMatrixMap = this.cloneMatrixMap(this.matrixMap)
                this.editing = true
            },
            // 取消编辑并恢复原矩阵
            cancelEdit() {
                this.matrixMap = this.cloneMatrixMap(this.originalMatrixMap)
                this.editing = false
            },
            // 打开单元格投资池树选择器
            openPoolPicker(termBucketId, ratingGradeId) {
                const key = this.cellKey(termBucketId, ratingGradeId)
                this.poolTreeKeyword = ''
                this.$set(this.poolPickerOriginalIdsMap, key, (this.matrixMap[key] || []).slice())
                this.$nextTick(() => {
                    const tree = this.getPoolTreeRef(key)
                    if (tree) {
                        tree.filter('')
                        tree.setCheckedKeys(this.matrixMap[key] || [])
                    }
                })
            },
            // 关闭单元格投资池树选择器后清空搜索
            handlePoolPickerHide(termBucketId, ratingGradeId) {
                const key = this.cellKey(termBucketId, ratingGradeId)
                this.poolTreeKeyword = ''
                const tree = this.getPoolTreeRef(key)
                if (tree) {
                    tree.filter('')
                }
            },
            // 按投资池名称过滤当前树
            filterPoolTree(termBucketId, ratingGradeId) {
                const key = this.cellKey(termBucketId, ratingGradeId)
                const tree = this.getPoolTreeRef(key)
                if (tree) {
                    tree.filter(this.poolTreeKeyword.trim())
                }
            },
            // 树节点搜索过滤
            filterPoolNode(value, data) {
                if (!value) {
                    return true
                }
                const text = data.poolFullName || data.poolName || ''
                return String(text).toLowerCase().indexOf(value.toLowerCase()) !== -1
            },
            // 取消单元格投资池选择
            cancelPoolPicker(termBucketId, ratingGradeId) {
                const key = this.cellKey(termBucketId, ratingGradeId)
                const originalIds = (this.poolPickerOriginalIdsMap[key] || []).slice()
                this.$set(this.matrixMap, key, originalIds)
                this.syncCellTreeCheckedKeys(key)
                this.$set(this.poolPickerVisibleMap, key, false)
            },
            // 确认单元格投资池选择
            confirmPoolPicker(termBucketId, ratingGradeId) {
                const key = this.cellKey(termBucketId, ratingGradeId)
                this.$set(this.poolPickerOriginalIdsMap, key, (this.matrixMap[key] || []).slice())
                this.$set(this.poolPickerVisibleMap, key, false)
            },
            // 树勾选变化时即时同步单元格选择
            handlePoolTreeCheckChange(termBucketId, ratingGradeId) {
                const key = this.cellKey(termBucketId, ratingGradeId)
                const tree = this.getPoolTreeRef(key)
                const checkedKeys = tree ? this.filterValidPoolIds(tree.getCheckedKeys()) : []
                this.$set(this.matrixMap, key, checkedKeys)
            },
            // 从单元格标签直接移除投资池
            removeCellPool(termBucketId, ratingGradeId, poolId) {
                const key = this.cellKey(termBucketId, ratingGradeId)
                const nextIds = (this.matrixMap[key] || []).filter(id => id !== poolId)
                this.$set(this.matrixMap, key, nextIds)
                this.syncCellTreeCheckedKeys(key)
            },
            // 同步当前单元格树的勾选状态
            syncCellTreeCheckedKeys(key) {
                this.$nextTick(() => {
                    const tree = this.getPoolTreeRef(key)
                    if (tree) {
                        tree.setCheckedKeys(this.matrixMap[key] || [])
                    }
                })
            },
            // 过滤掉根节点等不可保存的 ID
            filterValidPoolIds(ids) {
                const validPoolIds = this.poolOptions.map(pool => pool.poolId)
                return (ids || []).filter(id => validPoolIds.indexOf(id) !== -1)
            },
            // 获取单元格已选择的投资池对象
            getCellPools(termBucketId, ratingGradeId) {
                const ids = this.matrixMap[this.cellKey(termBucketId, ratingGradeId)] || []
                return this.poolOptions.filter(pool => ids.indexOf(pool.poolId) !== -1)
            },
            // 展开矩阵映射为接口保存参数
            collectRules() {
                const rules = []
                this.ratingGrades.forEach(grade => {
                    this.termBuckets.forEach(bucket => {
                        const ids = this.matrixMap[this.cellKey(bucket.id, grade.id)] || []
                        ids.forEach(poolId => {
                            rules.push({
                                termBucketId: bucket.id,
                                innerRatingGradeId: grade.id,
                                poolId
                            })
                        })
                    })
                })
                return rules
            },
            // 保存矩阵配置
            async saveMatrix() {
                this.saving = true
                try {
                    const data = await this.apiPost('/api/v1/creditBondGradeRule/editGradeRuleMatrix', {
                        rules: this.collectRules(),
                        operatorId: 'system'
                    })
                    this.termBuckets = data.termBuckets || []
                    this.ratingGrades = data.ratingGrades || []
                    this.poolOptions = data.poolOptions || []
                    this.poolTreeData = this.buildPoolTreeData(this.poolOptions)
                    this.fillMatrixMap(data.rules || [])
                    this.originalMatrixMap = this.cloneMatrixMap(this.matrixMap)
                    this.editing = false
                    this.lastLoadedAt = moment().format('YYYY-MM-DD HH:mm:ss')
                    this.$message.success('主体内评分档规则已保存')
                } catch (e) {
                    this.$message.error(e.message || '操作失败')
                }
                this.saving = false
            }
        }
    })
</script>
</body>
</html>
