<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRS 工作台</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui@2.15.14/lib/theme-chalk/index.css">
    <script src="https://unpkg.com/vue@2.5.16/dist/vue.min.js"></script>
    <script src="https://unpkg.com/element-ui@2.15.14/lib/index.js"></script>
    <script src="https://unpkg.com/axios@1.7.9/dist/axios.min.js"></script>
    <script src="js/api.js"></script>
    <link rel="stylesheet" href="css/index.css">
</head>
<body class="rrs-workbench-page">
<div id="rrs_workbench" v-cloak>
    <el-container class="workbench-shell">
        <el-aside class="workbench-aside" :width="isCollapse ? '64px' : '224px'">
            <div class="workbench-brand" :class="{ 'is-collapsed': isCollapse }">
                <div class="brand-icon">
                    <svg viewBox="0 0 32 32" aria-hidden="true">
                        <path d="M5 6h22v5H5zM5 14h15v5H5zM5 22h10v5H5z"></path>
                        <circle cx="25" cy="24" r="4"></circle>
                    </svg>
                </div>
                <div v-show="!isCollapse" class="brand-text">
                    <strong>智慧风控平台</strong>
                    <span>RRS WORKBENCH</span>
                </div>
            </div>

            <el-menu
                    class="workbench-menu"
                    :default-active="activeMenu"
                    :collapse="isCollapse"
                    :collapse-transition="false"
                    :unique-opened="false"
                    background-color="#1F3683"
                    text-color="#DDE4FF"
                    active-text-color="#FFFFFF"
                    @select="handleMenuSelect">
                <el-submenu v-for="group in visibleMenuGroups" :key="group.index" :index="group.index">
                    <template slot="title">
                        <i :class="group.icon"></i>
                        <span>{{ group.title }}</span>
                    </template>
                    <template v-for="item in group.items">
                        <el-submenu v-if="item.children" :key="item.index" :index="item.index">
                            <template slot="title">
                                <i :class="item.icon"></i>
                                <span>{{ item.title }}</span>
                            </template>
                            <el-menu-item v-for="child in item.children" :key="child.index" :index="child.index">
                                <i :class="child.icon"></i>
                                <span slot="title">{{ child.title }}</span>
                            </el-menu-item>
                        </el-submenu>
                        <el-menu-item v-else :key="item.index" :index="item.index">
                            <i :class="item.icon"></i>
                            <span slot="title">{{ item.title }}</span>
                        </el-menu-item>
                    </template>
                </el-submenu>
            </el-menu>

            <el-tooltip :content="isCollapse ? '展开菜单' : '收起菜单'" placement="right">
                <el-button
                        class="aside-collapse"
                        :aria-label="isCollapse ? '展开菜单' : '收起菜单'"
                        @click="isCollapse = !isCollapse" size="mini" type="text">
                    <i :class="isCollapse ? 'el-icon-s-unfold' : 'el-icon-s-fold'"></i>
                    <span v-show="!isCollapse">收起菜单</span>
                </el-button>
            </el-tooltip>

        </el-aside>

        <el-container class="workbench-main">
            <el-header class="workbench-header" height="56px">
                <div class="header-left">
                    <div class="header-page-info">
                        <el-tooltip :content="isCollapse ? '展开菜单' : '收起菜单'" placement="bottom">
                            <el-button
                                    class="header-menu-toggle"
                                    :aria-label="isCollapse ? '展开菜单' : '收起菜单'"
                                    @click="isCollapse = !isCollapse" size="mini" type="text">
                                <i :class="isCollapse ? 'el-icon-s-unfold' : 'el-icon-s-fold'"></i>
                            </el-button>
                        </el-tooltip>
                        <span class="header-menu-separator"></span>
                    </div>
                    <nav class="primary-navigation" aria-label="一级菜单">
                        <el-button
                                v-for="menu in primaryMenus"
                                :key="menu.index"
                                class="primary-navigation-item"
                                :class="{ 'is-active': activePrimaryMenu === menu.index }"
                                @click="handlePrimaryMenuSelect(menu.index)" size="mini" type="text">
                            <i :class="menu.icon"></i>
                            <span>{{ menu.title }}</span>
                        </el-button>
                    </nav>
                </div>
                <div class="header-actions">
                    <el-tooltip content="刷新当前页面" placement="bottom">
                        <el-button class="header-icon-button" icon="el-icon-refresh-right" circle @click="refreshCurrentPage"></el-button>
                    </el-tooltip>
                    <span class="header-separator"></span>
                    <el-dropdown trigger="click" @command="handleUserCommand">
                        <div class="user-entry">
                            <span class="user-avatar">{{ userInitial }}</span>
                            <span class="user-name">{{ loginUser ? loginUser.userName : '' }}</span>
                            <i class="el-icon-arrow-down"></i>
                        </div>
                        <el-dropdown-menu slot="dropdown">
                            <el-dropdown-item icon="el-icon-user" disabled>用户ID：{{ loginUser ? loginUser.userId : '' }}</el-dropdown-item>
                            <el-dropdown-item command="logout" icon="el-icon-switch-button" divided>退出登录</el-dropdown-item>
                        </el-dropdown-menu>
                    </el-dropdown>
                </div>
            </el-header>

            <div class="workbench-tabs" role="tablist" aria-label="已打开页面">
                <el-button
                        class="tab-scroll-button"
                        :disabled="!openedTabs.length"
                        aria-label="向左滚动页签"
                        @click="scrollTabs('left')" size="mini" type="text">
                    <i class="el-icon-arrow-left"></i>
                </el-button>
                <div v-if="openedTabs.length" ref="pageTabs" class="page-tabs" @wheel.prevent="handleTabsWheel">
                    <div
                            v-for="tab in openedTabs"
                            :key="tab.index"
                            class="page-tab"
                            :class="{ 'is-active': activeMenu === tab.index, 'is-fixed': tab.fixed }"
                            role="tab"
                            tabindex="0"
                            :aria-selected="activeMenu === tab.index"
                            @click="activateTab(tab.index)"
                            @keyup.enter="activateTab(tab.index)">
                        <i v-if="tab.fixed" class="el-icon-s-home page-tab-home-icon"></i>
                        <span class="page-tab-title">{{ tab.title }}</span>
                        <el-button
                                v-if="!tab.fixed"
                                class="page-tab-close"
                                :aria-label="'关闭' + tab.title"
                                @click.stop="closeTab(tab.index)" size="mini" type="text">
                            <i class="el-icon-close"></i>
                        </el-button>
                    </div>
                </div>
                <span v-else class="page-tabs-empty">暂无打开页面</span>
                <el-button
                        class="tab-scroll-button"
                        :disabled="!openedTabs.length"
                        aria-label="向右滚动页签"
                        @click="scrollTabs('right')" size="mini" type="text">
                    <i class="el-icon-arrow-right"></i>
                </el-button>
                <el-dropdown
                        class="tab-actions"
                        trigger="hover"
                        @command="handleTabCommand">
                    <el-button
                            class="tab-action-trigger"
                            :disabled="!openedTabs.length" size="mini" type="text">
                        <span>更多</span>
                        <i class="el-icon-arrow-down"></i>
                    </el-button>
                    <el-dropdown-menu slot="dropdown">
                        <el-dropdown-item command="closeLeft" :disabled="!canCloseLeftTabs">关闭左侧</el-dropdown-item>
                        <el-dropdown-item command="closeRight" :disabled="!canCloseRightTabs">关闭右侧</el-dropdown-item>
                        <el-dropdown-item command="closeAll" :disabled="!hasClosableTabs">关闭全部</el-dropdown-item>
                    </el-dropdown-menu>
                </el-dropdown>
            </div>

            <el-main class="workbench-content">
                <div class="content-frame-wrap">
                    <iframe
                            v-for="tab in openedTabs"
                            v-show="activeMenu === tab.index"
                            :key="tab.index + '-' + tab.renderKey"
                            class="content-frame"
                            :src="tab.url"
                            :title="tab.title">
                    </iframe>
                    <div v-if="!openedTabs.length" class="content-empty">
                        <i class="el-icon-folder-opened"></i>
                        <span>请从左侧菜单选择页面</span>
                    </div>
                </div>
            </el-main>
        </el-container>
    </el-container>
</div>

                        { index: 'doc-approval-matters-audit', title: '审批与我的事宜体检', icon: 'el-icon-user', page: 'docs/approval-matters-audit.html' },
                        { index: 'doc-pool-permission-audit', title: '投资池与权限体检', icon: 'el-icon-s-management', page: 'docs/investment-pool-permission-audit.html' },
                        { index: 'doc-workflow-engine-audit', title: '流程定义与流转体检', icon: 'el-icon-share', page: 'docs/workflow-engine-audit.html' },
                        { index: 'doc-rule-rating-temp-audit', title: '规则评级与临时代码体检', icon: 'el-icon-set-up', page: 'docs/rule-rating-temp-audit.html' },
                        { index: 'doc-attachment-report-audit', title: '附件与报告体检', icon: 'el-icon-paperclip', page: 'docs/attachment-report-audit.html' },
                        { index: 'doc-data-consistency-audit', title: '数据一致性与性能体检', icon: 'el-icon-data-analysis', page: 'docs/data-consistency-performance-audit.html' },
                        { index: 'doc-business-acceptance', title: '全业务验收矩阵', icon: 'el-icon-finished', page: 'docs/business-acceptance-matrix.html' },
                    ],
                },
                {
                    index: 'doc-data-migration', title: '数据迁移', icon: 'el-icon-truck', primaryMenu: 'document-management',
                    items: [
                        { index: 'doc-data-migration-guide', title: '迁移说明', icon: 'el-icon-document-copy', page: 'docs/data-migration-guide.html' },
                    ],
                },
            ],
        }
    },
    computed: {
        // 当前登录用户头像文字
        userInitial() {
            const name = this.loginUser ? this.loginUser.userName : ''
            return name ? name.slice(0, 1).toUpperCase() : 'U'
        },
        // 根据一级菜单显示对应侧边栏
        visibleMenuGroups() {
            return this.menuGroups.filter(group => group.primaryMenu === this.activePrimaryMenu)
        },
        // 扁平化菜单项，便于按索引检索
        flatMenuItems() {
            const items = []
            this.menuGroups.forEach(group => {
                group.items.forEach(item => {
                    if (item.children) {
                        item.children.forEach(child => items.push({
                            ...child,
                            groupTitle: group.title + ' / ' + item.title,
                            primaryMenu: group.primaryMenu,
                        }))
                        return
                    }
                    items.push({
                        ...item,
                        groupTitle: group.title,
                        primaryMenu: group.primaryMenu,
                    })
                })
            })
            return items
        },
        // 当前激活页签序号
        activeTabIndex() {
            return this.openedTabs.findIndex(tab => tab.index === this.activeMenu)
        },
        // 是否可以关闭左侧页签
        canCloseLeftTabs() {
            return this.activeTabIndex > 1
        },
        // 是否可以关闭右侧页签
        canCloseRightTabs() {
            return this.activeTabIndex >= 0 && this.activeTabIndex < this.openedTabs.length - 1
        },
        // 是否存在可关闭页签
        hasClosableTabs() {
            return this.openedTabs.some(tab => !tab.fixed)
        },
    },
    created() {
        if (!this.loginUser) {
            window.location.replace('login.html')
            return
        }
        window.RrsWorkbenchOpenPage = index => this.openMenuItem(index)
        this.openHomeTab()
    },
    methods: {
        // 切换顶部一级菜单并恢复该模块最后访问页面
        handlePrimaryMenuSelect(index) {
            this.activePrimaryMenu = index
            const primaryMenu = this.primaryMenus.find(menu => menu.index === index)
            if (!primaryMenu) return
            const lastActiveIndex = this.lastActiveByPrimary[index]
            const lastTabExists = this.openedTabs.some(tab => tab.index === lastActiveIndex)
            this.openMenuItem(lastTabExists ? lastActiveIndex : primaryMenu.defaultPage)
        },
        // 响应菜单选择
        handleMenuSelect(index) {
            this.openMenuItem(index)
        },
        // 打开固定首页页签
        openHomeTab() {
            const opened = this.openedTabs.some(tab => tab.index === this.homeTab.index)
            if (!opened) {
                this.openedTabs.unshift({
                    ...this.homeTab,
                    url: window.RrsAuth.buildPageUrl(this.homeTab.page, this.loginUser),
                    renderKey: 1,
                })
            }
            this.activateTab(this.homeTab.index)
        },
        // 打开指定菜单页面
        openMenuItem(index) {
            const item = this.flatMenuItems.find(menuItem => menuItem.index === index)
            if (!item) return
            const opened = this.openedTabs.some(tab => tab.index === item.index)
            if (!opened) {
                this.openedTabs.push({
                    ...item,
                    url: window.RrsAuth.buildPageUrl(item.page, this.loginUser),
                    renderKey: 1,
                })
            }
            this.activateTab(item.index)
        },
        // 激活指定页签并同步一级菜单和侧边栏
        activateTab(index) {
            const tab = this.openedTabs.find(item => item.index === index)
            if (!tab) return
            this.activeMenu = tab.index
            this.activePrimaryMenu = tab.primaryMenu
            this.currentTitle = tab.title
            this.currentGroupTitle = tab.groupTitle
            this.lastActiveByPrimary[tab.primaryMenu] = tab.index
            document.title = tab.title + ' - RRS 工作台'
        },
        // 关闭页签并激活相邻页面
        closeTab(index) {
            const closeIndex = this.openedTabs.findIndex(tab => tab.index === index)
            if (closeIndex < 0) return
            const closedTab = this.openedTabs[closeIndex]
            if (closedTab.fixed) return
            const isActive = this.activeMenu === index
            this.openedTabs.splice(closeIndex, 1)
            const primaryTabs = this.openedTabs.filter(tab => tab.primaryMenu === closedTab.primaryMenu)
            if (this.lastActiveByPrimary[closedTab.primaryMenu] === index) {
                this.lastActiveByPrimary[closedTab.primaryMenu] = primaryTabs.length
                    ? primaryTabs[primaryTabs.length - 1].index
                    : ''
            }
            if (!isActive) return
            const nextTab = this.openedTabs[closeIndex] || this.openedTabs[closeIndex - 1]
            if (nextTab) {
                this.activateTab(nextTab.index)
                return
            }
            this.activeMenu = ''
            this.currentTitle = ''
            this.currentGroupTitle = ''
            document.title = 'RRS 工作台'
        },
        // 处理页签批量关闭命令
        handleTabCommand(command) {
            if (command === 'closeLeft') {
                this.closeLeftTabs()
                return
            }
            if (command === 'closeRight') {
                this.closeRightTabs()
                return
            }
            if (command === 'closeAll') {
                this.closeAllTabs()
            }
        },
        // 关闭当前页签左侧的所有页签
        closeLeftTabs() {
            if (!this.canCloseLeftTabs) return
            this.openedTabs.splice(1, this.activeTabIndex - 1)
            this.normalizeLastActiveTabs()
        },
        // 关闭当前页签右侧的所有页签
        closeRightTabs() {
            if (!this.canCloseRightTabs) return
            this.openedTabs.splice(this.activeTabIndex + 1)
            this.normalizeLastActiveTabs()
        },
        // 关闭全部页签
        closeAllTabs() {
            if (!this.hasClosableTabs) return
            this.openedTabs = this.openedTabs.filter(tab => tab.fixed)
            this.primaryMenus.forEach(menu => {
                this.lastActiveByPrimary[menu.index] = ''
            })
            this.activateTab(this.homeTab.index)
        },
        // 修正各一级菜单最后激活页签，避免指向已关闭页面
        normalizeLastActiveTabs() {
            this.primaryMenus.forEach(menu => {
                const rememberedIndex = this.lastActiveByPrimary[menu.index]
                const rememberedExists = this.openedTabs.some(tab => tab.index === rememberedIndex)
                if (rememberedExists) return
                const primaryTabs = this.openedTabs.filter(tab => tab.primaryMenu === menu.index)
                this.lastActiveByPrimary[menu.index] = primaryTabs.length
                    ? primaryTabs[primaryTabs.length - 1].index
                    : ''
            })
        },
        // 左右滚动页签列表
        scrollTabs(direction) {
            const tabs = this.$refs.pageTabs
            if (!tabs) return
            const offset = Math.max(180, Math.floor(tabs.clientWidth * 0.7))
            tabs.scrollLeft += direction === 'left' ? -offset : offset
        },
        // 鼠标滚轮横向滚动页签列表
        handleTabsWheel(event) {
            const tabs = this.$refs.pageTabs
            if (!tabs) return
            tabs.scrollLeft += event.deltaY || event.deltaX
        },
        // 刷新当前页签对应的 iframe
        refreshCurrentPage() {
            const tab = this.openedTabs.find(item => item.index === this.activeMenu)
            if (!tab) return
            tab.renderKey += 1
        },
        // 处理用户菜单命令
        handleUserCommand(command) {
            if (command !== 'logout') return
            window.RrsAuth.clearCurrentUser()
            window.location.replace('login.html')
        },
    },
})
</script>
